<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Таро">
    <meta name="theme-color" content="#0b0813">
    <meta name="description" content="Конструктор раскладов Таро с умным промптом для ИИ">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Apple Touch Icon (emoji-based inline SVG) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230b0813'/><text y='125' x='90' text-anchor='middle' font-size='110'>🔮</text></svg>">

    <title>Tarot AI Companion</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0b0813;
            --surface: #140f24;
            --surface2: #1c1535;
            --border: #2a2050;
            --gold: #f3c66f;
            --gold-dim: rgba(243,198,111,0.15);
            --purple: #9d4edf;
            --purple-dim: rgba(157,78,223,0.2);
            --text: #e2e8f0;
            --text-muted: #7c6fa0;
            --text-purple: #c4b5e0;
            --danger: #ef4444;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            height: 100%;
            overscroll-behavior: none;
        }

        /* ── App Shell ── */
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding-top: var(--safe-top);
        }

        /* ── Header ── */
        header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(11,8,19,0.92);
        }
        header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.05em;
            text-align: center;
        }
        header p {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 2px;
        }

        /* ── Tab Nav ── */
        #tab-nav {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 71px;
            z-index: 9;
        }
        .tab-btn {
            flex: 1;
            padding: 11px 4px 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ── Sections ── */
        .section { display: none; padding: 16px 16px calc(16px + var(--safe-bot)); }
        .section.active { display: block; }

        /* ── Cards & Controls ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        label.field-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-purple);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        select:focus, textarea:focus { border-color: var(--gold); }
        textarea { resize: none; }

        /* ── Suit Tabs ── */
        #suit-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        #suit-tabs::-webkit-scrollbar { display: none; }
        .suit-btn {
            flex-shrink: 0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .suit-btn.active {
            background: var(--purple);
            border-color: var(--purple);
            color: #fff;
        }

        /* ── Card Grid ── */
        #cards-pool {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 7px;
            max-height: 52vh;
            overflow-y: auto;
            padding: 2px;
            -webkit-overflow-scrolling: touch;
        }
        .pool-card {
            padding: 10px 8px;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 500;
            text-align: center;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.3;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pool-card:active { transform: scale(0.96); }
        .pool-card.used {
            opacity: 0.4;
            background: var(--purple-dim);
            border-color: var(--purple);
            color: var(--text-purple);
            cursor: default;
        }

        /* ── Spread List ── */
        .spread-slot {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .spread-slot.active-slot {
            border-color: var(--gold);
            background: var(--gold-dim);
        }
        .slot-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-purple);
            margin-bottom: 4px;
        }
        .slot-card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .slot-card-name.inverted { color: #c084fc; }
        .slot-empty {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }
        .slot-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .slot-btn {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .slot-btn.del { color: var(--danger); }

        /* ── Prompt Section ── */
        #prompt-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            font-family: monospace;
            line-height: 1.6;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px;
        }

        /* ── Primary Button ── */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #0b0813;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary:active { transform: scale(0.98); filter: brightness(0.9); }

        .btn-secondary {
            padding: 8px 14px;
            background: transparent;
            color: var(--danger);
            font-size: 13px;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Position Hint Banner ── */
        #hint-banner {
            font-size: 12px;
            padding: 8px 12px;
            background: var(--gold-dim);
            border: 1px solid rgba(243,198,111,0.3);
            border-radius: 8px;
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: calc(20px + var(--safe-bot));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #16a34a;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 20px;
            transition: transform 0.3s ease;
            z-index: 100;
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Install Banner ── */
        #install-banner {
            margin: 0 16px 0;
            padding: 12px 14px;
            background: var(--purple-dim);
            border: 1px solid rgba(157,78,223,0.4);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-purple);
            display: none;
            align-items: center;
            gap: 10px;
        }
        #install-banner.show { display: flex; }
        #install-banner button {
            margin-left: auto;
            padding: 5px 10px;
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div id="app">

    <header>
        <h1>🔮 Tarot AI Companion</h1>
        <p>Конструктор раскладов · Промпты для ИИ</p>
    </header>

    <!-- iOS install hint -->
    <div id="install-banner">
        <span>📲 Добавь на экран «Домой» для работы как приложение</span>
        <button onclick="document.getElementById('install-banner').remove()">✕</button>
    </div>

    <nav id="tab-nav">
        <button class="tab-btn active" onclick="showTab('setup')">⚙️ Настройка</button>
        <button class="tab-btn" onclick="showTab('cards')">🃏 Карты</button>
        <button class="tab-btn" onclick="showTab('spread')">✨ Расклад</button>
        <button class="tab-btn" onclick="showTab('prompt')">📋 Промпт</button>
    </nav>

    <!-- ── РАЗДЕЛ 1: Настройка ── -->
    <section id="sec-setup" class="section active">
        <div class="card">
            <div class="card-title">Тема и расклад</div>

            <label class="field-label">Сфера жизни</label>
            <select id="theme" onchange="updatePrompt()">
                <option value="Общая ситуация">🪐 Общий анализ ситуации</option>
                <option value="Любовь и отношения">❤️ Отношения и любовь</option>
                <option value="Работа и карьера">💼 Карьера и реализация</option>
                <option value="Финансы и бизнес">💰 Финансы и ресурсы</option>
                <option value="Самопознание и духовный рост">🧠 Внутреннее состояние</option>
            </select>

            <label class="field-label">Тип расклада</label>
            <select id="spread" onchange="updateSpreadPositions()">
                <option value="Три карты (Прошлое, Настоящее, Будущее)">📜 Прошлое / Настоящее / Будущее (3)</option>
                <option value="Выбор из двух вариантов">🔀 Выбор из двух вариантов (5)</option>
                <option value="Крест (Ситуация, Препятствие, Совет, Итог)">✝️ Крест: Анализ ситуации (4)</option>
                <option value="Линейный расклад (Развитие процесса)">📈 Развитие процесса (3)</option>
                <option value="Свободный расклад">🔮 Свободный расклад (до 7)</option>
            </select>

            <label class="field-label">Вопрос или детали ситуации</label>
            <textarea id="question" rows="3" placeholder="Впиши сюда мысли или вопрос..." oninput="updatePrompt()"></textarea>
        </div>

        <button class="btn-primary" onclick="showTab('cards')">Выбрать карты →</button>
    </section>

    <!-- ── РАЗДЕЛ 2: Выбор карт ── -->
    <section id="sec-cards" class="section">
        <div id="hint-banner">Загрузка...</div>

        <div id="suit-tabs">
            <button class="suit-btn active" onclick="switchSuit('major', this)">Старшие</button>
            <button class="suit-btn" onclick="switchSuit('wands', this)">Жезлы</button>
            <button class="suit-btn" onclick="switchSuit('cups', this)">Кубки</button>
            <button class="suit-btn" onclick="switchSuit('swords', this)">Мечи</button>
            <button class="suit-btn" onclick="switchSuit('pentacles', this)">Пентакли</button>
        </div>

        <div id="cards-pool"></div>
    </section>

    <!-- ── РАЗДЕЛ 3: Расклад ── -->
    <section id="sec-spread" class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span style="font-size:14px;font-weight:600;color:var(--gold);">Текущий расклад</span>
            <button class="btn-secondary" onclick="resetAll()">🗑 Сбросить</button>
        </div>
        <div id="spread-list"></div>
    </section>

    <!-- ── РАЗДЕЛ 4: Промпт ── -->
    <section id="sec-prompt" class="section">
        <div class="card-title" style="color:var(--gold);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Сгенерированный промпт</div>
        <div id="prompt-box">Выбери карты в разделе «Карты»...</div>
        <button class="btn-primary" onclick="copyPrompt()">📋 Скопировать для ИИ</button>
    </section>

</div>

<div id="toast">✅ Скопировано!</div>

<script>
const DECK = {
    major: ["Дурак","Маг","Верховная Жрица","Императрица","Император","Иерофант","Влюбленные","Колесница","Сила","Отшельник","Колесо Фортуны","Справедливость","Повешенный","Смерть","Умеренность","Дьявол","Башня","Звезда","Луна","Солнце","Суд","Мир"],
    wands: ["Туз Жезлов","2 Жезлов","3 Жезлов","4 Жезлов","5 Жезлов","6 Жезлов","7 Жезлов","8 Жезлов","9 Жезлов","10 Жезлов","Паж Жезлов","Рыцарь Жезлов","Королева Жезлов","Король Жезлов"],
    cups: ["Туз Кубков","2 Кубков","3 Кубков","4 Кубков","5 Кубков","6 Кубков","7 Кубков","8 Кубков","9 Кубков","10 Кубков","Паж Кубков","Рыцарь Кубков","Королева Кубков","Король Кубков"],
    swords: ["Туз Мечей","2 Мечей","3 Мечей","4 Мечей","5 Мечей","6 Мечей","7 Мечей","8 Мечей","9 Мечей","10 Мечей","Паж Мечей","Рыцарь Мечей","Королева Мечей","Король Мечей"],
    pentacles: ["Туз Пентаклей","2 Пентаклей","3 Пентаклей","4 Пентаклей","5 Пентаклей","6 Пентаклей","7 Пентаклей","8 Пентаклей","9 Пентаклей","10 Пентаклей","Паж Пентаклей","Рыцарь Пентаклей","Королева Пентаклей","Король Пентаклей"]
};

const SPREADS = {
    "Три карты (Прошлое, Настоящее, Будущее)": ["Прошлое","Настоящее","Будущее"],
    "Выбор из двух вариантов": ["Суть ситуации / Выбор","Вариант А: Развитие","Вариант А: Итог","Вариант Б: Развитие","Вариант Б: Итог"],
    "Крест (Ситуация, Препятствие, Совет, Итог)": ["Суть ситуации","Препятствие / Что мешает","Совет карт","Потенциальный итог"],
    "Линейный расклад (Развитие процесса)": ["Ближайшее будущее","Развитие ситуации","Отдаленная перспектива"],
    "Свободный расклад": ["Позиция 1","Позиция 2","Позиция 3","Позиция 4","Позиция 5","Позиция 6","Позиция 7"]
};

let currentSuit = 'major';
let positions = [];
let selected = {};
let activeIdx = 0;
let currentTab = 'setup';

function init() {
    updateSpreadPositions();
    renderCards();
    checkIOSInstall();
}

function showTab(name) {
    currentTab = name;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn')[['setup','cards','spread','prompt'].indexOf(name)].classList.add('active');
    if (name === 'cards') { updateHint(); renderCards(); }
    if (name === 'spread') renderSpread();
    if (name === 'prompt') updatePrompt();
}

function switchSuit(suit, btn) {
    currentSuit = suit;
    document.querySelectorAll('.suit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
}

function renderCards() {
    const pool = document.getElementById('cards-pool');
    pool.innerHTML = '';
    DECK[currentSuit].forEach(card => {
        const used = Object.values(selected).some(c => c.name === card);
        const el = document.createElement('div');
        el.className = 'pool-card' + (used ? ' used' : '');
        el.textContent = card;
        if (!used) el.onclick = () => pickCard(card);
        pool.appendChild(el);
    });
}

function updateHint() {
    const banner = document.getElementById('hint-banner');
    if (activeIdx < positions.length) {
        banner.innerHTML = `👉 Выбираем для: <strong style="color:var(--gold)">"${positions[activeIdx]}"</strong>`;
    } else {
        banner.textContent = '✅ Все позиции заполнены!';
    }
}

function pickCard(card) {
    if (activeIdx >= positions.length) return;
    const pos = positions[activeIdx];
    selected[pos] = { name: card, inv: false };
    advanceIdx();
    updateHint();
    renderCards();
    updatePrompt();
}

function advanceIdx() {
    activeIdx = positions.length;
    for (let i = 0; i < positions.length; i++) {
        if (!selected[positions[i]]) { activeIdx = i; break; }
    }
}

function toggleInv(pos) {
    if (selected[pos]) { selected[pos].inv = !selected[pos].inv; renderSpread(); updatePrompt(); }
}

function removeCard(pos) {
    delete selected[pos];
    advanceIdx();
    renderSpread();
    updateHint();
    renderCards();
    updatePrompt();
}

function renderSpread() {
    const list = document.getElementById('spread-list');
    list.innerHTML = '';
    positions.forEach((pos, i) => {
        const card = selected[pos];
        const isActive = i === activeIdx;
        const el = document.createElement('div');
        el.className = 'spread-slot' + (isActive ? ' active-slot' : '');
        if (card) {
            el.innerHTML = `
                <div class="slot-label">${pos}</div>
                <div class="slot-card-name ${card.inv ? 'inverted' : ''}">${card.name} ${card.inv ? '🙃 (Перевернутая)' : '☀️ (Прямая)'}</div>
                <div class="slot-actions">
                    <button class="slot-btn" onclick="toggleInv('${pos}')">🔄 Перевернуть</button>
                    <button class="slot-btn del" onclick="removeCard('${pos}')">❌ Убрать</button>
                </div>`;
        } else {
            el.innerHTML = `
                <div class="slot-label">${pos}</div>
                <div class="slot-empty" onclick="activeIdx=${i};updateHint();renderSpread();showTab('cards')">[ Нажми, чтобы выбрать карту ]</div>`;
        }
        list.appendChild(el);
    });
}

function updateSpreadPositions() {
    const val = document.getElementById('spread').value;
    positions = SPREADS[val];
    selected = {};
    activeIdx = 0;
    renderSpread();
    updateHint();
    renderCards();
    updatePrompt();
}

function buildPrompt() {
    const theme = document.getElementById('theme').value;
    const spread = document.getElementById('spread').value;
    const q = document.getElementById('question').value.trim();
    if (!Object.keys(selected).length) return null;

    let p = `Привет! Ты профессиональный, глубокий таролог и чуткий ИИ-психолог. Проведи для меня детальный и развернутый разбор расклада Таро на основе следующих данных:\n\n`;
    p += `🔮 Сфера запроса: ${theme}\n`;
    p += `📐 Формат расклада: ${spread}\n`;
    if (q) p += `❓ Мой вопрос/контекст: "${q}"\n`;
    p += `\n🃏 Выпавшие карты по позициям:\n`;
    positions.forEach(pos => {
        const c = selected[pos];
        if (c) p += `- На позиции "${pos}" выпала карта: [${c.name}] в статусе [${c.inv ? 'Перевернутое' : 'Прямое'} положение]\n`;
    });
    p += `\nИнструкции для чтения расклада:\n`;
    p += `1. Разбери каждую карту строго в контексте её позиции и общей темы вопроса.\n`;
    p += `2. Обрати внимание на общую картину: есть ли преобладание определённой масти или Старших Арканов?\n`;
    p += `3. Дай финальный глубокий синтез: к какому итогу ведёт расклад и какой конкретный совет карты дают прямо сейчас.\n`;
    p += `Пиши атмосферно, честно, без банальных фраз и «воды».`;
    return p;
}

function updatePrompt() {
    const p = buildPrompt();
    document.getElementById('prompt-box').textContent = p || 'Выбери карты в разделе «Карты»...';
}

function copyPrompt() {
    const p = buildPrompt();
    if (!p) { showToast('Сначала выбери карты!'); return; }
    navigator.clipboard.writeText(p).then(() => showToast('✅ Скопировано!')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = p; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('✅ Скопировано!');
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

function resetAll() {
    selected = {}; activeIdx = 0;
    document.getElementById('question').value = '';
    renderSpread(); updateHint(); renderCards(); updatePrompt();
}

function checkIOSInstall() {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;
    if (isIOS && !isStandalone) {
        document.getElementById('install-banner').classList.add('show');
    }
}

init();
</script>
