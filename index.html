<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таро AI Компаньйон</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mystic: {
                            900: '#0b0813',
                            800: '#140f24',
                            700: '#221a3a',
                            600: '#342956',
                            gold: '#f3c66f',
                            purple: '#9d4edf'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0813; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #140f24; }
        ::-webkit-scrollbar-thumb { background: #342956; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f3c66f; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8 border-b border-mystic-700 pb-5">
            <h1 class="text-3xl md:text-4xl font-extrabold text-mystic-gold tracking-widest uppercase filter drop-shadow-[0_0_10px_rgba(243,198,111,0.3)]">🔮 Таро AI Компаньйон</h1>
            <p class="text-sm text-purple-300/70 mt-2 font-medium">Конструктор розкладів • Лаконічні тлумачення</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

            <div class="lg:col-span-7 space-y-6">

                <div class="bg-mystic-800 p-5 rounded-2xl border border-mystic-700/60 shadow-2xl">
                    <h2 class="text-lg font-semibold mb-4 text-mystic-gold flex items-center gap-2">✨ 1. Контекст та Тема</h2>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-purple-300 mb-1 font-bold">Сфера життя</label>
                            <select id="theme" class="w-full bg-mystic-900 border border-mystic-700 rounded-xl p-3 text-white focus:outline-none focus:border-mystic-gold transition text-sm">
                                <option value="Загальний аналіз">🪐 Загальний аналіз ситуації</option>
                                <option value="Стосунки та любов">❤️ Стосунки та любов</option>
                                <option value="Кар'єра та реалізація">💼 Кар'єра та реалізація</option>
                                <option value="Фінанси та ресурси">💰 Фінанси та ресурси</option>
                                <option value="Внутрішній стан">🧠 Внутрішній стан / Психологія</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-purple-300 mb-1 font-bold">Тип розкладу</label>
                            <select id="spread" onchange="updateSpreadPositions()" class="w-full bg-mystic-900 border border-mystic-700 rounded-xl p-3 text-white focus:outline-none focus:border-mystic-gold transition text-sm">
                                <option value="Минуле - Теперішнє - Майбутнє">📜 Минуле - Теперішнє - Майбутнє (3)</option>
                                <option value="Вибір з двох варіантів">🔀 Вибір з двох варіантів (5)</option>
                                <option value="Хрест: Аналіз ситуації">✝️ Хрест: Аналіз ситуації (4)</option>
                                <option value="Розвиток процесу">📈 Розвиток процесу (3)</option>
                                <option value="Вільний розклад">🔮 Вільний розклад (до 7 карт)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-wider text-purple-300 mb-1 font-bold">Ваше питання або деталі ситуації</label>
                        <textarea id="question" rows="2" placeholder="Впишіть сюди думки або питання, щоб ШІ дав максимально точну відповідь..." class="w-full bg-mystic-900 border border-mystic-700 rounded-xl p-3 text-white placeholder-mystic-600 focus:outline-none focus:border-mystic-gold resize-none text-sm transition"></textarea>
                    </div>
                </div>

                <div class="bg-mystic-800 p-5 rounded-2xl border border-mystic-700/60 shadow-2xl">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-4 border-b border-mystic-700/50 pb-3">
                        <h2 class="text-lg font-semibold text-mystic-gold">🃏 2. Вибір карт до розкладу</h2>
                        <span id="current-position-hint" class="text-xs bg-mystic-purple/20 border border-mystic-purple/40 text-purple-200 px-3 py-1 rounded-full font-medium"></span>
                    </div>

                    <div class="flex gap-1 overflow-x-auto pb-2 mb-3 text-xs border-b border-mystic-700/30">
                        <button onclick="switchTab('major')" id="tab-major" class="px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-purple text-white">Старші Аркани</button>
                        <button onclick="switchTab('wands')" id="tab-wands" class="px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-900 text-gray-400 hover:text-white">Жезли</button>
                        <button onclick="switchTab('cups')" id="tab-cups" class="px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-900 text-gray-400 hover:text-white">Кубки</button>
                        <button onclick="switchTab('swords')" id="tab-swords" class="px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-900 text-gray-400 hover:text-white">Мечі</button>
                        <button onclick="switchTab('pentacles')" id="tab-pentacles" class="px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-900 text-gray-400 hover:text-white">Пентаклі</button>
                    </div>

                    <div id="cards-pool" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 max-h-72 overflow-y-auto p-2 border border-mystic-700 rounded-xl bg-mystic-900/50">
                    </div>
                </div>

            </div>

            <div class="lg:col-span-5 space-y-6">

                <div class="bg-mystic-800 p-5 rounded-2xl border border-mystic-700/60 shadow-2xl flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-mystic-gold">Поточний розклад</h2>
                        <button onclick="resetSpread()" class="text-xs text-red-400 hover:text-red-300 transition hover:underline">
                            🗑 Скинути все
                        </button>
                    </div>

                    <div id="selected-cards-list" class="space-y-3">
                    </div>
                </div>

                <div class="bg-mystic-800 p-5 rounded-2xl border border-purple-500/30 shadow-2xl bg-gradient-to-b from-mystic-800 to-mystic-900">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-base font-semibold text-mystic-gold">🔮 Тлумачення розкладу</h2>
                        <div id="ai-loading" class="text-xs text-purple-300 animate-pulse hidden">Магія твориться... 🪐</div>
                    </div>

                    <button onclick="sendRequestToAI()" id="ai-btn" class="w-full bg-gradient-to-r from-purple-600 to-mystic-purple text-white font-bold py-3 px-4 rounded-xl hover:brightness-110 transition shadow-lg uppercase tracking-wider text-xs mb-3 active:scale-[0.99]">
                        ✨ Отримати тлумачення
                    </button>

                    <div class="text-sm text-gray-200 bg-mystic-900 p-4 rounded-xl border border-mystic-700/70 min-h-[150px] max-h-96 overflow-y-auto whitespace-pre-wrap leading-relaxed font-sans" id="ai-response">
                        Оберіть карти до розкладу та натисніть кнопку вище, щоб отримати тлумачення від ШІ-Таролога...
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        const tarotDeck = {
            major: ["Дурень", "Маг", "Верховна Жриця", "Імператриця", "Імператор", "Ієрофант", "Закохані", "Колісниця", "Сила", "Відлюдник", "Колесо Фортуни", "Справедливість", "Повішений", "Смерть", "Помірність", "Диявол", "Вежа", "Зірка", "Місяць", "Сонце", "Суд", "Світ"],
            wands: ["Туз Жезлів", "Двійка Жезлів", "Трійка Жезлів", "Четвірка Жезлів", "П'ятірка Жезлів", "Шістка Жезлів", "Сімка Жезлів", "Вісімка Жезлів", "Дев'ятка Жезлів", "Десятка Жезлів", "Паж Жезлів", "Лицар Жezлів", "Королева Жезлів", "Король Жезлів"],
            cups: ["Туз Кубків", "Двійка Кубків", "Трійка Кубків", "Четвірка Кубків", "П'ятірка Кубків", "Шістка Кубків", "Сімка Кубків", "Вісімка Кубків", "Дев'ятка Кубків", "Десятка Кубків", "Паж Кубків", "Лицар Кубків", "Королева Кубків", "Король Кубків"],
            swords: ["Туз Мечів", "Двійка Мечів", "Трійка Мечів", "Четвірка Мечів", "П'ятірка Мечів", "Шістка Мечів", "Сімка Мечів", "Вісімка Мечів", "Дев'ятка Мечів", "Десятка Мечів", "Паж Мечів", "Лицар Мечів", "Королева Мечів", "Король Мечів"],
            pentacles: ["Туз Пентаклів", "Двійка Пентаклів", "Трійка Пентаклів", "Четвірка Пентаклів", "П'ятірка Пентаклів", "Шістка Пентаклів", "Сімка Пентаклів", "Вісімка Пентаклів", "Дев'ятка Пентаклів", "Десятка Пентаклів", "Паж Пентаклів", "Лицар Пентаклів", "Королева Пентаклів", "Король Пентаклів"]
        };

        const spreadTemplates = {
            "Минуле - Теперішнє - Майбутнє": ["Минуле", "Теперішнє", "Майбутнє"],
            "Вибір з двох варіантів": ["Суть вибору", "Варіант А: Розвиток", "Варіант А: Результат", "Варіант Б: Розвиток", "Варіант Б: Результат"],
            "Хрест: Аналіз ситуації": ["Суть ситуації", "Що перешкоджає", "Порада карт", "Ймовірний результат"],
            "Розвиток процесу": ["Найближче майбутнє", "Розвиток ситуації", "Віддалена перспектива"],
            "Вільний розклад": ["Позиція 1", "Позиція 2", "Позиція 3", "Позиція 4", "Позиція 5", "Позиція 6", "Позиція 7"]
        };

        let currentTab = 'major';
        let currentSpreadPositions = [];
        let selectedCards = {};
        let activePositionIndex = 0;

        // --- CORE FUNCTIONS ---

        function init() {
            updateSpreadPositions();
            renderCardsPool();
        }

        window.sendRequestToAI = async function() {
            if (Object.keys(selectedCards).length === 0) {
                alert("Будь ласка, заповніть розклад картами перед відправкою запиту.");
                return;
            }

            const responseBox = document.getElementById('ai-response');
            const loadingText = document.getElementById('ai-loading');
            const aiButton = document.getElementById('ai-btn');

            responseBox.innerText = "ШІ-Таролог налаштовується на вашу енергетику, тасує колоду і вдивляється в таємниці арканів...";
            loadingText.classList.remove('hidden');
            aiButton.disabled = true;
            aiButton.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const requestData = {
                    theme: document.getElementById('theme').value,
                    spreadType: document.getElementById('spread').value,
                    question: document.getElementById('question').value.trim(),
                    cards: selectedCards,
                    positions: currentSpreadPositions
                };

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData),
                });

                const data = await response.json();

                if (response.ok) {
                    responseBox.innerText = data.text;
                } else {
                    console.error("Помилка від сервера:", data.error);
                    responseBox.innerText = `Сталася помилка: ${data.error}\n\nЦе може бути пов'язано з невірним API-ключем на сервері або проблемою з доступом до API Google.`;
                }

            } catch (error) {
                console.error("Помилка при відправці запиту:", error);
                responseBox.innerText = `Не вдалося зв'язатися з сервером-посередником.\nПереконайтеся, що він запущений і доступний.\n\nТехнічна помилка: ${error.message}`;
            } finally {
                loadingText.classList.add('hidden');
                aiButton.disabled = false;
                aiButton.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- RENDER FUNCTIONS ---

        function switchTab(tabName) {
            currentTab = tabName;
            ['major', 'wands', 'cups', 'swords', 'pentacles'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = (t === tabName)
                    ? "px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-purple text-white"
                    : "px-3 py-1.5 rounded-lg font-medium transition whitespace-nowrap bg-mystic-900 text-gray-400 hover:text-white";
            });
            renderCardsPool();
        }

        function renderCardsPool() {
            const pool = document.getElementById('cards-pool');
            pool.innerHTML = '';

            tarotDeck[currentTab].forEach(card => {
                const isSelected = Object.values(selectedCards).some(c => c.name === card);
                const btn = document.createElement('button');

                btn.className = isSelected
                    ? "bg-mystic-purple/40 border border-mystic-purple text-purple-200 text-xs p-2.5 rounded-xl text-center transition opacity-60 cursor-not-allowed w-full truncate"
                    : "bg-mystic-700 hover:bg-mystic-600 hover:border-mystic-gold/40 border border-transparent text-xs p-2.5 rounded-xl text-center transition active:scale-95 w-full truncate";

                btn.innerText = card;
                if (!isSelected) {
                    btn.onclick = () => selectCard(card);
                }
                pool.appendChild(btn);
            });
        }

        function renderSelectedCards() {
            const list = document.getElementById('selected-cards-list');
            list.innerHTML = '';

            currentSpreadPositions.forEach((pos, index) => {
                const cardData = selectedCards[pos];
                const cardBox = document.createElement('div');
                const isActive = index === activePositionIndex;

                const borderClass = isActive
                    ? 'border-mystic-gold bg-mystic-700/40 ring-1 ring-mystic-gold/30'
                    : 'border-mystic-700/50 bg-mystic-900/30';

                cardBox.className = `p-3 rounded-xl border ${borderClass} flex items-center justify-between transition text-sm`;

                if (cardData) {
                    cardBox.innerHTML = `
                        <div class="flex flex-col pr-2">
                            <span class="text-[10px] text-purple-300 font-mono uppercase tracking-wider">${pos}:</span>
                            <span class="font-semibold ${cardData.isInverted ? 'text-purple-300' : 'text-white'} mt-0.5">
                                ${cardData.name} ${cardData.isInverted ? '🙃 (Перевернута)' : '☀️ (Пряма)'}
                            </span>
                        </div>
                        <div class="flex gap-1.5 shrink-0">
                            <button onclick="toggleInversion('${pos}')" class="text-xs bg-mystic-700 hover:bg-mystic-600 px-2 py-1 rounded-lg transition text-gray-200">🔄</button>
                            <button onclick="removeCard('${pos}')" class="text-xs bg-mystic-700/50 hover:bg-red-900/40 border border-transparent hover:border-red-500/30 px-2 py-1 rounded-lg transition text-red-400">❌</button>
                        </div>
                    `;
                } else {
                    cardBox.innerHTML = `
                        <div class="flex flex-col opacity-40 w-full cursor-pointer hover:opacity-70 transition" onclick="setActivePosition(${index})">
                            <span class="text-[10px] text-gray-500 font-mono uppercase tracking-wider">${pos}:</span>
                            <span class="italic text-gray-500 text-xs mt-0.5">[ Обрати карту ]</span>
                        </div>
                    `;
                }
                list.appendChild(cardBox);
            });
        }

        // --- STATE MANAGEMENT ---

        function updateSpreadPositions() {
            const spreadType = document.getElementById('spread').value;
            currentSpreadPositions = spreadTemplates[spreadType];
            resetSpread();
        }

        function updateHint() {
            const hint = document.getElementById('current-position-hint');
            if (activePositionIndex < currentSpreadPositions.length) {
                hint.innerHTML = `👉 Обираємо для: <span class="text-mystic-gold font-bold">"${currentSpreadPositions[activePositionIndex]}"</span>`;
            } else {
                hint.innerText = "✅ Всі позиції заповнено!";
            }
        }

        function selectCard(cardName) {
            if (activePositionIndex >= currentSpreadPositions.length) return;

            const currentPosition = currentSpreadPositions[activePositionIndex];
            selectedCards[currentPosition] = { name: cardName, isInverted: false };

            advanceToNextEmpty();
            renderSelectedCards();
            updateHint();
            renderCardsPool();
        }

        function advanceToNextEmpty() {
            activePositionIndex = currentSpreadPositions.findIndex(pos => !selectedCards[pos]);
            if (activePositionIndex === -1) {
                activePositionIndex = currentSpreadPositions.length;
            }
        }

        function toggleInversion(position) {
            if (selectedCards[position]) {
                selectedCards[position].isInverted = !selectedCards[position].isInverted;
                renderSelectedCards();
            }
        }

        function removeCard(position) {
            delete selectedCards[position];
            advanceToNextEmpty();
            renderSelectedCards();
            updateHint();
            renderCardsPool();
        }

        function setActivePosition(index) {
            activePositionIndex = index;
            updateHint();
            renderSelectedCards();
        }

        function resetSpread() {
            selectedCards = {};
            activePositionIndex = 0;
            document.getElementById('question').value = '';
            document.getElementById('ai-response').innerText = 'Оберіть карти до розкладу та натисніть кнопку вище, щоб отримати тлумачення від ШІ-Таролога...';
            renderSelectedCards();
            updateHint();
            renderCardsPool();
        }

        init();
    </script>
</body>
</html>
