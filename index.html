<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="page_title">Таро AI Компаньйон v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #06020c; --bg-surface: #100a1f; --border-color: #342956;
            --primary-glow-color: rgba(157, 78, 223, 0.4); --secondary-glow-color: rgba(157, 78, 223, 0.2);
            --text-gold: #f3c66f; --text-purple: #9d4edf;
        }
        body.theme-psychologist {
            --primary-glow-color: rgba(20, 184, 166, 0.4); --secondary-glow-color: rgba(20, 184, 166, 0.2);
            --text-gold: #6ee7b7; --text-purple: #2dd4bf;
        }
        body { background-color: var(--bg-main); color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; transition: background-color 0.5s; }
        @keyframes animateStars { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }
        #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; overflow: hidden; }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 2000px; }
        .stars:after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 50px 100px, white, white), radial-gradient(1px 1px at 150px 250px, white, white), radial-gradient(2px 2px at 250px 400px, white, white), radial-gradient(1px 1px at 350px 550px, white, white), radial-gradient(2px 2px at 450px 700px, white, white), radial-gradient(1px 1px at 550px 850px, white, white); }
        #stars1 { animation: animateStars 150s linear infinite; }
        #stars2 { animation: animateStars 100s linear infinite; transform: translateY(-2000px); }
        .neon-glow { box-shadow: 0 0 8px var(--primary-glow-color), 0 0 20px var(--secondary-glow-color); transition: box-shadow 0.5s; }
        .text-gold { color: var(--text-gold); transition: color 0.5s; }
        .text-purple { color: var(--text-purple); transition: color 0.5s; }
        .border-color { border-color: var(--border-color); transition: border-color 0.5s; }
        .bg-surface { background-color: var(--bg-surface); transition: background-color 0.5s; }
        .control-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.75rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .control-card:hover { border-color: var(--text-purple); }
        .control-card.active { border-color: var(--text-gold); background-color: rgba(243, 198, 111, 0.1); box-shadow: 0 0 10px var(--primary-glow-color); }
        .schema-container { display: grid; gap: 10px; padding: 10px; border-radius: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); min-height: 200px; }
        .schema-slot { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: all 0.2s; min-height: 100px; cursor: pointer; }
        .schema-slot.active { border-color: var(--text-gold); transform: scale(1.03); box-shadow: 0 0 15px var(--primary-glow-color); }
        .schema-slot.filled { background-color: rgba(157, 78, 223, 0.1); border-color: var(--text-purple); }
        .slot-number { font-size: 1.5rem; font-weight: 700; color: rgba(255,255,255,0.1); }
        .slot-position-name { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-purple); }
        .slot-card-name { font-size: 0.9rem; font-weight: 600; margin-top: 4px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 2, 12, 0.8); backdrop-filter: blur(5px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #loading-overlay.active { opacity: 1; pointer-events: auto; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-spinner { width: 80px; height: 80px; border: 5px solid rgba(255,255,255,0.2); border-top-color: var(--text-gold); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen theme-mystic">
    <div id="stars-container"><div id="stars1" class="stars"></div><div id="stars2" class="stars"></div></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_mode_sphere">✨ 1. Режим та Сфера</h2>
                    <div class="mb-4"><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_ai_mode">Режим ШІ</label><div id="mode-selector" class="grid grid-cols-2 gap-2"></div></div>
                    <div><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_sphere">Сфера життя</label><div id="sphere-selector" class="grid grid-cols-2 sm:grid-cols-3 gap-2 text-sm"></div><p id="recommendation-text" class="text-xs text-purple mt-2 text-center"></p></div>
                </div>
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_context_spread">🃏 2. Контекст та Розклад</h2>
                    <div class="mb-4"><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_target">На кого ворожимо?</label><div id="target-selector" class="grid grid-cols-2 gap-2"></div><input type="text" id="other-person-input" class="hidden w-full bg-mystic-900 border border-color rounded-xl p-2 text-sm mt-2" data-translate-key="placeholder_other_person" placeholder="Ім'я або роль (напр., 'Партнер')"></div>
                    <div><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_spread_type">Тип розкладу</label><div id="spread-selector" class="grid grid-cols-2 sm:grid-cols-3 gap-2 text-sm"></div></div>
                </div>
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_constructor">🛠️ 3. Конструктор карт</h2>
                    <p id="current-position-hint" class="text-sm text-center mb-4 bg-mystic-900/80 p-2 rounded-lg border border-color"></p>
                    <div class="grid grid-cols-2 gap-4 mb-2">
                        <div id="suit-selector" class="grid grid-cols-2 sm:grid-cols-5 gap-1"></div>
                        <div id="rank-selector" class="grid grid-cols-4 sm:grid-cols-7 gap-1"></div>
                    </div>
                    <div class="mt-4"><h3 class="text-sm font-semibold text-gold mb-2 text-center" data-translate-key="label_card_back">Сорочка карт</h3><div id="theme-selector" class="flex justify-center gap-3"></div></div>
                </div>
            </div>
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <div class="flex items-center justify-between mb-4"><h2 class="text-lg font-semibold text-gold" data-translate-key="section_title_schema">🌙 4. Схема розкладу</h2><button onclick="app.resetSpread()" class="text-xs text-red-400 hover:text-red-300 transition">🗑 <span data-translate-key="btn_reset">Скинути</span></button></div>
                    <div id="spread-schema-container" class="schema-container"></div>
                </div>
                <div id="ai-response-container" class="bg-surface p-5 rounded-2xl border border-purple-500/30 shadow-2xl neon-glow">
                    <h2 class="text-lg font-semibold text-gold mb-3" data-translate-key="section_title_interpretation">✨ 5. Тлумачення від ШІ</h2>
                    <button onclick="app.getSpreadInterpretation()" id="ai-btn" class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-xl hover:brightness-110 transition uppercase tracking-wider text-sm mb-3" data-translate-key="btn_get_interpretation">Отримати тлумачення</button>
                    <div id="ai-response-box" class="text-base bg-mystic-900 p-4 rounded-xl border border-color min-h-[200px] max-h-[60vh] overflow-y-auto flex justify-center items-center"><span id="ai-placeholder" data-translate-key="placeholder_ai_response">Оберіть дію...</span></div>
                </div>
            </div>
        </div>
        <footer class="text-center py-8 mt-8 border-t border-color"><p class="text-sm text-gold" style="filter: drop-shadow(0 0 5px var(--primary-glow-color));">Made with 💜 by Mary • Support Engineer & Tarot Master</p></footer>
    </div>
    <audio id="ambient-music" loop><source src="https://assets.mixkit.co/music/preview/mixkit-a-quiet-thought-2710.mp3" type="audio/mpeg"></audio>
    <div id="loading-overlay"><div class="loader-spinner"></div></div>

</body>
