<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="page_title">Таро AI Компаньйон v8.0 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #07030f; --bg-surface: #140d24; --border-color: #4a3a6c;
            --primary-glow-color: rgba(157, 78, 223, 0.34); --secondary-glow-color: rgba(157, 78, 223, 0.18);
            --text-gold: #f3c66f; --text-purple: #c8a2ff;
            --text-main: #fff9ff; --text-muted: #d8cfee; --field-bg: #211735;
            --panel-soft: rgba(255,255,255,0.09); --panel-strong: #100a1f;
            --panel-readable: #191127; --button-soft: rgba(200,162,255,0.16);
        }
        body.theme-light {
            --bg-main: #f5efe6; --bg-surface: #fffaf2; --border-color: #cdb896;
            --primary-glow-color: rgba(142, 95, 36, 0.18); --secondary-glow-color: rgba(109, 76, 145, 0.1);
            --text-gold: #7e4f15; --text-purple: #5e3f82;
            --text-main: #211729; --text-muted: #5a4d66; --field-bg: #fffdf8;
            --panel-soft: rgba(94,63,130,0.08); --panel-strong: #ffffff;
            --panel-readable: #fffaf2; --button-soft: rgba(94,63,130,0.12);
        }
        html, body { height: 100%; }
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(ellipse at top, var(--bg-surface), var(--bg-main) 70%);
            color: var(--text-main); font-family: system-ui, -apple-system, sans-serif; line-height: 1.55;
            transition: all 0.5s ease;
        }

        .neon-glow { box-shadow: 0 0 8px var(--primary-glow-color), 0 0 20px var(--secondary-glow-color); transition: box-shadow 0.5s; }
        .text-gold { color: var(--text-gold); transition: color 0.5s; }
        .text-purple { color: var(--text-purple); transition: color 0.5s; }
        .border-color { border-color: var(--border-color); transition: border-color 0.5s; }
        .bg-surface { background-color: var(--bg-surface); transition: background-color 0.5s; }
        .bg-mystic-900 { background-color: var(--field-bg); }
        body.theme-light .bg-purple-600 { background-color: #6d4c91 !important; }
        body.theme-light .text-white,
        body.theme-light .text-gray-200,
        body.theme-light .text-gray-300,
        body.theme-light .text-gray-400 { color: var(--text-main) !important; }
        .text-gray-200, .text-gray-300, .text-gray-400 { color: var(--text-muted) !important; }
        body.theme-light input,
        body.theme-light textarea,
        body.theme-light select { color: var(--text-main); }
        body.theme-light ::placeholder { color: rgba(36,26,47,0.5); }

        .control-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.65rem; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 66px; color: var(--text-main); }
        .control-card span { font-size: 0.82rem; line-height: 1.3; overflow-wrap: break-word; word-break: break-word; }
        .control-card:hover { border-color: var(--text-purple); }
        .control-card.active { border-color: var(--text-purple); background-color: var(--panel-soft); box-shadow: 0 0 10px var(--secondary-glow-color); }
        .settings-panel { background-color: var(--panel-readable); border: 1px solid var(--border-color); border-radius: 1rem; padding: 1rem; text-align: left; }
        .top-service-row { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-top: 1.1rem; }
        @media (min-width: 768px) { .top-service-row { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; } }
        .top-service-card { border: 1px solid var(--border-color); border-radius: 1rem; background: var(--panel-readable); padding: 0.85rem; text-align: left; }
        .header-icon-btn { width: 2rem; height: 2rem; display: grid; place-items: center; border: 1px solid var(--border-color); border-radius: 999px; color: var(--text-gold); background: var(--button-soft); transition: all 0.2s ease; }
        .header-icon-btn:hover, .header-icon-btn.active { border-color: var(--text-gold); box-shadow: 0 0 12px var(--secondary-glow-color); }
        .top-focus-row { display: grid; grid-template-columns: 1fr; gap: 0.85rem; margin-top: 1.1rem; text-align: left; }
        @media (min-width: 768px) { .top-focus-row { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: stretch; } }
        .top-focus-row .quick-panel, .top-focus-row .daily-panel { margin-top: 0; }
        .top-settings-panel { display: none; margin-top: 0.9rem; }
        .top-settings-panel.open { display: block; }
        .side-settings-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; color: var(--text-gold); font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.82rem; }
        .top-settings-panel .accordion-wrapper { margin-top: 0.9rem; }
        .top-settings-grid { display: grid; grid-template-columns: 1fr; gap: 0.9rem; }
        @media (min-width: 1024px) { .top-settings-grid { grid-template-columns: 0.8fr 1.4fr 1fr; align-items: start; } }
        .deck-selector-grid { grid-template-columns: 1fr; }
        @media (min-width: 640px) { .deck-selector-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        .deck-card { min-height: 124px; padding: 0.85rem; gap: 0.45rem; }
        .card-back-option { min-height: 92px; gap: 0.35rem; }
        .card-back-thumb { width: 38px; height: 58px; object-fit: cover; border-radius: 0.35rem; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 0 8px rgba(0,0,0,0.4); }

        /* 3D Card Flip - FLEXIBLE HEIGHT SO TEXT NEVER GETS CLIPPED */
        .card-flip-container {
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            aspect-ratio: 2/3;
            min-height: 260px;
            width: 100%;
        }
        .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-flip-container.flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 0.75rem; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 0.75rem; text-align: center; overflow: hidden; box-sizing: border-box;
        }
        .card-front { background: var(--bg-surface); border: 2px solid var(--border-color); }
        .card-back {
            background: linear-gradient(135deg, var(--bg-surface), rgba(157, 78, 223, 0.2));
            border: 3px solid var(--text-purple);
            transform: rotateY(180deg);
            box-shadow: 0 0 20px var(--primary-glow-color), inset 0 0 20px rgba(157, 78, 223, 0.1);
        }
        .card-back-pattern { font-size: 3rem; opacity: 0.3; }

        /* Card back (рубашка) style themes */
        .card-back-cosmic { background: radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%) !important; }
        .card-back-witchy { background: linear-gradient(135deg, #2d1b4e 0%, #1a0033 50%, #0d0221 100%) !important; }
        .card-back-gold { background: linear-gradient(135deg, #f3c66f 0%, #c89b3c 50%, #8b6914 100%) !important; }

        /* Position label on the card back face (front of flip = unrevealed) */
        .slot-number { font-size: clamp(1.1rem, 4vw, 2rem); font-weight: 700; color: rgba(255,255,255,0.15); line-height: 1; }
        .slot-position-name {
            font-size: clamp(0.6rem, 1.6vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-purple);
            background: rgba(0, 0, 0, 0.6);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            line-height: 1.25;
        }
        .card-back-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .slot-back-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.3rem; padding: 0.75rem; background: linear-gradient(180deg, rgba(6,2,12,0.08), rgba(6,2,12,0.45));
            pointer-events: none;
        }

        /* Card info footer - OUTSIDE the flip card, height grows to fit content */
        .slot-card-name {
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            padding: 0 0.25rem;
        }
        .reverse-btn {
            background: rgba(157, 78, 223, 0.3);
            border: 1px solid var(--text-purple);
            color: var(--text-gold);
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .reverse-btn:hover { background: rgba(157, 78, 223, 0.5); transform: scale(1.05); }

        /* Accordion */
        .accordion-wrapper { display: none; margin-top: 0.75rem; }
        .accordion-wrapper.active { display: block; }

        /* Active position pulse */
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow-color); transform: scale(1.03); } 50% { box-shadow: 0 0 25px var(--primary-glow-color), 0 0 35px var(--secondary-glow-color); transform: scale(1.05); } }
        .schema-position-active { animation: pulse-glow 1.5s infinite; border-color: var(--text-gold) !important; }

        /* SCHEMA GRID - rows size to content (auto) so footer text is never clipped */
        .schema-container {
            display: grid;
            gap: 1.5rem;
            padding: 1.25rem;
            border-radius: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            align-items: start;
            min-height: 460px;
        }
        .schema-container.schema-map {
            display: block;
            position: relative;
            min-height: var(--schema-height, 560px);
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 45%, rgba(243,198,111,0.08), transparent 34%),
                linear-gradient(135deg, rgba(157,78,223,0.12), rgba(0,0,0,0.22));
        }
        .schema-slot {
            position: absolute;
            width: clamp(64px, 8.5vw, 96px);
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            align-items: stretch;
            min-width: 0;
        }
        .schema-slot .card-flip-container {
            width: 100%;
            min-height: 0;
        }
        .schema-slot .slot-card-name {
            font-size: 0.68rem;
            line-height: 1.2;
        }
        .schema-slot .reverse-btn {
            font-size: 0.58rem;
            padding: 0.16rem 0.35rem;
        }
        @media (max-width: 640px) {
            .schema-container.schema-map { min-height: var(--schema-mobile-height, 520px); }
            .schema-slot { width: clamp(56px, 16vw, 72px); }
        }
        .schema-container.spread-cross {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, auto);
            gap: 1.5rem;
        }

        /* STRICT GRID POSITIONING FOR CROSS */
        .cross-pos-1 { grid-row: 2; grid-column: 2; } /* Суть - центр */
        .cross-pos-2 { grid-row: 1; grid-column: 2; } /* Перешкода - верх центр */
        .cross-pos-3 { grid-row: 2; grid-column: 1; } /* Порада - лево центр */
        .cross-pos-4 { grid-row: 2; grid-column: 3; } /* Результат - право центр */

        /* Card flight animation */
        @keyframes card-flight {
            from { opacity: 0; transform: translateY(-80px) scale(0.5) rotateY(180deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateY(0deg); }
        }
        .card-flight-animation { animation: card-flight 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        /* Beautiful Loader */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 2, 12, 0.95); backdrop-filter: blur(15px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #loading-overlay.active { opacity: 1; pointer-events: auto; }

        @keyframes crystal-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 30px var(--primary-glow-color)); }
            50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 50px var(--primary-glow-color)) drop-shadow(0 0 80px var(--secondary-glow-color)); }
        }
        @keyframes moon-orbit {
            from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
        }

        .crystal-ball {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), var(--text-purple) 60%, #1a0b2e 100%);
            animation: crystal-pulse 2.5s ease-in-out infinite;
            position: relative;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.2), 0 0 80px var(--primary-glow-color);
        }
        .moon-phase {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            background: radial-gradient(circle, var(--text-gold), rgba(243, 198, 111, 0.3));
            animation: moon-orbit 4s linear infinite;
            box-shadow: 0 0 20px var(--text-gold);
        }

        /* Spread categories */
        .spread-category { margin-bottom: 1.5rem; }
        .spread-category-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gold);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spread-hint {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.25rem;
            font-style: italic;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .control-card.spread-card { min-height: 80px; }

        /* REDESIGNED CONSTRUCTOR */
        .suit-selector-card {
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .suit-selector-card:hover {
            border-color: var(--text-purple);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--primary-glow-color);
        }
        .suit-selector-card.active {
            border-color: var(--text-gold);
            background: rgba(243, 198, 111, 0.1);
            box-shadow: 0 0 20px var(--primary-glow-color);
        }
        .suit-icon { font-size: 2.5rem; }
        .suit-name { font-size: 1rem; font-weight: 600; color: var(--text-gold); overflow-wrap: break-word; word-break: break-word; }

        .card-select-wrapper {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--panel-strong);
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
        }

        /* Card picker: two readable rows instead of a long horizontal scroll */
        .card-carousel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            overflow-x: hidden;
            gap: 0.65rem;
            padding: 1rem 0.5rem;
            margin-top: 1rem;
        }

        /* Neon scrollbar */
        .card-carousel::-webkit-scrollbar {
            height: 8px;
        }
        .card-carousel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .card-carousel::-webkit-scrollbar-thumb {
            background: var(--text-purple);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary-glow-color);
        }
        .card-carousel::-webkit-scrollbar-thumb:hover {
            background: var(--text-gold);
        }

        .card-item {
            min-height: 64px;
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }
        .card-item:hover {
            border-color: var(--text-purple);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--primary-glow-color);
        }
        .card-item.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
        }
        .card-item-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.25;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
        }

        .reversed-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(157, 78, 223, 0.1);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reversed-toggle:hover {
            background: rgba(157, 78, 223, 0.2);
        }
        .reversed-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--text-purple);
        }

        .target-person-wrapper { display: none; margin-top: 0.75rem; }
        .target-person-wrapper.active { display: block; }
        .client-panel { margin-top: 1rem; text-align: left; border: 1px solid var(--border-color); border-radius: 1rem; background: var(--panel-readable); padding: 1rem; }
        .client-form { display: grid; grid-template-columns: 1fr; gap: 0.65rem; }
        @media (min-width: 768px) { .client-form { grid-template-columns: 1fr 1fr auto; align-items: end; } .client-form-notes { grid-column: 1 / 3; } }
        .client-input { width: 100%; background: var(--field-bg); border: 1px solid var(--border-color); border-radius: 0.7rem; padding: 0.65rem 0.75rem; color: var(--text-main); font-size: 0.85rem; }
        .client-add-btn { border-radius: 0.7rem; padding: 0.7rem 0.9rem; background: var(--button-soft); color: var(--text-gold); border: 1px solid var(--border-color); font-weight: 800; font-size: 0.82rem; }
        .client-list { display: grid; grid-template-columns: 1fr; gap: 0.55rem; margin-top: 0.9rem; }
        @media (min-width: 768px) { .client-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        .client-card { border: 1px solid var(--border-color); border-radius: 0.85rem; padding: 0.75rem; background: var(--panel-soft); cursor: pointer; transition: all 0.2s ease; min-width: 0; }
        .client-card:hover, .client-card.active { border-color: var(--text-gold); box-shadow: 0 0 12px var(--secondary-glow-color); }
        .client-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.55rem; }
        .client-name { color: var(--text-gold); font-weight: 900; line-height: 1.2; overflow-wrap: break-word; word-break: break-word; }
        .client-contact, .client-notes { color: var(--text-muted); font-size: 0.76rem; line-height: 1.35; margin-top: 0.25rem; overflow-wrap: break-word; word-break: break-word; }
        .client-delete-btn { flex: 0 0 auto; color: #f87171; font-size: 0.82rem; padding: 0 0.2rem; }
        .client-empty { color: var(--text-muted); font-size: 0.82rem; text-align: center; padding: 0.75rem; border: 1px dashed var(--border-color); border-radius: 0.8rem; }
        .active-client-pill { display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 0.65rem; padding: 0.4rem 0.65rem; border-radius: 999px; border: 1px solid var(--border-color); color: var(--text-gold); background: var(--panel-soft); font-size: 0.78rem; font-weight: 800; }
        .account-panel { margin-top: 1rem; text-align: left; border: 1px solid var(--border-color); border-radius: 1rem; background: var(--panel-readable); padding: 1rem; }
        .auth-mode-tabs { display: inline-flex; gap: 0.35rem; padding: 0.25rem; margin-bottom: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.8rem; background: var(--panel-soft); }
        .auth-mode-btn { border: 0; border-radius: 0.55rem; padding: 0.45rem 0.8rem; color: var(--text-muted); background: transparent; font-size: 0.82rem; font-weight: 700; transition: all 0.2s ease; }
        .auth-mode-btn.active { color: white; background: linear-gradient(135deg, var(--purple), var(--gold)); box-shadow: 0 8px 18px rgba(123, 44, 191, 0.26); }
        .auth-grid { display: grid; grid-template-columns: 1fr; gap: 0.65rem; }
        .auth-message { margin-top: 0.65rem; min-height: 1.1rem; color: var(--text-muted); font-size: 0.78rem; }
        .auth-message.error { color: #ffb4c8; }
        @media (min-width: 768px) { .auth-grid { grid-template-columns: 1fr 1fr auto; align-items: end; } .auth-grid.register-mode { grid-template-columns: 1fr 1fr 1fr auto; } }
        .account-dashboard-head { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.9rem; }
        .account-title { color: var(--text-gold); font-weight: 900; line-height: 1.2; }
        .account-subtitle { color: var(--text-muted); font-size: 0.78rem; margin-top: 0.18rem; }
        .account-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.9rem; }
        .account-tab { border: 1px solid var(--border-color); border-radius: 999px; padding: 0.48rem 0.8rem; color: var(--text-main); background: var(--panel-soft); font-size: 0.78rem; font-weight: 800; }
        .account-tab.active { color: var(--text-gold); border-color: var(--text-gold); box-shadow: 0 0 12px var(--secondary-glow-color); }
        .account-view[hidden], .account-tab-panel[hidden] { display: none; }
        .history-toolbar { display: grid; grid-template-columns: 1fr; gap: 0.65rem; margin-bottom: 0.8rem; }
        @media (min-width: 768px) { .history-toolbar { grid-template-columns: 1fr auto auto; } }
        .history-list { display: grid; gap: 0.65rem; }
        .history-card { border: 1px solid var(--border-color); border-radius: 0.9rem; background: var(--panel-soft); padding: 0.8rem; }
        .history-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.65rem; }
