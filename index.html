<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="page_title">Таро AI Компаньйон v9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #06020c; --bg-surface: #100a1f; --border-color: #342956;
            --primary-glow-color: rgba(157, 78, 223, 0.5); --secondary-glow-color: rgba(157, 78, 223, 0.3);
            --text-gold: #f3c66f; --text-purple: #9d4edf;
        }
        body.theme-psychologist {
            --primary-glow-color: rgba(20, 184, 166, 0.5); --secondary-glow-color: rgba(20, 184, 166, 0.2);
            --text-gold: #6ee7b7; --text-purple: #2dd4bf;
        }
        body.theme-witchy {
            --bg-main: #0f0a1a; --bg-surface: #1a1329; --border-color: #3d2f5c;
            --primary-glow-color: rgba(168, 85, 247, 0.5); --secondary-glow-color: rgba(217, 70, 239, 0.3);
            --text-gold: #e9d5ff; --text-purple: #c084fc;
        }
        html, body { height: 100%; }
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(ellipse at top, var(--bg-surface), var(--bg-main) 70%);
            color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif;
            transition: all 0.5s ease;
        }

        .neon-glow { box-shadow: 0 0 8px var(--primary-glow-color), 0 0 20px var(--secondary-glow-color); transition: box-shadow 0.5s; }
        .text-gold { color: var(--text-gold); transition: color 0.5s; }
        .text-purple { color: var(--text-purple); transition: color 0.5s; }
        .border-color { border-color: var(--border-color); transition: border-color 0.5s; }
        .bg-surface { background-color: var(--bg-surface); transition: background-color 0.5s; }
        .bg-mystic-900 { background-color: rgba(16, 10, 31, 0.8); }

        .control-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 60px; }
        .control-card span { font-size: 0.8rem; line-height: 1.2; }
        .control-card:hover { border-color: var(--text-purple); }
        .control-card.active { border-color: var(--text-gold); background-color: rgba(243, 198, 111, 0.1); box-shadow: 0 0 10px var(--primary-glow-color); }

        /* 3D Card Flip */
        .card-flip-container {
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            aspect-ratio: 2/3;
            min-height: 200px;
        }
        .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-flip-container.flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0.75rem; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1rem; text-align: center; overflow: hidden; }
        .card-front { background: var(--bg-surface); border: 2px solid var(--border-color); }
        .card-back {
            background: linear-gradient(135deg, var(--bg-surface), rgba(157, 78, 223, 0.2));
            border: 3px solid var(--text-purple);
            transform: rotateY(180deg);
            box-shadow: 0 0 20px var(--primary-glow-color), inset 0 0 20px rgba(157, 78, 223, 0.1);
        }

        .tarot-card-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0.75rem; display: block; }

        .card-back-cosmic { background: radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%) !important; }
        .card-back-witchy { background: linear-gradient(135deg, #2d1b4e 0%, #1a0033 50%, #0d0221 100%) !important; }
        .card-back-gold { background: linear-gradient(135deg, #f3c66f 0%, #c89b3c 50%, #8b6914 100%) !important; }

        .reverse-btn {
            background: rgba(157, 78, 223, 0.3);
            border: 1px solid var(--text-purple);
            color: var(--text-gold);
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .reverse-btn:hover { background: rgba(157, 78, 223, 0.5); transform: scale(1.05); }

        .accordion-wrapper { display: none; margin-top: 0.75rem; }
        .accordion-wrapper.active { display: block; }

        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow-color); transform: scale(1.03); } 50% { box-shadow: 0 0 25px var(--primary-glow-color), 0 0 35px var(--secondary-glow-color); transform: scale(1.05); } }
        .schema-position-active { animation: pulse-glow 1.5s infinite; border-color: var(--text-gold) !important; }

        .schema-container {
            display: grid;
            gap: 1.5rem;
            padding: 2rem;
            border-radius: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            min-height: 500px;
        }
        .schema-container.spread-cross {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1.5rem;
        }
        .cross-pos-1 { grid-row: 2; grid-column: 2; }
        .cross-pos-2 { grid-row: 1; grid-column: 2; }
        .cross-pos-3 { grid-row: 2; grid-column: 1; }
        .cross-pos-4 { grid-row: 2; grid-column: 3; }

        @keyframes card-flight {
            from { opacity: 0; transform: translateY(-80px) scale(0.5) rotateY(180deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateY(0deg); }
        }
        .card-flight-animation { animation: card-flight 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        .slot-number { font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.15); }
        .slot-position-name {
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            color: var(--text-purple); background: rgba(0, 0, 0, 0.6);
            padding: 0.25rem 0.5rem; border-radius: 0.25rem;
        }
        .slot-card-name { font-size: 0.9rem; font-weight: 600; margin-top: 0.5rem; overflow-wrap: break-word; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 2, 12, 0.95); backdrop-filter: blur(15px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #loading-overlay.active { opacity: 1; pointer-events: auto; }

        @keyframes crystal-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 30px var(--primary-glow-color)); }
            50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 50px var(--primary-glow-color)) drop-shadow(0 0 80px var(--secondary-glow-color)); }
        }
        @keyframes moon-orbit {
            from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
        }
        .crystal-ball {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), var(--text-purple) 60%, #1a0b2e 100%);
            animation: crystal-pulse 2.5s ease-in-out infinite;
            position: relative;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.2), 0 0 80px var(--primary-glow-color);
        }
        .moon-phase {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            background: radial-gradient(circle, var(--text-gold), rgba(243, 198, 111, 0.3));
            animation: moon-orbit 4s linear infinite;
            box-shadow: 0 0 20px var(--text-gold);
        }

        .spread-category { margin-bottom: 1.5rem; }
        .spread-category-title {
            font-size: 0.85rem; font-weight: 700; color: var(--text-gold);
            margin-bottom: 0.75rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .spread-hint { font-size: 0.65rem; color: rgba(255, 255, 255, 0.5); margin-top: 0.25rem; font-style: italic; }
        .control-card.spread-card { min-height: 80px; }

        .suit-selector-card {
            background: var(--bg-surface); border: 2px solid var(--border-color); border-radius: 1rem;
            padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s;
            min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .suit-selector-card:hover { border-color: var(--text-purple); transform: translateY(-5px); box-shadow: 0 10px 30px var(--primary-glow-color); }
        .suit-selector-card.active { border-color: var(--text-gold); background: rgba(243, 198, 111, 0.1); box-shadow: 0 0 20px var(--primary-glow-color); }
        .suit-icon { font-size: 2.5rem; }
        .suit-name { font-size: 1rem; font-weight: 600; color: var(--text-gold); }

        .card-select-wrapper { margin-top: 1rem; padding: 1rem; background: rgba(0, 0, 0, 0.3); border-radius: 0.75rem; border: 1px solid var(--border-color); }

        .card-carousel { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 0.75rem; padding: 1rem 0.5rem; margin-top: 1rem; }
        .card-carousel::-webkit-scrollbar { height: 8px; }
        .card-carousel::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 10px; }
        .card-carousel::-webkit-scrollbar-thumb { background: var(--text-purple); border-radius: 10px; box-shadow: 0 0 10px var(--primary-glow-color); }
        .card-carousel::-webkit-scrollbar-thumb:hover { background: var(--text-gold); }

        .card-item {
            min-width: 100px; max-width: 100px; background: var(--bg-surface); border: 2px solid var(--border-color);
            border-radius: 0.75rem; padding: 0.75rem 0.5rem; text-align: center; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .card-item:hover { border-color: var(--text-purple); transform: translateY(-5px); box-shadow: 0 5px 15px var(--primary-glow-color); }
        .card-item.disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }
        .card-item-name { font-size: 0.75rem; font-weight: 600; color: white; line-height: 1.2; }

        .reversed-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.75rem; background: rgba(157, 78, 223, 0.1); border-radius: 0.5rem; cursor: pointer; transition: all 0.3s; }
        .reversed-toggle:hover { background: rgba(157, 78, 223, 0.2); }
        .reversed-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--text-purple); }

        .cardback-picker { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .cardback-swatch {
            width: 56px; height: 84px; border-radius: 0.5rem; border: 2px solid var(--border-color);
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            transition: all 0.25s; position: relative;
        }
        .cardback-swatch:hover { transform: translateY(-3px); }
        .cardback-swatch.active { border-color: var(--text-gold); box-shadow: 0 0 14px var(--primary-glow-color); }
        .cardback-swatch .swatch-label {
            position: absolute; bottom: -1.4rem; left: 50%; transform: translateX(-50%);
            font-size: 0.6rem; white-space: nowrap; color: rgba(255,255,255,0.6);
        }

        .journal-entry {
            background: rgba(0,0,0,0.25); border: 1px solid var(--border-color); border-radius: 0.6rem;
            padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s;
        }
        .journal-entry:hover { border-color: var(--text-purple); }
        .journal-entry-date { font-size: 0.65rem; color: var(--text-purple); }
        .journal-entry-title { font-size: 0.8rem; font-weight: 600; color: var(--text-gold); }
        .journal-entry-summary { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 0.2rem; overflow-wrap: break-word; }
        .journal-empty { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: center; padding: 1rem; }

        .card-keyword-chip {
            display: inline-block; background: rgba(157,78,223,0.15); border: 1px solid var(--border-color);
            color: var(--text-gold); font-size: 0.65rem; padding: 0.1rem 0.5rem; border-radius: 1rem; margin: 0.1rem;
        }

        .daily-card-widget {
            display: flex; align-items: center; gap: 1rem; background: rgba(0,0,0,0.25);
            border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.75rem 1rem;
            cursor: pointer; transition: all 0.25s;
        }
        .daily-card-widget:hover { border-color: var(--text-gold); }
        .daily-card-widget img { width: 44px; height: 68px; object-fit: cover; border-radius: 0.3rem; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .ai-text-block { animation: fade-in 0.4s ease; }

        .add-card-btn {
            width: 100%; padding: 0.75rem 1.5rem; margin-top: 1rem;
            background: linear-gradient(135deg, var(--text-purple), rgba(157, 78, 223, 0.6));
            border: none; border-radius: 0.5rem; color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: all 0.3s;
        }
        .add-card-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--primary-glow-color); }
        .add-card-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .icon-btn {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.5rem;
            padding: 0.4rem 0.7rem; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: #e2e8f0;
        }
        .icon-btn:hover { border-color: var(--text-purple); color: var(--text-gold); }

        .api-key-banner {
            background: rgba(243,198,111,0.08); border: 1px solid var(--text-gold); border-radius: 0.6rem;
            padding: 0.6rem 0.9rem; font-size: 0.75rem; margin-bottom: 0.75rem; color: var(--text-gold);
        }
        .api-key-banner input {
            width: 100%; margin-top: 0.4rem; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            border-radius: 0.4rem; padding: 0.4rem 0.6rem; color: white; font-size: 0.75rem;
        }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-8 border-b pb-5 border-color">
            <div class="flex justify-between items-center w-full mb-4">
                <div id="moon-widget" class="text-left text-xs"></div>
                <div class="flex items-center gap-4">
                    <div id="theme-toggle" class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                        <span class="text-gray-400">🔮 Neon</span>
                        <div class="w-12 h-6 bg-gray-700 rounded-full p-0.5 flex items-center transition-all duration-300">
                            <div id="theme-pill" class="w-5 h-5 bg-white rounded-full transform transition-transform duration-300"></div>
                        </div>
                        <span class="text-white">🖤 Witchy</span>
                    </div>
                    <div id="lang-toggle" class="flex items-center gap-2 text-sm font-medium cursor-pointer"><span class="text-gray-400">RU</span><div class="w-10 h-5 bg-gray-700 rounded-full p-0.5 flex items-center transition-all duration-300"><div id="lang-pill" class="w-4 h-4 bg-white rounded-full transform transition-transform duration-300"></div></div><span class="text-white">UA</span></div>
                    <button id="music-toggle" class="text-2xl">🔇</button>
                </div>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-widest uppercase text-gold" style="filter: drop-shadow(0 0 10px var(--primary-glow-color));" data-translate-key="main_title"></h1>

            <div class="mt-5 flex justify-center">
                <div id="daily-card-widget" class="daily-card-widget"></div>
            </div>

            <div class="mt-6 flex justify-center gap-4 flex-wrap">
                <button id="rules-toggle" class="text-sm text-purple hover:text-gold transition" data-translate-key="rules_toggle">📜 Свод правил таролога</button>
                <button id="journal-toggle" class="text-sm text-purple hover:text-gold transition" data-translate-key="journal_toggle">📖 Журнал розкладів</button>
            </div>
            <div id="rules-wrapper" class="accordion-wrapper">
                <div class="text-left bg-surface border border-color rounded-xl p-4 max-w-2xl mx-auto">
                    <ol class="list-decimal list-inside space-y-2 text-sm" id="rules-list"></ol>
                </div>
            </div>
            <div id="journal-wrapper" class="accordion-wrapper">
                <div class="text-left bg-surface border border-color rounded-xl p-4 max-w-2xl mx-auto max-h-80 overflow-y-auto">
                    <div id="journal-list"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_mode_sphere"></h2>
                    <div class="mb-4"><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_ai_mode"></label><div id="mode-selector" class="grid grid-cols-2 gap-2"></div></div>
                    <div><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_sphere"></label><div id="sphere-selector" class="grid grid-cols-2 sm:grid-cols-3 gap-2 text-sm"></div><p id="recommendation-text" class="text-xs text-purple mt-2 text-center"></p></div>
                </div>
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_context_spread"></h2>
                    <div class="mb-4"><label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_target"></label><div id="target-selector" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div></div>

                    <div id="other-person-wrapper" class="mb-4" style="display:none;">
                        <label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_other_person">Ім'я / опис іншої людини</label>
                        <input id="other-person-input" type="text" class="w-full bg-mystic-900 border border-color rounded-lg px-3 py-2 text-sm text-white" />
                    </div>

                    <div class="mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-bold text-purple" data-translate-key="label_question">Ваше питання</label>
                            <button id="refine-question-btn" class="text-xs text-gold hover:brightness-125 transition" title="Сформулювати питання правильно">✨🪄</button>
                        </div>
                        <textarea id="question" class="w-full bg-mystic-900 border border-color rounded-lg px-3 py-2 text-sm text-white" rows="2" data-placeholder-ua="Ваше питання (необов'язково)" data-placeholder-ru="Ваш вопрос (необязательно)"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-purple mb-3" data-translate-key="label_spread_type"></label>
                        <div id="spread-selector"></div>
                    </div>
                </div>

                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <h2 class="text-lg font-semibold mb-4 text-gold" data-translate-key="section_title_constructor"></h2>
                    <p id="current-position-hint" class="text-sm text-center mb-4 bg-mystic-900/80 p-2 rounded-lg border border-color"></p>

                    <div class="mb-4">
                        <label class="block text-sm font-bold text-purple mb-3" data-translate-key="constructor_step1">Крок 1: Оберіть групу/масть</label>
                        <div id="suit-grid" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
                    </div>

                    <div id="card-selection-step" class="card-select-wrapper" style="display: none;">
                        <label class="block text-sm font-bold text-purple mb-2" data-translate-key="constructor_step2">Крок 2: Оберіть карту</label>
                        <div id="card-carousel" class="card-carousel"></div>
                        <div class="reversed-toggle" onclick="App.toggleReversedPreview()">
                            <input type="checkbox" id="reversed-checkbox" class="reversed-checkbox">
                            <label for="reversed-checkbox" class="text-sm font-semibold cursor-pointer" data-translate-key="constructor_reversed">🔄 Зробити перевернутою</label>
                        </div>
                        <button id="random-draw-btn" class="add-card-btn" style="background: linear-gradient(135deg, var(--text-gold), rgba(243,198,111,0.5)); color:#1a0b2e;" data-translate-key="btn_random_draw">🎲 Витягнути випадкову карту</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div class="bg-surface p-5 rounded-2xl border border-color neon-glow">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gold" data-translate-key="section_title_schema"></h2>
                        <button id="reset-btn" class="text-xs text-red-400 hover:text-red-300 transition">🗑 <span data-translate-key="btn_reset"></span></button>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-bold text-purple mb-2" data-translate-key="label_card_back">Вибір сорочки карт</label>
                        <div id="card-back-selector" class="cardback-picker"></div>
                    </div>

                    <div id="spread-schema-container" class="schema-container"></div>
                </div>
                <div id="ai-response-container" class="bg-surface p-5 rounded-2xl border border-purple-500/30 shadow-2xl neon-glow">
                    <h2 class="text-lg font-semibold text-gold mb-3" data-translate-key="section_title_interpretation"></h2>

                    <div id="api-key-banner" class="api-key-banner" style="display:none;">
                        <span data-translate-key="api_key_hint">🔑 Введіть свій Anthropic API ключ для отримання тлумачень (зберігається лише у вашому браузері):</span>
                        <input id="api-key-input" type="password" placeholder="sk-ant-..." />
                    </div>

                    <button id="ai-btn" class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-xl hover:brightness-110 transition uppercase tracking-wider text-sm mb-3" data-translate-key="btn_get_interpretation"></button>

                    <div class="flex gap-2 mb-3">
                        <button id="save-reading-btn" class="icon-btn flex-1" data-translate-key="btn_save_reading">💾 Зберегти в журнал</button>
                        <button id="copy-reading-btn" class="icon-btn flex-1" data-translate-key="btn_copy_reading">📋 Копіювати</button>
                    </div>
