<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="page_title">Таро AI Компаньйон v8.0 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #06020c; --bg-surface: #100a1f; --border-color: #342956;
            --primary-glow-color: rgba(157, 78, 223, 0.5); --secondary-glow-color: rgba(157, 78, 223, 0.3);
            --text-gold: #f3c66f; --text-purple: #9d4edf;
        }
        body.theme-psychologist {
            --primary-glow-color: rgba(20, 184, 166, 0.5); --secondary-glow-color: rgba(20, 184, 166, 0.2);
            --text-gold: #6ee7b7; --text-purple: #2dd4bf;
        }
        body.theme-witchy {
            --bg-main: #0f0a1a; --bg-surface: #1a1329; --border-color: #3d2f5c;
            --primary-glow-color: rgba(168, 85, 247, 0.5); --secondary-glow-color: rgba(217, 70, 239, 0.3);
            --text-gold: #e9d5ff; --text-purple: #c084fc;
        }
        html, body { height: 100%; }
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(ellipse at top, var(--bg-surface), var(--bg-main) 70%);
            color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif;
            transition: all 0.5s ease;
        }

        .neon-glow { box-shadow: 0 0 8px var(--primary-glow-color), 0 0 20px var(--secondary-glow-color); transition: box-shadow 0.5s; }
        .text-gold { color: var(--text-gold); transition: color 0.5s; }
        .text-purple { color: var(--text-purple); transition: color 0.5s; }
        .border-color { border-color: var(--border-color); transition: border-color 0.5s; }
        .bg-surface { background-color: var(--bg-surface); transition: background-color 0.5s; }
        .bg-mystic-900 { background-color: rgba(16, 10, 31, 0.8); }

        .control-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 60px; }
        .control-card span { font-size: 0.8rem; line-height: 1.2; overflow-wrap: break-word; word-break: break-word; }
        .control-card:hover { border-color: var(--text-purple); }
        .control-card.active { border-color: var(--text-gold); background-color: rgba(243, 198, 111, 0.1); box-shadow: 0 0 10px var(--primary-glow-color); }
        .settings-panel { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 1rem; text-align: left; }
        .deck-selector-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        @media (min-width: 768px) { .deck-selector-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        .card-back-option { min-height: 92px; gap: 0.35rem; }
        .card-back-thumb { width: 38px; height: 58px; object-fit: cover; border-radius: 0.35rem; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 0 8px rgba(0,0,0,0.4); }

        /* 3D Card Flip - FLEXIBLE HEIGHT SO TEXT NEVER GETS CLIPPED */
        .card-flip-container {
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            aspect-ratio: 2/3;
            min-height: 260px;
            width: 100%;
        }
        .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-flip-container.flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 0.75rem; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 0.75rem; text-align: center; overflow: hidden; box-sizing: border-box;
        }
        .card-front { background: var(--bg-surface); border: 2px solid var(--border-color); }
        .card-back {
            background: linear-gradient(135deg, var(--bg-surface), rgba(157, 78, 223, 0.2));
            border: 3px solid var(--text-purple);
            transform: rotateY(180deg);
            box-shadow: 0 0 20px var(--primary-glow-color), inset 0 0 20px rgba(157, 78, 223, 0.1);
        }
        .card-back-pattern { font-size: 3rem; opacity: 0.3; }

        /* Card back (рубашка) style themes */
        .card-back-cosmic { background: radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%) !important; }
        .card-back-witchy { background: linear-gradient(135deg, #2d1b4e 0%, #1a0033 50%, #0d0221 100%) !important; }
        .card-back-gold { background: linear-gradient(135deg, #f3c66f 0%, #c89b3c 50%, #8b6914 100%) !important; }

        /* Position label on the card back face (front of flip = unrevealed) */
        .slot-number { font-size: clamp(1.1rem, 4vw, 2rem); font-weight: 700; color: rgba(255,255,255,0.15); line-height: 1; }
        .slot-position-name {
            font-size: clamp(0.6rem, 1.6vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-purple);
            background: rgba(0, 0, 0, 0.6);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            line-height: 1.25;
        }
        .card-back-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .slot-back-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.3rem; padding: 0.75rem; background: linear-gradient(180deg, rgba(6,2,12,0.08), rgba(6,2,12,0.45));
            pointer-events: none;
        }

        /* Card info footer - OUTSIDE the flip card, height grows to fit content */
        .slot-card-name {
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            padding: 0 0.25rem;
        }
        .reverse-btn {
            background: rgba(157, 78, 223, 0.3);
            border: 1px solid var(--text-purple);
            color: var(--text-gold);
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .reverse-btn:hover { background: rgba(157, 78, 223, 0.5); transform: scale(1.05); }

        /* Accordion */
        .accordion-wrapper { display: none; margin-top: 0.75rem; }
        .accordion-wrapper.active { display: block; }

        /* Active position pulse */
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow-color); transform: scale(1.03); } 50% { box-shadow: 0 0 25px var(--primary-glow-color), 0 0 35px var(--secondary-glow-color); transform: scale(1.05); } }
        .schema-position-active { animation: pulse-glow 1.5s infinite; border-color: var(--text-gold) !important; }

        /* SCHEMA GRID - rows size to content (auto) so footer text is never clipped */
        .schema-container {
            display: grid;
            gap: 1.5rem;
            padding: 2rem;
            border-radius: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            align-items: start;
        }
        .schema-container.spread-cross {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, auto);
            gap: 1.5rem;
        }

        /* STRICT GRID POSITIONING FOR CROSS */
        .cross-pos-1 { grid-row: 2; grid-column: 2; } /* Суть - центр */
        .cross-pos-2 { grid-row: 1; grid-column: 2; } /* Перешкода - верх центр */
        .cross-pos-3 { grid-row: 2; grid-column: 1; } /* Порада - лево центр */
        .cross-pos-4 { grid-row: 2; grid-column: 3; } /* Результат - право центр */

        /* Card flight animation */
        @keyframes card-flight {
            from { opacity: 0; transform: translateY(-80px) scale(0.5) rotateY(180deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateY(0deg); }
        }
        .card-flight-animation { animation: card-flight 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        /* Beautiful Loader */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 2, 12, 0.95); backdrop-filter: blur(15px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #loading-overlay.active { opacity: 1; pointer-events: auto; }

        @keyframes crystal-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 30px var(--primary-glow-color)); }
            50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 50px var(--primary-glow-color)) drop-shadow(0 0 80px var(--secondary-glow-color)); }
        }
        @keyframes moon-orbit {
            from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
        }

        .crystal-ball {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), var(--text-purple) 60%, #1a0b2e 100%);
            animation: crystal-pulse 2.5s ease-in-out infinite;
            position: relative;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.2), 0 0 80px var(--primary-glow-color);
        }
        .moon-phase {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            background: radial-gradient(circle, var(--text-gold), rgba(243, 198, 111, 0.3));
            animation: moon-orbit 4s linear infinite;
            box-shadow: 0 0 20px var(--text-gold);
        }

        /* Spread categories */
        .spread-category { margin-bottom: 1.5rem; }
        .spread-category-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gold);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spread-hint {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.25rem;
            font-style: italic;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .control-card.spread-card { min-height: 80px; }

        /* REDESIGNED CONSTRUCTOR */
        .suit-selector-card {
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .suit-selector-card:hover {
            border-color: var(--text-purple);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--primary-glow-color);
        }
        .suit-selector-card.active {
            border-color: var(--text-gold);
            background: rgba(243, 198, 111, 0.1);
            box-shadow: 0 0 20px var(--primary-glow-color);
        }
        .suit-icon { font-size: 2.5rem; }
        .suit-name { font-size: 1rem; font-weight: 600; color: var(--text-gold); overflow-wrap: break-word; word-break: break-word; }

        .card-select-wrapper {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
        }

        /* HORIZONTAL CARD CAROUSEL */
        .card-carousel {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 0.75rem;
            padding: 1rem 0.5rem;
            margin-top: 1rem;
        }

        /* Neon scrollbar */
        .card-carousel::-webkit-scrollbar {
            height: 8px;
        }
        .card-carousel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .card-carousel::-webkit-scrollbar-thumb {
            background: var(--text-purple);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary-glow-color);
        }
        .card-carousel::-webkit-scrollbar-thumb:hover {
            background: var(--text-gold);
        }

        .card-item {
            min-width: 108px;
            max-width: 108px;
            min-height: 64px;
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-item:hover {
            border-color: var(--text-purple);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--primary-glow-color);
        }
        .card-item.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
        }
        .card-item-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            line-height: 1.25;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: normal;
        }

        .reversed-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(157, 78, 223, 0.1);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reversed-toggle:hover {
            background: rgba(157, 78, 223, 0.2);
        }
        .reversed-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--text-purple);
        }

        .target-person-wrapper { display: none; margin-top: 0.75rem; }
        .target-person-wrapper.active { display: block; }
        .client-panel { margin-top: 1rem; text-align: left; border: 1px solid var(--border-color); border-radius: 1rem; background: rgba(255,255,255,0.035); padding: 1rem; }
        .client-form { display: grid; grid-template-columns: 1fr; gap: 0.65rem; }
        @media (min-width: 768px) { .client-form { grid-template-columns: 1fr 1fr auto; align-items: end; } .client-form-notes { grid-column: 1 / 3; } }
        .client-input { width: 100%; background: rgba(16,10,31,0.82); border: 1px solid var(--border-color); border-radius: 0.7rem; padding: 0.65rem 0.75rem; color: white; font-size: 0.85rem; }
        .client-add-btn { border-radius: 0.7rem; padding: 0.7rem 0.9rem; background: rgba(157,78,223,0.28); color: var(--text-gold); border: 1px solid var(--border-color); font-weight: 800; font-size: 0.82rem; }
        .client-list { display: grid; grid-template-columns: 1fr; gap: 0.55rem; margin-top: 0.9rem; }
        @media (min-width: 768px) { .client-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        .client-card { border: 1px solid var(--border-color); border-radius: 0.85rem; padding: 0.75rem; background: rgba(0,0,0,0.18); cursor: pointer; transition: all 0.2s ease; min-width: 0; }
        .client-card:hover, .client-card.active { border-color: var(--text-gold); box-shadow: 0 0 12px var(--secondary-glow-color); }
        .client-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.55rem; }
        .client-name { color: var(--text-gold); font-weight: 900; line-height: 1.2; overflow-wrap: break-word; word-break: break-word; }
        .client-contact, .client-notes { color: rgba(255,255,255,0.7); font-size: 0.76rem; line-height: 1.35; margin-top: 0.25rem; overflow-wrap: break-word; word-break: break-word; }
        .client-delete-btn { flex: 0 0 auto; color: #f87171; font-size: 0.82rem; padding: 0 0.2rem; }
        .client-empty { color: rgba(255,255,255,0.62); font-size: 0.82rem; text-align: center; padding: 0.75rem; border: 1px dashed var(--border-color); border-radius: 0.8rem; }
        .active-client-pill { display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 0.65rem; padding: 0.4rem 0.65rem; border-radius: 999px; border: 1px solid var(--border-color); color: var(--text-gold); background: rgba(255,255,255,0.045); font-size: 0.78rem; font-weight: 800; }

        /* Reading preview + full-screen interpretation modal */
        .reading-preview { width: 100%; text-align: left; }
        .reading-preview-header { text-align: center; margin-bottom: 1rem; }
        .reading-preview-title { font-size: 1.15rem; font-weight: 800; color: var(--text-gold); }
        .reading-preview-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.62); margin-top: 0.25rem; }
        .reading-question-box { margin: 0.9rem 0; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 0.85rem; background: rgba(0,0,0,0.24); }
        .reading-question-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-purple); font-weight: 800; margin-bottom: 0.35rem; }
        .reading-question-text { font-size: 0.9rem; color: rgba(255,255,255,0.9); line-height: 1.45; }
        .reading-cards-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem; }
        @media (min-width: 640px) { .reading-cards-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        .reading-card-mini { border: 1px solid var(--border-color); border-radius: 0.9rem; padding: 0.65rem; background: rgba(255,255,255,0.035); display: flex; gap: 0.65rem; align-items: center; min-width: 0; }
        .reading-card-thumb { width: 44px; height: 70px; flex: 0 0 auto; border-radius: 0.5rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.35); }
        .reading-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .reading-card-thumb.reversed img, .reading-card-thumb.reversed > div { transform: rotate(180deg); }
        .reading-card-meta { min-width: 0; }
        .reading-card-position { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-purple); font-weight: 800; line-height: 1.2; }
        .reading-card-name { font-size: 0.82rem; color: var(--text-gold); font-weight: 800; line-height: 1.2; margin-top: 0.2rem; overflow-wrap: break-word; word-break: break-word; }
        .reading-card-orientation { font-size: 0.68rem; color: rgba(255,255,255,0.65); margin-top: 0.2rem; }
        .reading-actions { display: grid; grid-template-columns: 1fr; gap: 0.6rem; margin-top: 1rem; }
        @media (min-width: 640px) { .reading-actions { grid-template-columns: 1.3fr 1fr 1fr; } }
        .reading-action-primary, .reading-action-secondary { border-radius: 0.85rem; padding: 0.78rem 0.9rem; font-weight: 800; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.2s ease; }
        .reading-action-primary { background: linear-gradient(135deg, var(--text-purple), #7c3aed); color: white; box-shadow: 0 0 18px var(--secondary-glow-color); }
        .reading-action-primary:hover, .reading-action-secondary:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .reading-action-secondary { background: rgba(255,255,255,0.06); color: var(--text-gold); border: 1px solid var(--border-color); }
        .result-modal { position: fixed; inset: 0; z-index: 1100; display: none; align-items: center; justify-content: center; padding: 1rem; background: rgba(6,2,12,0.86); backdrop-filter: blur(18px); }
        .result-modal.active { display: flex; }
        .result-modal-panel { width: min(920px, 100%); max-height: 90vh; overflow: hidden; border: 1px solid var(--border-color); border-radius: 1.35rem; background: linear-gradient(180deg, rgba(16,10,31,0.98), rgba(6,2,12,0.98)); box-shadow: 0 0 45px var(--primary-glow-color); display: flex; flex-direction: column; }
        .result-modal-header { padding: 1rem 1.1rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .result-modal-title { color: var(--text-gold); font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .result-modal-close { width: 2.2rem; height: 2.2rem; border-radius: 999px; border: 1px solid var(--border-color); color: var(--text-gold); background: rgba(255,255,255,0.05); font-weight: 900; }
        .result-modal-body { padding: 1rem; overflow-y: auto; }
        .result-summary { border: 1px solid var(--border-color); border-radius: 1rem; padding: 0.9rem; background: linear-gradient(135deg, rgba(157,78,223,0.16), rgba(243,198,111,0.07)); margin-bottom: 0.9rem; }
        .result-summary-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.75rem; }
        .result-summary-kicker { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-purple); font-weight: 900; }
        .result-summary-title { margin-top: 0.2rem; color: var(--text-gold); font-size: 1.05rem; font-weight: 900; line-height: 1.2; }
        .result-summary-count { flex: 0 0 auto; min-width: 2.35rem; height: 2.35rem; border-radius: 999px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.24); color: var(--text-gold); font-weight: 900; }
        .result-modal-cards { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 0.55rem; margin: 0.75rem 0 1rem; }
        @media (min-width: 640px) { .result-modal-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        .result-modal-card-chip { min-width: 0; border: 1px solid var(--border-color); border-radius: 0.85rem; padding: 0.6rem 0.7rem; background: rgba(255,255,255,0.045); display: grid; grid-template-columns: auto 1fr; gap: 0.55rem; align-items: center; }
        .result-card-number { width: 1.7rem; height: 1.7rem; border-radius: 999px; display: grid; place-items: center; background: rgba(243,198,111,0.12); color: var(--text-gold); font-size: 0.72rem; font-weight: 900; }
        .result-card-position { color: var(--text-purple); font-size: 0.66rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .result-card-name { color: rgba(255,255,255,0.9); font-size: 0.82rem; font-weight: 800; line-height: 1.2; overflow-wrap: break-word; word-break: break-word; }

        DECKS_DIR: 'assets/decks',

        // Compute a centered grid of (x,y) points inside a box for pip layouts
        gridPoints(count, box) {
            const { x, y, w, h } = box;
            const cols = count <= 1 ? 1 : count <= 4 ? 2 : count <= 9 ? 3 : 4;
            const rows = Math.ceil(count / cols);
            const points = [];
            for (let i = 0; i < count; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const itemsInRow = (row === rows - 1) ? (count - cols * (rows - 1)) : cols;
                const rowOffset = (cols - itemsInRow) / 2;
                const px = x + (col + rowOffset + 0.5) * (w / cols);
                const py = y + (row + 0.5) * (h / rows);
                points.push([px, py]);
            }
            return points;
        },

        fallbackArtNode(cardId) {

            wrapper.innerHTML = this.buildCardArt(cardId);
            return wrapper;

        // Returns an <svg> markup string for the given cardId, ready to inject via innerHTML.
        buildCardArt(cardId) {
            const [suit, idxStr] = cardId.split('_');
            const idx = parseInt(idxStr, 10);
            const uid = `card${this.uidCounter++}`;

            if (suit === 'major') {
                const symbol = this.majorSymbols[idx] || '✨';
                const roman = this.majorRoman[idx] || '';
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <radialGradient id="g-${uid}" cx="50%" cy="38%" r="75%">
                            <stop offset="0%" stop-color="#3d2566"/>
                            <stop offset="100%" stop-color="#150a26"/>
                        </radialGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="#c084fc" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="#9d4edf" stroke-width="1" opacity="0.6"/>
                    <text x="100" y="46" font-size="20" text-anchor="middle" font-family="Georgia, serif" fill="#f3c66f" font-weight="700">${roman}</text>
                    <text x="100" y="190" font-size="64" text-anchor="middle" dominant-baseline="middle">${symbol}</text>
                    <circle cx="100" cy="190" r="78" fill="none" stroke="#f3c66f" stroke-width="1" opacity="0.35"/>
                    <text x="100" y="305" font-size="11" text-anchor="middle" fill="#c084fc" font-family="sans-serif" letter-spacing="3">ARCANA</text>
                </svg>`;
            }

            const theme = this.suitTheme[suit] || this.suitTheme.wands;

            if (idx < 10) {
                // Pip card: value 1..10, draw that many suit icons in a grid
                const value = idx + 1;
                const points = this.gridPoints(value, { x: 30, y: 80, w: 140, h: 175 });
                const icons = points.map(([px, py]) =>
                    `<text x="${px.toFixed(1)}" y="${py.toFixed(1)}" font-size="26" text-anchor="middle" dominant-baseline="middle">${theme.icon}</text>`
                ).join('');
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="g-${uid}" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="${theme.c2}"/>
                            <stop offset="100%" stop-color="${theme.c1}"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="${theme.accent}" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.5"/>
                    <text x="22" y="34" font-size="20" font-family="Georgia, serif" fill="${theme.accent}" font-weight="700">${value}</text>
                    <text x="178" y="318" font-size="20" font-family="Georgia, serif" fill="${theme.accent}" font-weight="700" text-anchor="end">${value}</text>
                    ${icons}
                </svg>`;
            } else {
                // Court card: page/knight/queen/king
                const courtIdx = idx - 10;
                const figure = this.courtSymbols[courtIdx] || '🧑';
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="g-${uid}" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="${theme.c2}"/>
                            <stop offset="100%" stop-color="${theme.c1}"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="${theme.accent}" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.5"/>
                    <circle cx="100" cy="150" r="70" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.4"/>
                    <text x="100" y="172" font-size="72" text-anchor="middle" dominant-baseline="middle">${figure}</text>
                    <text x="100" y="270" font-size="34" text-anchor="middle" dominant-baseline="middle">${theme.icon}</text>
                </svg>`;
            }
        },

        translateCardName(cardId) {
            const [suit, rankIndex] = cardId.split('_');

            if (suit === 'major') {

            } else {

                const suitName = this.data.cards.suits[this.state.lang][suit];
                return `${rank} ${suitName}`;

            const savedLang = localStorage.getItem('tarot_lang');

            if (savedTheme) this.state.theme = savedTheme;

                this.state.clients = savedClients ? JSON.parse(savedClients) : [];

                this.state.clients = [];

            createButtons('deck-selector', this.data.decks, 'deck', this.state.lang);

            // Spread selector with categories
            this.renderSpreadSelector();

        renderCardBackSelector() {
            const container = document.getElementById('card-back-selector');
            if (!container) return;
            const deck = this.getCurrentDeck();
            container.innerHTML = deck.backs.map(item => `
                <button class="control-card card-back-option" data-group="cardBack" data-key="${item.key}">
                    <img class="card-back-thumb" src="${this.DECKS_DIR}/${deck.dir}/${item.file}" alt="${item[this.state.lang]}" loading="lazy">
                    <span>${item[this.state.lang]}</span>
                </button>
            `).join('');
        },

        renderSpreadSelector() {
            const container = document.getElementById('spread-selector');
            let html = '';

            Object.keys(this.data.spreadCategories).forEach(catKey => {
                const category = this.data.spreadCategories[catKey];
                html += `<div class="spread-category">`;
                html += `<div class="spread-category-title">${category[this.state.lang]}</div>`;
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">`;

                category.spreads.forEach(spreadKey => {
                    const spread = this.data.spreads[spreadKey];
                    const hint = spread[`hint_${this.state.lang}`];
                    html += `<button class="control-card spread-card" data-group="spread" data-key="${spreadKey}">
                        <span>${spread[this.state.lang]}</span>
                        <div class="spread-hint">${hint}</div>
                    </button>`;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        },

        renderSuitSelector() {
            const suits = [
                { key: 'major', icon: '✨', name: this.translations[this.state.lang].suit_major },
                { key: 'wands', icon: '🪄', name: this.translations[this.state.lang].suit_wands },
                { key: 'cups', icon: '🏆', name: this.translations[this.state.lang].suit_cups },
                { key: 'swords', icon: '⚔️', name: this.translations[this.state.lang].suit_swords },
                { key: 'pentacles', icon: '🪙', name: this.translations[this.state.lang].suit_pentacles }
            ];

            const container = document.getElementById('suit-grid');
            container.innerHTML = suits.map(suit => `
                <div class="suit-selector-card ${this.state.activeSuit === suit.key ? 'active' : ''}" onclick="App.selectSuit('${suit.key}')">
                    <div class="suit-icon">${suit.icon}</div>
                    <div class="suit-name">${suit.name}</div>
                </div>
            `).join('');
        },

        selectSuit(suitKey) {
            this.state.activeSuit = suitKey;
            this.renderSuitSelector();
            this.renderCardCarousel();
            document.getElementById('card-selection-step').style.display = 'block';
        },

        renderCardCarousel() {
            const carousel = document.getElementById('card-carousel');
            const isMajor = this.state.activeSuit === 'major';
            const ranks = isMajor ? this.data.cards.major[this.state.lang] : this.data.cards.minor[this.state.lang];

            let html = '';
            ranks.forEach((rank, index) => {
                const cardId = isMajor ? `major_${index}` : `${this.state.activeSuit}_${index}`;
                const cardName = isMajor ? rank : `${rank} ${this.data.cards.suits[this.state.lang][this.state.activeSuit]}`;
                const isUsed = Object.values(this.state.selectedCards).some(c => c.id === cardId);
                const disabledClass = isUsed ? 'disabled' : '';

                html += `
                    <div class="card-item ${disabledClass}" onclick="App.selectCardFromCarousel('${cardId}', ${isUsed})">
                        <div class="card-item-name">${rank}</div>
                    </div>
                `;
            });

            carousel.innerHTML = html;
        },

        selectCardFromCarousel(cardId, isUsed) {
            const cardName = this.translateCardName(cardId);
            if (isUsed) {
                alert(this.translations[this.state.lang].alert_card_already_in(cardName));
                return;
            }

            const schema = this.data.spreads[this.state.spreadKey];
            if (this.state.activePositionIndex >= schema.cards) return;

            const posName = schema.positions[this.state.lang][this.state.activePositionIndex];
            this.state.selectedCards[posName] = {
                id: cardId,
                name: cardName,
                isReversed: this.state.previewReversed
            };

            // Play sound
            this.playSound('card-select-sound');

            // Reset
            this.state.previewReversed = false;
            document.getElementById('reversed-checkbox').checked = false;

            const nextIndex = schema.positions[this.state.lang].findIndex((_, i) => !this.state.selectedCards[schema.positions[this.state.lang][i]]);
            this.state.activePositionIndex = (nextIndex === -1) ? schema.cards : nextIndex;

            this.updateUI();
        },

        toggleReversedPreview() {
            this.state.previewReversed = !this.state.previewReversed;
            document.getElementById('reversed-checkbox').checked = this.state.previewReversed;
        },

        toggleCardReversed(posName) {
            if (this.state.selectedCards[posName]) {
                this.state.selectedCards[posName].isReversed = !this.state.selectedCards[posName].isReversed;
                this.updateUI();
            }
        },

        addEventListeners() {
            document.getElementById('lang-toggle').addEventListener('click', () => this.toggleLanguage());
            document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
            document.getElementById('reset-btn').addEventListener('click', () => this.resetSpread());
            document.getElementById('ai-btn').addEventListener('click', () => this.getSpreadInterpretation());
            document.getElementById('music-toggle').addEventListener('click', () => this.toggleMusic());
            document.getElementById('rules-toggle').addEventListener('click', () => this.toggleRules());
            document.getElementById('clients-toggle').addEventListener('click', () => this.toggleAccordion('clients-wrapper', 'rules-wrapper'));
            document.getElementById('client-add-btn').addEventListener('click', () => this.addClient());
            document.getElementById('refine-question-btn').addEventListener('click', () => this.refineQuestion());
            document.getElementById('client-list').addEventListener('click', e => {
                const deleteButton = e.target.closest('[data-client-delete]');
                if (deleteButton) {
                    this.deleteClient(deleteButton.dataset.clientDelete);
                    return;
                }
                const card = e.target.closest('[data-client-id]');
                if (card) this.selectClient(card.dataset.clientId);
            });
            const resultModal = document.getElementById('result-modal');
            if (resultModal) {
                resultModal.addEventListener('click', e => {
                    if (e.target === resultModal) this.closeResultModal();
                });
            }
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') this.closeResultModal();
            });

            ['mode-selector', 'deck-selector', 'sphere-selector', 'target-selector', 'spread-selector', 'card-back-selector'].forEach(id => {
                document.getElementById(id).addEventListener('click', e => {
                    const button = e.target.closest('button');
                    if (button && button.dataset.group) this.handleSelection(button.dataset.group, button.dataset.key);
                });
            });
        },

        handleSelection(group, key, doUpdate = true) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(btn => btn.classList.remove('active'));
            const button = document.querySelector(`[data-group="${group}"][data-key="${key}"]`);
            if (button) button.classList.add('active');

            switch (group) {
                case 'mode':
                    this.state.aiMode = key;
                    localStorage.setItem('tarot_ai_mode', key);
                    this.applyTheme(this.state.theme);
                    break;
                case 'deck': {
                    this.state.selectedDeck = key;
                    localStorage.setItem('tarot_deck', key);
                    const deck = this.getCurrentDeck();
                    if (!deck.backs.some(back => back.key === this.state.cardBackStyle)) {
                        this.state.cardBackStyle = deck.backs[0].key;
                    }
                    if (doUpdate) {
                        this.renderCardBackSelector();
                        this.handleSelection('cardBack', this.state.cardBackStyle, false);
                    }
                    break;
                }
                case 'sphere':
                    this.state.sphere = key;
                    const sphereData = this.data.spheres.find(s => s.key === key);
                    if (sphereData && sphereData.rec) {
                        document.getElementById('recommendation-text').textContent = sphereData.rec_key ? this.translations[this.state.lang][sphereData.rec_key] : '';
                        if (doUpdate) {
                            this.handleSelection('spread', sphereData.rec, true);
                        }
                        return;
                    }
                    break;
                case 'target':
                    this.state.target = key;
                    const personWrapper = document.getElementById('target-person-wrapper');
                    if (personWrapper) personWrapper.classList.toggle('active', key === 'partner');
                    if (doUpdate) this.resetSpread();
                    break;
                case 'spread': this.state.spreadKey = key; if (doUpdate) this.resetSpread(); break;
                case 'cardBack':
                    this.state.cardBackStyle = key;
                    localStorage.setItem('tarot_card_back', key);
                    break;
            }
            if (doUpdate) this.updateUI();
        },

        resetSpread() {
            this.state.selectedCards = {};
            this.state.activePositionIndex = 0;
            this.state.activeSuit = null;
            this.state.previewReversed = false;
            this._lastInterpretation = '';
            this._lastReadingSnapshot = null;
            document.getElementById('question').value = '';
            document.getElementById('card-selection-step').style.display = 'none';
            const responseBox = document.getElementById('ai-response-box');
            if (responseBox) {
                responseBox.innerHTML = `<span id="ai-placeholder">${this.translations[this.state.lang].placeholder_ai_response}</span>`;
            }
            this.closeResultModal();
            this.updateUI();
        },

        updateUI() {
            this.renderSchema();
            this.updateHint();
            if (this.state.activeSuit) {
                this.renderCardCarousel();
            }
        },

        renderSchema() {
            const schema = this.data.spreads[this.state.spreadKey];
            const container = document.getElementById('spread-schema-container');
            container.innerHTML = '';
            container.className = `schema-container ${schema.gridClass || ''}`;

            if (!schema.gridClass) {
                container.style.gridTemplateAreas = schema.grid;
                const gridMatch = schema.grid.match(/"(.*?)"/);
                if (gridMatch) {
                    // IMPORTANT: count every token including "." placeholders — they occupy a real column.
                    const columns = gridMatch[1].trim().split(/\s+/).length;
                    container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
                }
                container.style.gridTemplateRows = '';
            } else {
                container.style.gridTemplateAreas = '';
            }

            schema.positions[this.state.lang].forEach((posName, index) => {
                const cardData = this.state.selectedCards[posName];

                // Outer wrapper: holds flip card + footer controls. Height grows to fit content.
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.gap = '0.4rem';
                wrapper.style.alignItems = 'stretch';
                wrapper.style.minWidth = '0'; // allow shrinking inside grid track so text can wrap

                // Grid placement
                if (this.state.spreadKey === 'cross') {
                    wrapper.classList.add(`cross-pos-${index + 1}`);
                } else {
                    wrapper.style.gridArea = `pos${index + 1}`;
                }

                // ── FLIP CONTAINER (only image + card back, no buttons) ──
                const flipContainer = document.createElement('div');
                flipContainer.className = `card-flip-container ${cardData ? 'flipped card-flight-animation' : ''}`;

                // Active position highlighting
                if (index === this.state.activePositionIndex && !cardData) {
                    flipContainer.classList.add('schema-position-active');
                }

                flipContainer.onclick = () => {
                    if (cardData) {
                        this.playFlipSound();
                        flipContainer.classList.toggle('flipped');
                    } else {
                        this.state.activePositionIndex = index;
                        this.updateUI();
                    }
                };

                const inner = document.createElement('div');
                inner.className = 'card-flip-inner';

                // Front — actual image of the selected deck back / рубашка (shown before flip)
                const front = document.createElement('div');
                front.className = 'card-front';
                front.style.cssText = 'padding:0;overflow:hidden;border:2px solid var(--border-color);background:var(--bg-surface);';
                const backImgPath = this.getCardBackImagePath();
                front.innerHTML = `
                    <img class="card-back-image" src="${backImgPath}" alt="${this.getCurrentBack()[this.state.lang]}" loading="lazy"
                         onerror="this.style.display='none'; this.parentElement.style.background='radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%)'">
                    <div class="slot-back-overlay">
                        <div class="slot-number">${index + 1}</div>
                        <div class="slot-position-name" style="margin-top:0.25rem;">${posName}</div>
                    </div>
                `;

                // Back — card face with real image
                const back = document.createElement('div');
                back.className = 'card-back';
                back.style.cssText = 'padding:0;overflow:hidden;border-radius:0.75rem;';

                if (cardData) {
                    const reversedStyle = cardData.isReversed ? 'transform:rotate(180deg);' : '';
                    const imgPath = this.getCardImagePath(cardData.id);
                    const fallbackId = `fallback-${index}-${Date.now()}-${Math.floor(Math.random()*10000)}`;
                    back.innerHTML = `
                        <div style="width:100%;height:100%;border-radius:0.75rem;overflow:hidden;${reversedStyle}">
                            <img src="${imgPath}" alt="${cardData.name}" loading="lazy"
                                 style="width:100%;height:100%;object-fit:cover;display:block;"
                                 onerror="this.replaceWith(App.fallbackArtNode('${cardData.id}'))">
                        </div>`;
                } else {
                    back.innerHTML = `<div class="slot-position-name">${posName}</div>`;
                }

                inner.appendChild(front);
                inner.appendChild(back);
                flipContainer.appendChild(inner);
                wrapper.appendChild(flipContainer);

                // ── CARD INFO FOOTER (outside the flip, full text always visible) ──
                if (cardData) {
                    const translatedName = cardData.id ? this.translateCardName(cardData.id) : cardData.name;
                    const footer = document.createElement('div');
                    footer.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0.3rem;';

                    const nameEl = document.createElement('div');
                    nameEl.className = 'slot-card-name text-gold';
                    nameEl.textContent = translatedName + (cardData.isReversed ? ` ↻` : '');

                    const revBtn = document.createElement('button');
                    revBtn.className = 'reverse-btn';
                    revBtn.textContent = this.translations[this.state.lang].btn_reverse;
                    revBtn.onclick = (e) => { e.stopPropagation(); this.toggleCardReversed(posName); };

                    footer.appendChild(nameEl);
                    footer.appendChild(revBtn);
                    wrapper.appendChild(footer);
                }

                container.appendChild(wrapper);
            });
        },

        updateHint() {
            const schema = this.data.spreads[this.state.spreadKey];
            const hint = document.getElementById('current-position-hint');
            if (this.state.activePositionIndex < schema.cards) {
                hint.innerHTML = `${this.translations[this.state.lang].hint_select_card_for} <strong class="text-gold">"${schema.positions[this.state.lang][this.state.activePositionIndex]}"</strong>`;
            } else {
                hint.textContent = this.translations[this.state.lang].hint_spread_filled;
            }
        },

        toggleLanguage() {
            // Save current states (activeSuit is preserved — NOT reset)
            const prevLang = this.state.lang;
            this.state.lang = this.state.lang === 'ua' ? 'ru' : 'ua';

            // Save to localStorage
            localStorage.setItem('tarot_lang', this.state.lang);
            document.documentElement.lang = this.state.lang;
            document.getElementById('lang-pill').style.transform = this.state.lang === 'ua' ? 'translateX(0px)' : 'translateX(20px)';

            // Update spread position names in selectedCards
            const schema = this.data.spreads[this.state.spreadKey];
            const oldPositions = schema.positions[prevLang];
            const newPositions = schema.positions[this.state.lang];
            const newSelectedCards = {};

            oldPositions.forEach((oldPosName, index) => {
                if (this.state.selectedCards[oldPosName]) {
                    const newPosName = newPositions[index];
                    newSelectedCards[newPosName] = this.state.selectedCards[oldPosName];
                }
            });

            this.state.selectedCards = newSelectedCards;

            // Re-render text content, keep active states and suit selection
            this.applyLanguage();
            this.renderAllSelectors();
            this.renderClients();
            this.restoreActiveStates();
            this.displayMoonPhase();

            // If a suit was selected, keep the carousel visible and re-render it
            if (this.state.activeSuit) {
                document.getElementById('card-selection-step').style.display = 'block';
                this.renderCardCarousel();
            }
        },

        toggleTheme() {
            this.state.theme = this.state.theme === 'neon' ? 'witchy' : 'neon';
            localStorage.setItem('tarot_theme', this.state.theme);
            this.applyTheme(this.state.theme);
            document.getElementById('theme-pill').style.transform = this.state.theme === 'neon' ? 'translateX(0px)' : 'translateX(26px)';
        },

        applyTheme(theme) {
            document.body.classList.remove('theme-witchy', 'theme-psychologist');
            if (theme === 'witchy') {
                document.body.classList.add('theme-witchy');
            } else if (this.state.aiMode === 'psychologist') {
                document.body.classList.add('theme-psychologist');
            }
        },

        applyLanguage() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.dataset.translateKey;
                const translation = this.translations[this.state.lang][key];
                if (translation) {
                    if (key !== 'rules_list') {
                        el.textContent = translation;
                    }
                }
            });

            // Update rules list
            const rulesList = document.getElementById('rules-list');
            if (rulesList) {
                rulesList.innerHTML = this.translations[this.state.lang].rules_list.map(rule => `<li>${rule}</li>`).join('');
            }

            // Update textarea placeholder
            const questionField = document.getElementById('question');
            if (questionField) {
                questionField.placeholder = questionField.dataset[`placeholder${this.state.lang === 'ua' ? 'Ua' : 'Ru'}`];
            }

            // Update partner-name input placeholder
            const personInput = document.getElementById('other-person-input');
            if (personInput) {
                personInput.placeholder = personInput.dataset[`placeholder${this.state.lang === 'ua' ? 'Ua' : 'Ru'}`];
            }

            document.querySelectorAll('[data-placeholder-key]').forEach(el => {
                const value = this.translations[this.state.lang][el.dataset.placeholderKey];
                if (value) el.placeholder = value;
            });
        },

        toggleAccordion(showId, hideId = null) {
            const showEl = document.getElementById(showId);
            const hideEl = hideId ? document.getElementById(hideId) : null;
            if (!showEl) return;
            const wasActive = showEl.classList.contains('active');
            if (hideEl) hideEl.classList.remove('active');
            showEl.classList.toggle('active', !wasActive);
        },

        toggleRules() {
            this.toggleAccordion('rules-wrapper', 'clients-wrapper');
        },

        saveClients() {
            localStorage.setItem('tarot_clients', JSON.stringify(this.state.clients));
            if (this.state.activeClientId) {
                localStorage.setItem('tarot_active_client', this.state.activeClientId);
            } else {
                localStorage.removeItem('tarot_active_client');
            }
        },

        getActiveClient() {
            return this.state.clients.find(client => client.id === this.state.activeClientId) || null;
        },

        addClient() {
            const nameInput = document.getElementById('client-name-input');
            const contactInput = document.getElementById('client-contact-input');
            const notesInput = document.getElementById('client-notes-input');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.focus();
                return;
            }

            const client = {
                id: `client-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
                name,
                contact: contactInput.value.trim(),
                notes: notesInput.value.trim(),
                createdAt: new Date().toISOString()
            };
            this.state.clients.unshift(client);
            this.state.activeClientId = client.id;
            this.saveClients();
            nameInput.value = '';
            contactInput.value = '';
            notesInput.value = '';
            this.renderClients();
        },

        selectClient(clientId) {
            this.state.activeClientId = this.state.activeClientId === clientId ? null : clientId;
            this.saveClients();
            this.renderClients();
        },

        deleteClient(clientId) {
            this.state.clients = this.state.clients.filter(client => client.id !== clientId);
            if (this.state.activeClientId === clientId) this.state.activeClientId = null;
            this.saveClients();
            this.renderClients();
        },

        renderClients() {
            const list = document.getElementById('client-list');
            const pill = document.getElementById('active-client-pill');
            if (!list || !pill) return;
            const t = this.translations[this.state.lang];
            const activeClient = this.getActiveClient();

            pill.style.display = activeClient ? 'inline-flex' : 'none';
            pill.textContent = activeClient ? `${t.active_client_label}: ${activeClient.name}` : '';

            if (!this.state.clients.length) {
                list.innerHTML = `<div class="client-empty">${this.escapeHTML(t.client_empty)}</div>`;
                return;
            }

            list.innerHTML = this.state.clients.map(client => {
                const activeClass = client.id === this.state.activeClientId ? ' active' : '';
                const contact = client.contact ? `<div class="client-contact">${this.escapeHTML(client.contact)}</div>` : '';
                const notes = client.notes ? `<div class="client-notes">${this.escapeHTML(client.notes)}</div>` : '';
                const selected = client.id === this.state.activeClientId ? `<div class="client-contact">${this.escapeHTML(t.client_selected)}</div>` : '';
                return `
                    <div class="client-card${activeClass}" data-client-id="${client.id}">
                        <div class="client-card-head">
                            <div class="client-name">${this.escapeHTML(client.name)}</div>
                            <button type="button" class="client-delete-btn" data-client-delete="${client.id}" aria-label="Delete">x</button>
                        </div>
                        ${contact}
                        ${notes}
                        ${selected}
                    </div>
                `;
            }).join('');
        },

        async refineQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            this.playSound('mystical-chime');

            const requestData = {
                lang: this.state.lang,
                type: 'refine-question',
                question: question,
                sphere: this.data.spheres.find(s => s.key === this.state.sphere)[this.state.lang]
            };

            document.getElementById('loading-overlay').classList.add('active');
            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestData) });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('question').value = data.text;
                    this.playSound('card-select-sound');
                }
            } catch (error) {
                console.error(error);
            } finally {
                document.getElementById('loading-overlay').classList.remove('active');
            }
        },

        async getSpreadInterpretation() {
            const schema = this.data.spreads[this.state.spreadKey];
            if (Object.keys(this.state.selectedCards).length < schema.cards) {
                alert(this.translations[this.state.lang].alert_spread_not_filled);
                return;
            }

            this.playSound('mystical-chime');
            const activeClient = this.getActiveClient();

            const requestData = {
                lang: this.state.lang, type: 'spread', mode: this.state.aiMode,
                theme: this.data.spheres.find(s => s.key === this.state.sphere)[this.state.lang],
                spreadType: this.data.spreads[this.state.spreadKey][this.state.lang],
                deck: this.getCurrentDeck()[this.state.lang],
                question: document.getElementById('question').value.trim(),
                cards: this.state.selectedCards,
                positions: this.data.spreads[this.state.spreadKey].positions[this.state.lang],
                targetPerson: this.state.target === 'partner' ? (document.getElementById('other-person-input')?.value.trim() || null) : null,
                client: activeClient ? {
                    name: activeClient.name,
                    contact: activeClient.contact,
                    notes: activeClient.notes
                } : null
            };
            await this.handleAIRequest(requestData);
        },

        async handleAIRequest(requestData) {
            document.getElementById('loading-overlay').classList.add('active');
            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestData) });
                const data = await response.json();
                const responseBox = document.getElementById('ai-response-box');

                if (!response.ok) {
                    const errorText = data?.error || (this.state.lang === 'ua' ? 'Невідома помилка' : 'Неизвестная ошибка');
                    responseBox.innerHTML = `<span id="ai-placeholder" class="text-red-400">${this.escapeHTML(errorText)}</span>`;
                    return;
                }

                const text = data?.text || '';
                this._lastInterpretation = text;
                this._lastReadingSnapshot = this.buildReadingSnapshot(requestData, text);
                this.renderReadingPreview(this._lastReadingSnapshot);
                document.getElementById('ai-response-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) {
                const label = this.state.lang === 'ua' ? 'Критична помилка' : 'Критическая ошибка';
                document.getElementById('ai-response-box').innerHTML = `<span id="ai-placeholder" class="text-red-400">${label}: ${this.escapeHTML(error.message)}</span>`;
            } finally {
                document.getElementById('loading-overlay').classList.remove('active');
            }
        },


        escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[ch]));
        },

        formatAIText(text) {
            const escaped = this.escapeHTML(text || '').trim();
            if (!escaped) return '';

            const formatInline = value => value
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');

            const formatParagraph = value => {
                const line = formatInline(value.trim());
                const emphasizedLabelMatch = line.match(/^<em>([^:<]{2,42}:)<\/em>\s*(.+)$/);
                if (emphasizedLabelMatch) {
                    return `<p class="interpretation-paragraph"><span class="interpretation-label">${emphasizedLabelMatch[1]}</span> ${emphasizedLabelMatch[2]}</p>`;
                }
                const labelMatch = line.match(/^([^:<]{2,42}):\s*(.+)$/);
                if (labelMatch) {
                    return `<p class="interpretation-paragraph"><span class="interpretation-label">${labelMatch[1]}:</span> ${labelMatch[2]}</p>`;
                }
                return `<p class="interpretation-paragraph">${line}</p>`;
            };

            return escaped
                .split(/\n\s*\n+/)
                .map(block => {
                    const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
                    if (!lines.length) return '';

                    const titleMatch = lines[0].match(/^\d+\.\s*(?:<strong>)?(.+?)(?:<\/strong>)?\s*$/);
                    if (titleMatch) {
                        const title = formatInline(titleMatch[1].replace(/\*\*/g, ''));
                        const body = lines.slice(1).map(formatParagraph).join('');
                        return `
                            <section class="interpretation-section">
                                <div class="interpretation-section-title">${title}</div>
                                <div class="interpretation-section-body">${body}</div>
                            </section>
                        `;
                    }

                    return `
                        <section class="interpretation-section">
                            <div class="interpretation-section-body">${lines.map(formatParagraph).join('')}</div>
                        </section>
                    `;
                })
                .join('');
        },

        getOrientationLabel(isReversed) {
            return isReversed ? this.translations[this.state.lang].orientation_reversed : this.translations[this.state.lang].orientation_upright;
        },

        buildReadingSnapshot(requestData, interpretation) {
            const schema = this.data.spreads[this.state.spreadKey];
            const positions = schema.positions[this.state.lang];
            const cards = positions
                .map(position => {
                    const card = requestData.cards[position] || this.state.selectedCards[position];
                    if (!card) return null;
                    return {
                        position,
                        id: card.id,
                        name: this.translateCardName(card.id),
                        isReversed: Boolean(card.isReversed),
                        imagePath: this.getCardImagePath(card.id)
                    };
                })
                .filter(Boolean);

            return {
                lang: this.state.lang,
                question: requestData.question || '',
                spreadType: requestData.spreadType,
                theme: requestData.theme,
                client: requestData.client || null,
                cards,
                interpretation
            };
        },

        renderReadingPreview(snapshot) {
            const responseBox = document.getElementById('ai-response-box');
            if (!responseBox || !snapshot) return;
            const t = this.translations[this.state.lang];
            const question = snapshot.question ? this.escapeHTML(snapshot.question) : this.escapeHTML(t.reading_no_question);
            const cardsHTML = snapshot.cards.map((card, index) => `
                <div class="reading-card-mini" style="animation: card-flight 0.55s ease ${index * 70}ms both;">
                    <div class="reading-card-thumb ${card.isReversed ? 'reversed' : ''}">
                        <img src="${card.imagePath}" alt="${this.escapeHTML(card.name)}" loading="lazy" onerror="this.replaceWith(App.fallbackArtNode('${card.id}'))">
                    </div>
                    <div class="reading-card-meta">
                        <div class="reading-card-position">${this.escapeHTML(card.position)}</div>
                        <div class="reading-card-name">${this.escapeHTML(card.name)}${card.isReversed ? ' ↻' : ''}</div>
                        <div class="reading-card-orientation">${this.escapeHTML(this.getOrientationLabel(card.isReversed))}</div>
                    </div>
                </div>
            `).join('');

            responseBox.innerHTML = `
                <div class="reading-preview">
                    <div class="reading-preview-header">
                        <div class="reading-preview-title">${this.escapeHTML(t.reading_cards_title)}</div>
                        <div class="reading-preview-subtitle">${this.escapeHTML(t.reading_cards_subtitle)}</div>
                    </div>
                    <div class="reading-question-box">
                        <div class="reading-question-label">${this.escapeHTML(t.reading_question_label)}</div>
                        <div class="reading-question-text">${question}</div>
                    </div>
                    <div class="reading-cards-grid">${cardsHTML}</div>
                    <div class="reading-actions">
                        <button type="button" class="reading-action-primary" onclick="App.openResultModal()">${this.escapeHTML(t.btn_open_interpretation)}</button>
                        <button type="button" class="reading-action-secondary" onclick="App.copyResultToClipboard()">${this.escapeHTML(t.btn_copy_result)}</button>
                        <button type="button" class="reading-action-secondary" onclick="App.resetSpread()">${this.escapeHTML(t.btn_new_reading)}</button>
                    </div>
                </div>
            `;
        },

        renderResultModal(snapshot) {
            if (!snapshot) return;
            const t = this.translations[this.state.lang];
            const titleEl = document.getElementById('result-modal-title');
            const bodyEl = document.getElementById('result-modal-body');
            if (!titleEl || !bodyEl) return;

            titleEl.textContent = t.result_modal_title;
            const question = snapshot.question ? this.escapeHTML(snapshot.question) : this.escapeHTML(t.reading_no_question);
            const clientLine = snapshot.client?.name ? `
                <div class="reading-question-box">
                    <div class="reading-question-label">${this.escapeHTML(t.reading_client_label)}</div>
                    <div class="reading-question-text">${this.escapeHTML(snapshot.client.name)}${snapshot.client.contact ? ` · ${this.escapeHTML(snapshot.client.contact)}` : ''}</div>
                </div>
            ` : '';
            const chips = snapshot.cards.map((card, index) => `
                <div class="result-modal-card-chip" title="${this.escapeHTML(card.position)} - ${this.escapeHTML(card.name)}">
                    <div class="result-card-number">${index + 1}</div>
                    <div>
                        <div class="result-card-position">${this.escapeHTML(card.position)}</div>
                        <div class="result-card-name">${this.escapeHTML(card.name)}${card.isReversed ? ' ↻' : ''}</div>
                    </div>
                </div>
            `).join('');

            bodyEl.innerHTML = `
                <div class="result-summary">
                    <div class="result-summary-top">
                        <div>
                            <div class="result-summary-kicker">${this.escapeHTML(snapshot.theme || snapshot.spreadType || '')}</div>
                            <div class="result-summary-title">${this.escapeHTML(snapshot.spreadType || t.result_modal_title)}</div>
                        </div>
                        <div class="result-summary-count">${snapshot.cards.length}</div>
                    </div>
                    <div class="reading-question-box">
                        <div class="reading-question-label">${this.escapeHTML(t.reading_question_label)}</div>
                        <div class="reading-question-text">${question}</div>
                    </div>
                    ${clientLine}
                </div>
                <div class="result-modal-cards">${chips}</div>
                <div class="result-modal-text">${this.formatAIText(snapshot.interpretation)}</div>
            `;
        },

        openResultModal() {
            if (!this._lastReadingSnapshot) return;
            this.renderResultModal(this._lastReadingSnapshot);
            document.getElementById('result-modal')?.classList.add('active');
            document.body.classList.add('body-modal-open');
        },

        closeResultModal() {
            document.getElementById('result-modal')?.classList.remove('active');
            document.body.classList.remove('body-modal-open');
        },

        getResultPlainText() {
            const snapshot = this._lastReadingSnapshot;
            if (!snapshot) return '';
            const t = this.translations[this.state.lang];
            const cardLines = snapshot.cards.map(card => `- ${card.position}: ${card.name}${card.isReversed ? ' ↻' : ''} (${this.getOrientationLabel(card.isReversed)})`);
            return [
                `${t.reading_cards_title}`,
                `${t.reading_question_label}: ${snapshot.question || t.reading_no_question}`,
                cardLines.join('\n'),
                snapshot.interpretation
            ].filter(Boolean).join('\n\n');
        },

        async copyResultToClipboard() {
            const text = this.getResultPlainText();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
            }
            alert(this.translations[this.state.lang].result_copied);
        },

        playSound(soundId) {
            const sound = document.getElementById(soundId);
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.4;
                sound.play().catch(e => console.error("Sound play failed:", e));
            }
        },

        playFlipSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                oscillator.type = 'sine';
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                console.error("Web Audio API failed:", e);
            }
        },

        toggleMusic() {
            const music = document.getElementById('ambient-music');
            const button = document.getElementById('music-toggle');
            if (music.paused) {
                music.volume = 0.2;
                music.play().catch(e => console.error("Audio play failed:", e));
                button.textContent = '🔊';
            } else {
                music.pause();
                button.textContent = '🔇';
            }
        },

        displayMoonPhase() {
            const icons = ['🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗', '🌘'];
            const day = new Date().getDate();
            const index = Math.floor((day % 30) / 3.75);
            document.getElementById('moon-widget').innerHTML = `<div class="text-2xl">${icons[index]}</div><div>${this.translations[this.state.lang].moon_phases[index]}</div>`;
        }
    };
    document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
