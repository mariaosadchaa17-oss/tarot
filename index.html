                    ru: ["Туз", "Двойка", "Тройка", "Четвёрка", "Пятёрка", "Шестёрка", "Семёрка", "Восьмёрка", "Девятка", "Десятка", "Паж", "Рыцарь", "Королева", "Король"],
                    imageIds: ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12', '13', '14']
                },
                suits: {
                    ua: { wands: "Жезлів", cups: "Кубків", swords: "Мечів", pentacles: "Пентаклів" },
                    ru: { wands: "Жезлов", cups: "Кубков", swords: "Мечей", pentacles: "Пентаклей" }
                },
                suitCodes: { wands: 'wa', cups: 'cu', swords: 'sw', pentacles: 'pe' }
            }
        },

        // ══════════════════════════════════════════════════════════════
        // REAL CARD ARTWORK — local files shipped alongside this HTML
        // (folder "cards/"), e.g. cards/major-0.jpg, cards/wands-1.jpg ...
        // If a file is ever missing, buildCardArt() below provides a
        // fully code-generated SVG fallback so a slot is never empty.
        // ══════════════════════════════════════════════════════════════
        DECKS_DIR: 'assets/decks',

        getCurrentDeck() {
            return this.data.decks.find(deck => deck.key === this.state.selectedDeck) || this.data.decks[0];
        },

        getCurrentBack() {
            const deck = this.getCurrentDeck();
            return deck.backs.find(back => back.key === this.state.cardBackStyle) || deck.backs[0];
        },

        getDeckPathBase() {
            return `${this.DECKS_DIR}/${this.getCurrentDeck().dir}`;
        },

        getCardImagePath(cardId) {
            const [suit, idxStr] = cardId.split('_');
            const idx = parseInt(idxStr, 10);
            if (suit === 'major') return `${this.getDeckPathBase()}/major-${idx}.jpg`;
            // idx 0..9 = Ace..10 -> value 1..10 ; idx 10..13 = Page..King -> value 11..14
            const value = idx + 1;
            return `${this.getDeckPathBase()}/${suit}-${value}.jpg`;
        },

        getCardBackImagePath() {
            return `${this.getDeckPathBase()}/${this.getCurrentBack().file}`;
        },


        majorSymbols: [
            '🃏','🪄','🌙','👑','🜃','🗝️','💞','✨','🦁','🕯️',
            '🔮','⚖️','🌀','💀','🜂','👁️','🜏','⭐','🌕','☀️',
            '📯','🌍'
        ],
        majorRoman: ['0','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'],

        suitTheme: {
            wands:     { c1: '#3a1d0d', c2: '#c2691d', accent: '#ffb066', icon: '🪄' },
            cups:      { c1: '#0d2438', c2: '#1d7fb0', accent: '#7fd4ff', icon: '🏆' },
            swords:    { c1: '#1c1f26', c2: '#5b6b7a', accent: '#cfe3ef', icon: '⚔️' },
            pentacles: { c1: '#241b06', c2: '#a87f23', accent: '#ffd76b', icon: '🪙' }
        },

        courtSymbols: ['🃏', '✨', '🌙', '👑'], // page, knight, queen, king

        // Compute a centered grid of (x,y) points inside a box for pip layouts
        gridPoints(count, box) {
            const { x, y, w, h } = box;
            const cols = count <= 1 ? 1 : count <= 4 ? 2 : count <= 9 ? 3 : 4;
            const rows = Math.ceil(count / cols);
            const points = [];
            for (let i = 0; i < count; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const itemsInRow = (row === rows - 1) ? (count - cols * (rows - 1)) : cols;
                const rowOffset = (cols - itemsInRow) / 2;
                const px = x + (col + rowOffset + 0.5) * (w / cols);
                const py = y + (row + 0.5) * (h / rows);
                points.push([px, py]);
            }
            return points;
        },

        uidCounter: 0,

        // Used by <img onerror> to swap in code-generated art if a real file is missing.
        fallbackArtNode(cardId) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'width:100%;height:100%;border-radius:0.75rem;overflow:hidden;';
            wrapper.innerHTML = this.buildCardArt(cardId);
            return wrapper;
        },

        // Returns an <svg> markup string for the given cardId, ready to inject via innerHTML.
        buildCardArt(cardId) {
            const [suit, idxStr] = cardId.split('_');
            const idx = parseInt(idxStr, 10);
            const uid = `card${this.uidCounter++}`;

            if (suit === 'major') {
                const symbol = this.majorSymbols[idx] || '✨';
                const roman = this.majorRoman[idx] || '';
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <radialGradient id="g-${uid}" cx="50%" cy="38%" r="75%">
                            <stop offset="0%" stop-color="#3d2566"/>
                            <stop offset="100%" stop-color="#150a26"/>
                        </radialGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="#c084fc" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="#9d4edf" stroke-width="1" opacity="0.6"/>
                    <text x="100" y="46" font-size="20" text-anchor="middle" font-family="Georgia, serif" fill="#f3c66f" font-weight="700">${roman}</text>
                    <text x="100" y="190" font-size="64" text-anchor="middle" dominant-baseline="middle">${symbol}</text>
                    <circle cx="100" cy="190" r="78" fill="none" stroke="#f3c66f" stroke-width="1" opacity="0.35"/>
                    <text x="100" y="305" font-size="11" text-anchor="middle" fill="#c084fc" font-family="sans-serif" letter-spacing="3">ARCANA</text>
                </svg>`;
            }

            const theme = this.suitTheme[suit] || this.suitTheme.wands;

            if (idx < 10) {
                // Pip card: value 1..10, draw that many suit icons in a grid
                const value = idx + 1;
                const points = this.gridPoints(value, { x: 30, y: 80, w: 140, h: 175 });
                const icons = points.map(([px, py]) =>
                    `<text x="${px.toFixed(1)}" y="${py.toFixed(1)}" font-size="26" text-anchor="middle" dominant-baseline="middle">${theme.icon}</text>`
                ).join('');
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="g-${uid}" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="${theme.c2}"/>
                            <stop offset="100%" stop-color="${theme.c1}"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="${theme.accent}" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.5"/>
                    <text x="22" y="34" font-size="20" font-family="Georgia, serif" fill="${theme.accent}" font-weight="700">${value}</text>
                    <text x="178" y="318" font-size="20" font-family="Georgia, serif" fill="${theme.accent}" font-weight="700" text-anchor="end">${value}</text>
                    ${icons}
                </svg>`;
            } else {
                // Court card: page/knight/queen/king
                const courtIdx = idx - 10;
                const figure = this.courtSymbols[courtIdx] || '🧑';
                return `
                <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="g-${uid}" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="${theme.c2}"/>
                            <stop offset="100%" stop-color="${theme.c1}"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="3" width="194" height="334" rx="14" fill="url(#g-${uid})" stroke="${theme.accent}" stroke-width="3"/>
                    <rect x="11" y="11" width="178" height="318" rx="9" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.5"/>
                    <circle cx="100" cy="150" r="70" fill="none" stroke="${theme.accent}" stroke-width="1" opacity="0.4"/>
                    <text x="100" y="172" font-size="72" text-anchor="middle" dominant-baseline="middle">${figure}</text>
                    <text x="100" y="270" font-size="34" text-anchor="middle" dominant-baseline="middle">${theme.icon}</text>
                </svg>`;
            }
        },

        translateCardName(cardId) {
            const [suit, rankIndex] = cardId.split('_');

            if (suit === 'major') {
                return this.data.cards.major[this.state.lang][rankIndex];
            } else {
                const rank = this.data.cards.minor[this.state.lang][rankIndex];
                const suitName = this.data.cards.suits[this.state.lang][suit];
                return `${rank} ${suitName}`;
            }
        },

        init() {
            this.loadFromLocalStorage();
            this.addEventListeners();
            this.renderAllDynamicContent();
            this.restoreActiveStates();
            this.applyTheme(this.state.theme);
        },

        loadFromLocalStorage() {
            const savedLang = localStorage.getItem('tarot_lang');
            const savedTheme = localStorage.getItem('tarot_theme');
            const savedDeck = localStorage.getItem('tarot_deck');
            const savedBack = localStorage.getItem('tarot_card_back');
            const savedAiMode = localStorage.getItem('tarot_ai_mode');
            const savedClients = localStorage.getItem('tarot_clients');
            const savedActiveClient = localStorage.getItem('tarot_active_client');
            const savedAccount = localStorage.getItem('tarot_account');
            const savedRegisteredAccount = localStorage.getItem('tarot_registered_account');
            const savedReadings = localStorage.getItem('tarot_readings');
            const savedTone = localStorage.getItem('tarot_answer_tone');
            const savedLength = localStorage.getItem('tarot_answer_length');
            const savedFocus = localStorage.getItem('tarot_answer_focus');
            const savedMood = localStorage.getItem('tarot_mood_before');
            const savedReversals = localStorage.getItem('tarot_allow_reversals');
            const savedSound = localStorage.getItem('tarot_sound_enabled');
            if (savedLang) this.state.lang = savedLang;
            if (savedTheme) this.state.theme = savedTheme === 'light' ? 'light' : 'dark';
            if (savedAiMode) this.state.aiMode = savedAiMode;
            if (savedDeck && this.data.decks.some(deck => deck.key === savedDeck)) this.state.selectedDeck = savedDeck;
            if (savedBack) this.state.cardBackStyle = savedBack;
            if (savedTone) this.state.answerTone = savedTone;
            if (savedLength) this.state.answerLength = savedLength;
            if (savedFocus) this.state.answerFocus = savedFocus;
            if (savedMood) this.state.moodBefore = savedMood;
            if (savedReversals) this.state.allowReversals = savedReversals !== 'false';
            if (savedSound) this.state.soundEnabled = savedSound === 'true';
            try {
                this.state.clients = savedClients ? JSON.parse(savedClients) : [];
            } catch (error) {
                this.state.clients = [];
            }
            try {
                this.state.account = savedAccount ? JSON.parse(savedAccount) : null;
            } catch (error) {
                this.state.account = null;
            }
            try {
                this.state.registeredAccount = savedRegisteredAccount ? JSON.parse(savedRegisteredAccount) : null;
            } catch (error) {
                this.state.registeredAccount = null;
            }
            if (!this.state.registeredAccount && this.state.account?.email) {
                this.state.registeredAccount = { ...this.state.account, password: '' };
                localStorage.setItem('tarot_registered_account', JSON.stringify(this.state.registeredAccount));
            }
            this.state.authMode = this.state.registeredAccount ? 'login' : 'register';
            try {
                this.state.readings = savedReadings ? JSON.parse(savedReadings) : [];
            } catch (error) {
                this.state.readings = [];
            }
            if (savedActiveClient && this.state.clients.some(client => client.id === savedActiveClient)) {
                this.state.activeClientId = savedActiveClient;
            }
        },

        restoreActiveStates() {
            this.handleSelection('mode', this.state.aiMode, false);
            this.handleSelection('deck', this.state.selectedDeck, false);
            this.handleSelection('target', this.state.target, false);
            this.handleSelection('cardBack', this.state.cardBackStyle, false);
            this.handleSelection('sphere', this.state.sphere, false);
            this.handleSelection('spread', this.state.spreadKey, false);
            this.updateUI();
            this.syncSoundState();
        },

        renderAllDynamicContent() {
            this.applyLanguage();
            this.renderAllSelectors();
            this.renderReadingOptions();
            this.renderQuestionTips();
            this.renderAccount();
            this.renderClients();
            this.renderHistory();
            this.updateUI();
            this.displayMoonPhase();
        },

        renderAllSelectors() {
            const createButtons = (containerId, data, group, nameKey) => {
                const container = document.getElementById(containerId);
                container.innerHTML = data.map(item => `<button class="control-card" data-group="${group}" data-key="${item.key}">${item.icon || ''} <span>${item[nameKey]}</span></button>`).join('');
            };
            createButtons('mode-selector', [{key: 'mystical', icon: '🔮', ua: this.translations.ua.mode_mystical, ru: this.translations.ru.mode_mystical}, {key: 'psychologist', icon: '🧠', ua: this.translations.ua.mode_psychologist, ru: this.translations.ru.mode_psychologist}], 'mode', this.state.lang);
            createButtons('sphere-selector', this.data.spheres, 'sphere', this.state.lang);
            createButtons('target-selector', this.data.targets, 'target', this.state.lang);
            this.renderDeckSelector();
            this.renderCardBackSelector();

            // Spread selector with categories
            this.renderSpreadSelector();

            // Suit selector
            this.renderSuitSelector();

            // Target person input placeholder
            const personInput = document.getElementById('other-person-input');
            if (personInput) {
                personInput.placeholder = personInput.dataset[`placeholder${this.state.lang === 'ua' ? 'Ua' : 'Ru'}`];
            }
        },

        renderDeckSelector() {
            const container = document.getElementById('deck-selector');
            if (!container) return;
            container.innerHTML = this.data.decks.map(deck => `
                <button class="control-card deck-card" data-group="deck" data-key="${deck.key}">
                    <span>${this.escapeHTML(deck[this.state.lang])}</span>
                    <div class="deck-preview-strip">
                        <img src="${this.DECKS_DIR}/${deck.dir}/major-0.jpg" alt="" loading="lazy">
                        <img src="${this.DECKS_DIR}/${deck.dir}/cups-1.jpg" alt="" loading="lazy">
                        <img src="${this.DECKS_DIR}/${deck.dir}/swords-1.jpg" alt="" loading="lazy">
                        <img src="${this.DECKS_DIR}/${deck.dir}/back.jpg" alt="" loading="lazy">
                    </div>
                </button>
            `).join('');
        },

        renderCardBackSelector() {
            const container = document.getElementById('card-back-selector');
            if (!container) return;
            const deck = this.getCurrentDeck();
            container.innerHTML = deck.backs.map(item => `
                <button class="control-card card-back-option" data-group="cardBack" data-key="${item.key}">
                    <img class="card-back-thumb" src="${this.DECKS_DIR}/${deck.dir}/${item.file}" alt="${item[this.state.lang]}" loading="lazy">
                    <span>${item[this.state.lang]}</span>
                </button>
            `).join('');
        },

        renderSpreadSelector() {
            const container = document.getElementById('spread-selector');
            let html = '';
            const recommendedSpread = this.data.spheres.find(s => s.key === this.state.sphere)?.rec;
            const recommendedLabel = this.translations[this.state.lang].recommended_badge;

            Object.keys(this.data.spreadCategories).forEach(catKey => {
                const category = this.data.spreadCategories[catKey];
                html += `<div class="spread-category">`;
                html += `<div class="spread-category-title">${category[this.state.lang]}</div>`;
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">`;

                category.spreads.forEach(spreadKey => {
                    const spread = this.data.spreads[spreadKey];
                    const hint = spread[`hint_${this.state.lang}`];
                    const isRecommended = spreadKey === recommendedSpread;
                    html += `<button class="control-card spread-card ${isRecommended ? 'recommended' : ''}" data-group="spread" data-key="${spreadKey}">
                        <span>${spread[this.state.lang]}</span>
                        <div class="spread-hint">${hint}</div>
                        ${isRecommended ? `<div class="spread-recommended-badge">${recommendedLabel}</div>` : ''}
                    </button>`;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        },

        renderSuitSelector() {
            const suits = [
                { key: 'major', icon: '✨', name: this.translations[this.state.lang].suit_major },
                { key: 'wands', icon: '🪄', name: this.translations[this.state.lang].suit_wands },
                { key: 'cups', icon: '🏆', name: this.translations[this.state.lang].suit_cups },
                { key: 'swords', icon: '⚔️', name: this.translations[this.state.lang].suit_swords },
                { key: 'pentacles', icon: '🪙', name: this.translations[this.state.lang].suit_pentacles }
            ];

            const container = document.getElementById('suit-grid');
            container.innerHTML = suits.map(suit => `
                <div class="suit-selector-card ${this.state.activeSuit === suit.key ? 'active' : ''}" onclick="App.selectSuit('${suit.key}')">
                    <div class="suit-icon">${suit.icon}</div>
                    <div class="suit-name">${suit.name}</div>
                </div>
            `).join('');
        },

        selectSuit(suitKey) {
            this.state.activeSuit = suitKey;
            this.renderSuitSelector();
            this.renderCardCarousel();
            document.getElementById('card-selection-step').style.display = 'block';
        },

        renderCardCarousel() {
            const carousel = document.getElementById('card-carousel');
            const isMajor = this.state.activeSuit === 'major';
            const ranks = isMajor ? this.data.cards.major[this.state.lang] : this.data.cards.minor[this.state.lang];

            let html = '';
            ranks.forEach((rank, index) => {
                const cardId = isMajor ? `major_${index}` : `${this.state.activeSuit}_${index}`;
                const cardName = isMajor ? rank : `${rank} ${this.data.cards.suits[this.state.lang][this.state.activeSuit]}`;
                const isUsed = Object.values(this.state.selectedCards).some(c => c.id === cardId);
                const disabledClass = isUsed ? 'disabled' : '';

                html += `
                    <div class="card-item ${disabledClass}" onclick="App.selectCardFromCarousel('${cardId}', ${isUsed})">
                        <div class="card-item-name">${rank}</div>
                    </div>
                `;
            });

            carousel.innerHTML = html;
        },

        selectCardFromCarousel(cardId, isUsed) {
            const cardName = this.translateCardName(cardId);
            if (isUsed) {
                alert(this.translations[this.state.lang].alert_card_already_in(cardName));
                return;
            }

            const schema = this.data.spreads[this.state.spreadKey];
            if (this.state.activePositionIndex >= schema.cards) return;

            const posName = schema.positions[this.state.lang][this.state.activePositionIndex];
            this.state.selectedCards[posName] = {
                id: cardId,
                name: cardName,
                isReversed: this.state.allowReversals && this.state.previewReversed
            };

            // Play sound
            this.playSound('card-select-sound');

            // Reset
            this.state.previewReversed = false;
            document.getElementById('reversed-checkbox').checked = false;

            const nextIndex = schema.positions[this.state.lang].findIndex((_, i) => !this.state.selectedCards[schema.positions[this.state.lang][i]]);
            this.state.activePositionIndex = (nextIndex === -1) ? schema.cards : nextIndex;

            this.updateUI();
        },

        toggleReversedPreview() {
            if (!this.state.allowReversals) return;
            this.state.previewReversed = !this.state.previewReversed;
            document.getElementById('reversed-checkbox').checked = this.state.previewReversed;
        },

        toggleCardReversed(posName) {
            if (this.state.selectedCards[posName]) {
                this.state.selectedCards[posName].isReversed = !this.state.selectedCards[posName].isReversed;
                this.updateUI();
            }
        },

        addEventListeners() {
            document.getElementById('lang-toggle').addEventListener('click', () => this.toggleLanguage());
            document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
            document.getElementById('reset-btn').addEventListener('click', () => this.resetSpread());
            document.getElementById('random-btn').addEventListener('click', () => this.randomizeSpread());
            document.getElementById('ai-btn').addEventListener('click', () => this.getSpreadInterpretation());
            document.getElementById('rules-toggle').addEventListener('click', () => this.toggleRules());
            document.getElementById('account-toggle').addEventListener('click', () => this.toggleAccordion('account-wrapper', 'rules-wrapper'));
            document.getElementById('settings-toggle').addEventListener('click', () => this.toggleSettings());
            document.querySelectorAll('[data-auth-mode]').forEach(button => {
                button.addEventListener('click', () => this.setAuthMode(button.dataset.authMode));
            });
            document.getElementById('account-login-btn').addEventListener('click', () => this.loginAccount());
            ['account-name-input', 'account-email-input', 'account-password-input'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') this.loginAccount();
                });
            });
            document.getElementById('account-logout-btn').addEventListener('click', () => this.logoutAccount());
            document.getElementById('client-add-btn').addEventListener('click', () => this.addClient());
            document.getElementById('history-search-input').addEventListener('input', () => this.renderHistory());
            document.getElementById('history-export-btn').addEventListener('click', () => this.exportHistory());
            document.getElementById('history-stats-btn').addEventListener('click', () => this.toggleHistoryStats());
            document.getElementById('daily-card-btn').addEventListener('click', () => this.showDailyCard());
            document.getElementById('quick-reading-btn').addEventListener('click', () => this.quickReading());
            document.getElementById('random-question-tip-btn').addEventListener('click', () => this.useRandomQuestionTip());
            document.getElementById('refine-question-btn').addEventListener('click', () => this.refineQuestion());
            document.querySelectorAll('[data-account-tab]').forEach(button => {
                button.addEventListener('click', () => this.setAccountTab(button.dataset.accountTab));
            });
            ['tone-select', 'length-select', 'focus-select', 'mood-before-select', 'reversal-mode-select', 'sound-mode-select'].forEach(id => {
                document.getElementById(id).addEventListener('change', e => this.handleReadingOptionChange(id, e.target.value));
            });
            document.getElementById('client-list').addEventListener('click', e => {
                const deleteButton = e.target.closest('[data-client-delete]');
                if (deleteButton) {
                    this.deleteClient(deleteButton.dataset.clientDelete);
                    return;
                }
                const card = e.target.closest('[data-client-id]');
                if (card) this.selectClient(card.dataset.clientId);
            });
            document.getElementById('history-list').addEventListener('click', e => {
                const action = e.target.closest('[data-history-action]');
                if (!action) return;
                this.handleHistoryAction(action.dataset.historyAction, action.dataset.historyId);
            });
            const resultModal = document.getElementById('result-modal');
            if (resultModal) {
                resultModal.addEventListener('click', e => {
                    if (e.target === resultModal) this.closeResultModal();
                });
            }
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') this.closeResultModal();
            });

            ['mode-selector', 'deck-selector', 'sphere-selector', 'target-selector', 'spread-selector', 'card-back-selector'].forEach(id => {
                document.getElementById(id).addEventListener('click', e => {
                    const button = e.target.closest('button');
                    if (button && button.dataset.group) this.handleSelection(button.dataset.group, button.dataset.key);
                });
            });
        },

        handleSelection(group, key, doUpdate = true) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(btn => btn.classList.remove('active'));
            const button = document.querySelector(`[data-group="${group}"][data-key="${key}"]`);
            if (button) button.classList.add('active');

            switch (group) {
                case 'mode':
                    this.state.aiMode = key;
                    localStorage.setItem('tarot_ai_mode', key);
                    this.applyTheme(this.state.theme);
                    break;
                case 'deck': {
                    this.state.selectedDeck = key;
                    localStorage.setItem('tarot_deck', key);
                    const deck = this.getCurrentDeck();
                    if (!deck.backs.some(back => back.key === this.state.cardBackStyle)) {
                        this.state.cardBackStyle = deck.backs[0].key;
                    }
                    if (doUpdate) {
                        this.renderCardBackSelector();
                        this.handleSelection('cardBack', this.state.cardBackStyle, false);
                    }
                    break;
                }
                case 'sphere':
                    this.state.sphere = key;
                    this.renderQuestionTips();
                    this.renderSpreadSelector();
                    const sphereData = this.data.spheres.find(s => s.key === key);
                    if (sphereData && sphereData.rec) {
                        document.getElementById('recommendation-text').textContent = sphereData.rec_key ? this.translations[this.state.lang][sphereData.rec_key] : '';
                        if (doUpdate) {
                            this.handleSelection('spread', sphereData.rec, true);
                        }
                        return;
                    }
                    break;
                case 'target':
                    this.state.target = key;
                    const personWrapper = document.getElementById('target-person-wrapper');
                    if (personWrapper) personWrapper.classList.toggle('active', key === 'partner');
                    if (doUpdate) this.resetSpread();
                    break;
                case 'spread':
                    if (!this.data.spreads[key]) return;
                    this.state.spreadKey = key;
                    if (doUpdate) this.resetSpread();
                    break;
                case 'cardBack':
                    this.state.cardBackStyle = key;
                    localStorage.setItem('tarot_card_back', key);
                    break;
            }
            if (doUpdate) this.updateUI();
        },

        resetSpread() {
            this.state.selectedCards = {};
            this.state.activePositionIndex = 0;
            this.state.activeSuit = null;
            this.state.previewReversed = false;
            this._lastInterpretation = '';
            this._lastReadingSnapshot = null;
            document.getElementById('question').value = '';
            document.getElementById('card-selection-step').style.display = 'none';
            const responseBox = document.getElementById('ai-response-box');
            if (responseBox) {
                responseBox.innerHTML = `<span id="ai-placeholder">${this.translations[this.state.lang].placeholder_ai_response}</span>`;
            }
            this.closeResultModal();
            this.updateUI();
        },

        randomizeSpread() {
            const schema = this.data.spreads[this.state.spreadKey] || this.data.spreads.cross;
            const positions = schema.positions[this.state.lang];
            const deck = this.shuffleArray(this.getAllCardIds());
            const selected = {};

            positions.forEach((posName, index) => {
                const cardId = deck[index];
                selected[posName] = {
                    id: cardId,
                    name: this.translateCardName(cardId),
                    isReversed: this.state.allowReversals && Math.random() < 0.35
                };
            });

            this.state.selectedCards = selected;
            this.state.activePositionIndex = positions.length;
            this.state.previewReversed = false;
            const reversedCheckbox = document.getElementById('reversed-checkbox');
            if (reversedCheckbox) reversedCheckbox.checked = false;
            this.playSound('card-select-sound');
            this.updateUI();
            const schemaContainer = document.getElementById('spread-schema-container');
            schemaContainer?.classList.add('shuffle-pulse');
            setTimeout(() => schemaContainer?.classList.remove('shuffle-pulse'), 450);
        },

        shuffleArray(items) {
            const result = [...items];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        },

        updateUI() {
            this.renderSchema();
            this.updateHint();
            if (this.state.activeSuit) {
                this.renderCardCarousel();
            }
        },

        renderSchema() {
            let schema = this.data.spreads[this.state.spreadKey];
            if (!schema) {
                this.state.spreadKey = 'cross';
                schema = this.data.spreads[this.state.spreadKey];
            }
            const container = document.getElementById('spread-schema-container');
            container.innerHTML = '';
            container.className = `schema-container ${schema.layout ? 'schema-map' : (schema.gridClass || '')}`;
            container.style.removeProperty('--schema-height');
            container.style.removeProperty('--schema-mobile-height');

            if (schema.layout) {
                container.style.gridTemplateAreas = '';
                container.style.gridTemplateColumns = '';
                container.style.gridTemplateRows = '';
                container.style.setProperty('--schema-height', `${schema.height || 560}px`);
                container.style.setProperty('--schema-mobile-height', `${schema.mobileHeight || schema.height || 520}px`);
            } else if (!schema.gridClass) {
                container.style.gridTemplateAreas = schema.grid;
                const gridMatch = schema.grid.match(/"(.*?)"/);
                if (gridMatch) {
                    // IMPORTANT: count every token including "." placeholders — they occupy a real column.
                    const columns = gridMatch[1].trim().split(/\s+/).length;
                    container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
                }
                container.style.gridTemplateRows = '';
            } else {
                container.style.gridTemplateAreas = '';
            }

            schema.positions[this.state.lang].forEach((posName, index) => {
                const cardData = this.state.selectedCards[posName];

                // Outer wrapper: holds flip card + footer controls. Height grows to fit content.
                const wrapper = document.createElement('div');
                wrapper.className = schema.layout ? 'schema-slot' : '';
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.gap = '0.4rem';
                wrapper.style.alignItems = 'stretch';
                wrapper.style.minWidth = '0'; // allow shrinking inside grid track so text can wrap

                // Grid placement
                if (schema.layout) {
                    const point = schema.layout[index] || { x: 50, y: 50 };
                    wrapper.style.left = `${point.x}%`;
                    wrapper.style.top = `${point.y}%`;
                } else if (this.state.spreadKey === 'cross') {
                    wrapper.classList.add(`cross-pos-${index + 1}`);
                } else {
                    wrapper.style.gridArea = `pos${index + 1}`;
                }

                // ── FLIP CONTAINER (only image + card back, no buttons) ──
                const flipContainer = document.createElement('div');
                flipContainer.className = `card-flip-container ${cardData ? 'flipped card-flight-animation' : ''}`;

                // Active position highlighting
                if (index === this.state.activePositionIndex && !cardData) {
                    flipContainer.classList.add('schema-position-active');
                }

                flipContainer.onclick = () => {
                    if (cardData) {
                        this.playFlipSound();
                        flipContainer.classList.toggle('flipped');
                    } else {
                        this.state.activePositionIndex = index;
                        this.updateUI();
                    }
                };

                const inner = document.createElement('div');
                inner.className = 'card-flip-inner';

                // Front — actual image of the selected deck back / рубашка (shown before flip)
                const front = document.createElement('div');
                front.className = 'card-front';
                front.style.cssText = 'padding:0;overflow:hidden;border:2px solid var(--border-color);background:var(--bg-surface);';
                const backImgPath = this.getCardBackImagePath();
                front.innerHTML = `
                    <img class="card-back-image" src="${backImgPath}" alt="${this.getCurrentBack()[this.state.lang]}" loading="lazy"
                         onerror="this.style.display='none'; this.parentElement.style.background='radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%)'">
                    <div class="slot-back-overlay">
                        <div class="slot-number">${index + 1}</div>
                        <div class="slot-position-name" style="margin-top:0.25rem;">${posName}</div>
                    </div>
                `;

                // Back — card face with real image
                const back = document.createElement('div');
                back.className = 'card-back';
                back.style.cssText = 'padding:0;overflow:hidden;border-radius:0.75rem;';

                if (cardData) {
                    const reversedStyle = cardData.isReversed ? 'transform:rotate(180deg);' : '';
                    const imgPath = this.getCardImagePath(cardData.id);
                    const fallbackId = `fallback-${index}-${Date.now()}-${Math.floor(Math.random()*10000)}`;
                    back.innerHTML = `
                        <div style="width:100%;height:100%;border-radius:0.75rem;overflow:hidden;${reversedStyle}">
                            <img src="${imgPath}" alt="${cardData.name}" loading="lazy"
                                 style="width:100%;height:100%;object-fit:cover;display:block;"
                                 onerror="this.replaceWith(App.fallbackArtNode('${cardData.id}'))">
                        </div>`;
                } else {
                    back.innerHTML = `<div class="slot-position-name">${posName}</div>`;
                }

                inner.appendChild(front);
                inner.appendChild(back);
                flipContainer.appendChild(inner);
                wrapper.appendChild(flipContainer);

                // ── CARD INFO FOOTER (outside the flip, full text always visible) ──
                if (cardData) {
                    const translatedName = cardData.id ? this.translateCardName(cardData.id) : cardData.name;
                    const footer = document.createElement('div');
                    footer.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0.3rem;';

                    const nameEl = document.createElement('div');
                    nameEl.className = 'slot-card-name text-gold';
                    nameEl.textContent = translatedName + (cardData.isReversed ? ` ↻` : '');

                    const revBtn = document.createElement('button');
                    revBtn.className = 'reverse-btn';
                    revBtn.textContent = this.translations[this.state.lang].btn_reverse;
                    revBtn.onclick = (e) => { e.stopPropagation(); this.toggleCardReversed(posName); };

                    footer.appendChild(nameEl);
                    footer.appendChild(revBtn);
                    wrapper.appendChild(footer);
                }

                container.appendChild(wrapper);
            });
        },

        updateHint() {
            const schema = this.data.spreads[this.state.spreadKey] || this.data.spreads.cross;
            const hint = document.getElementById('current-position-hint');
            if (this.state.activePositionIndex < schema.cards) {
                hint.innerHTML = `${this.translations[this.state.lang].hint_select_card_for} <strong class="text-gold">"${schema.positions[this.state.lang][this.state.activePositionIndex]}"</strong>`;
            } else {
                hint.textContent = this.translations[this.state.lang].hint_spread_filled;
            }
        },

        toggleLanguage() {
            // Save current states (activeSuit is preserved — NOT reset)
            const prevLang = this.state.lang;
            this.state.lang = this.state.lang === 'ua' ? 'ru' : 'ua';

            // Save to localStorage
            localStorage.setItem('tarot_lang', this.state.lang);
            document.documentElement.lang = this.state.lang;
            document.getElementById('lang-pill').style.transform = this.state.lang === 'ua' ? 'translateX(0px)' : 'translateX(20px)';

            // Update spread position names in selectedCards
            const schema = this.data.spreads[this.state.spreadKey];
            const oldPositions = schema.positions[prevLang];
            const newPositions = schema.positions[this.state.lang];
            const newSelectedCards = {};

            oldPositions.forEach((oldPosName, index) => {
                if (this.state.selectedCards[oldPosName]) {
                    const newPosName = newPositions[index];
                    newSelectedCards[newPosName] = this.state.selectedCards[oldPosName];
                }
            });

            this.state.selectedCards = newSelectedCards;

            // Re-render text content, keep active states and suit selection
            this.applyLanguage();
            this.renderAllSelectors();
            this.renderReadingOptions();
            this.renderQuestionTips();
            this.renderAccount();
            this.renderClients();
            this.renderHistory();
            this.restoreActiveStates();
            this.displayMoonPhase();

            // If a suit was selected, keep the carousel visible and re-render it
            if (this.state.activeSuit) {
                document.getElementById('card-selection-step').style.display = 'block';
                this.renderCardCarousel();
            }
        },
        toggleTheme() {
            this.state.theme = this.state.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('tarot_theme', this.state.theme);
            this.applyTheme(this.state.theme);
        },

        applyTheme(theme) {
            this.state.theme = theme === 'light' ? 'light' : 'dark';
            document.body.classList.toggle('theme-light', this.state.theme === 'light');
            this.updateThemeToggle();
        },

        updateThemeToggle() {
            const pill = document.getElementById('theme-pill');
            const left = document.getElementById('theme-label-left');
            const right = document.getElementById('theme-label-right');
            if (pill) pill.style.transform = this.state.theme === 'light' ? 'translateX(24px)' : 'translateX(0px)';
            if (left) left.textContent = this.state.lang === 'ua' ? 'Темна' : 'Темная';
            if (right) right.textContent = this.state.lang === 'ua' ? 'Світла' : 'Светлая';
        },

        applyLanguage() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.dataset.translateKey;
                const translation = this.translations[this.state.lang][key];
                if (translation) {
                    if (key !== 'rules_list') {
                        el.textContent = translation;
                    }
                }
            });

            // Update rules list
            const rulesList = document.getElementById('rules-list');
            if (rulesList) {
                rulesList.innerHTML = this.translations[this.state.lang].rules_list.map(rule => `<li>${rule}</li>`).join('');
            }

            // Update textarea placeholder
            const questionField = document.getElementById('question');
            if (questionField) {
                questionField.placeholder = questionField.dataset[`placeholder${this.state.lang === 'ua' ? 'Ua' : 'Ru'}`];
            }

            // Update partner-name input placeholder
            const personInput = document.getElementById('other-person-input');
            if (personInput) {
                personInput.placeholder = personInput.dataset[`placeholder${this.state.lang === 'ua' ? 'Ua' : 'Ru'}`];
            }

            document.querySelectorAll('[data-placeholder-key]').forEach(el => {
                const value = this.translations[this.state.lang][el.dataset.placeholderKey];
                if (value) el.placeholder = value;
            });
            document.querySelectorAll('[data-title-key]').forEach(el => {
                const value = this.translations[this.state.lang][el.dataset.titleKey];
                if (value) el.title = value;
            });
        },

        toggleAccordion(showId, hideId = null) {
            const showEl = document.getElementById(showId);
            const hideEl = hideId ? document.getElementById(hideId) : null;
            if (!showEl) return;
            const wasActive = showEl.classList.contains('active');
            if (hideEl) hideEl.classList.remove('active');
            showEl.classList.toggle('active', !wasActive);
        },

        toggleSettings() {
            const panel = document.querySelector('.top-settings-panel');
            const wrapper = document.getElementById('settings-wrapper');
            const button = document.getElementById('settings-toggle');
            if (!panel || !wrapper) return;
            const open = !wrapper.classList.contains('active');
            panel.classList.toggle('open', open);
            wrapper.classList.toggle('active', open);
            button?.classList.toggle('active', open);
        },

        toggleRules() {
            this.toggleAccordion('rules-wrapper', 'account-wrapper');
        },

        saveAccount() {
            if (this.state.account) localStorage.setItem('tarot_account', JSON.stringify(this.state.account));
            else localStorage.removeItem('tarot_account');
        },

        saveRegisteredAccount() {
            if (this.state.registeredAccount) localStorage.setItem('tarot_registered_account', JSON.stringify(this.state.registeredAccount));
            else localStorage.removeItem('tarot_registered_account');
        },

        setAuthMode(mode, clearMessage = true) {
            this.state.authMode = mode === 'register' ? 'register' : 'login';
            const isRegister = this.state.authMode === 'register';
            const t = this.translations[this.state.lang];
            const grid = document.getElementById('auth-grid');
            const nameInput = document.getElementById('account-name-input');
            const submitBtn = document.getElementById('account-login-btn');
            const message = document.getElementById('account-auth-message');

            document.querySelectorAll('[data-auth-mode]').forEach(button => {
                button.classList.toggle('active', button.dataset.authMode === this.state.authMode);
            });
            if (grid) grid.classList.toggle('register-mode', isRegister);
            if (nameInput) nameInput.hidden = !isRegister;
            if (submitBtn) submitBtn.textContent = isRegister ? t.account_register_btn : t.account_login_btn;
            if (message) {
                message.classList.remove('error');
                message.textContent = isRegister ? t.account_auth_register_hint : t.account_auth_login_hint;
                if (!clearMessage) message.textContent = message.dataset.currentMessage || message.textContent;
            }
        },

        showAuthMessage(key, isError = false) {
            const message = document.getElementById('account-auth-message');
            if (!message) return;
            message.classList.toggle('error', isError);
            message.textContent = this.translations[this.state.lang][key] || key;
            message.dataset.currentMessage = message.textContent;
        },

        loginAccount() {
            const nameInput = document.getElementById('account-name-input');
            const emailInput = document.getElementById('account-email-input');
            const passwordInput = document.getElementById('account-password-input');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const isRegister = this.state.authMode === 'register';
            const name = nameInput.value.trim();

            if (isRegister) {
                if (!name || !email || !password) {
                    this.showAuthMessage('account_auth_fill_all', true);
                    (!name ? nameInput : !email ? emailInput : passwordInput).focus();
                    return;
                }
                const account = { name, email, password, createdAt: new Date().toISOString() };
                this.state.registeredAccount = account;
                this.state.account = { name, email, createdAt: account.createdAt };
                this.saveRegisteredAccount();
                this.saveAccount();
                nameInput.value = '';
                emailInput.value = '';
                passwordInput.value = '';
                this.setAuthMode('login');
                this.renderAccount();
                this.renderHistory();
                return;
            }

            if (!email || !password) {
                this.showAuthMessage('account_auth_fill_all', true);
                (!email ? emailInput : passwordInput).focus();
                return;
            }
            if (!this.state.registeredAccount?.password) {
                this.setAuthMode('register');
                this.showAuthMessage('account_auth_no_account', true);
                return;
            }
            if (email !== this.state.registeredAccount.email || password !== this.state.registeredAccount.password) {
                this.showAuthMessage('account_auth_wrong', true);
                passwordInput.focus();
                return;
            }

            this.state.account = {
                name: this.state.registeredAccount.name,
                email: this.state.registeredAccount.email,
                createdAt: this.state.registeredAccount.createdAt
            };
            this.saveAccount();
            emailInput.value = '';
            passwordInput.value = '';
            this.renderAccount();
            this.renderHistory();
        },

        logoutAccount() {
            this.state.account = null;
            this.state.activeClientId = null;
            this.saveAccount();
            this.saveClients();
            this.renderAccount();
            this.renderClients();
        },

        renderAccount() {
            const authView = document.getElementById('auth-view');
            const dashboard = document.getElementById('account-dashboard');
            const title = document.getElementById('account-title');
            const subtitle = document.getElementById('account-subtitle');
            if (!authView || !dashboard) return;
            const loggedIn = Boolean(this.state.account);
            authView.hidden = loggedIn;
            dashboard.hidden = !loggedIn;
            if (loggedIn) {
                title.textContent = this.state.account.name;
                subtitle.textContent = `${this.state.account.email} · ${this.translations[this.state.lang].account_local_note}`;
            } else {
                this.setAuthMode(this.state.authMode || (this.state.registeredAccount ? 'login' : 'register'));
            }
            this.setAccountTab(this.state.activeAccountTab || 'clients', false);
        },

        setAccountTab(tab, doRender = true) {
            this.state.activeAccountTab = tab;
            document.querySelectorAll('[data-account-tab]').forEach(button => button.classList.toggle('active', button.dataset.accountTab === tab));
            document.getElementById('account-clients-panel').hidden = tab !== 'clients';
            document.getElementById('account-history-panel').hidden = tab !== 'history';
            if (doRender && tab === 'history') this.renderHistory();
        },

        saveReadings() {
            localStorage.setItem('tarot_readings', JSON.stringify(this.state.readings.slice(0, 80)));
        },

        saveCurrentReading(snapshot) {
            if (!snapshot) return;
            const entry = {
                ...snapshot,
                id: `reading-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
                createdAt: new Date().toISOString(),
                favorite: false,
                note: '',
                tags: [snapshot.theme, snapshot.client?.name].filter(Boolean)
            };
            this.state.readings.unshift(entry);
            this.state.readings = this.state.readings.slice(0, 80);
            this.saveReadings();
            this.renderHistory();
        },

        renderHistory() {
            const list = document.getElementById('history-list');
            if (!list) return;
            const t = this.translations[this.state.lang];
            const query = (document.getElementById('history-search-input')?.value || '').trim().toLowerCase();
            const readings = this.state.readings.filter(entry => {
                const haystack = [
                    entry.question, entry.spreadType, entry.theme, entry.client?.name,
                    ...(entry.cards || []).map(card => `${card.position} ${card.name}`),
                    ...(entry.tags || [])
                ].join(' ').toLowerCase();
                return !query || haystack.includes(query);
            });

            if (!this.state.account) {
                list.innerHTML = `<div class="client-empty">${this.escapeHTML(t.account_local_note)}</div>`;
                return;
            }
            if (!readings.length) {
                list.innerHTML = `<div class="client-empty">${this.escapeHTML(t.history_empty)}</div>`;
                return;
            }

            list.innerHTML = readings.map(entry => {
                const date = new Date(entry.createdAt).toLocaleString(this.state.lang === 'ua' ? 'uk-UA' : 'ru-RU');
                const cards = (entry.cards || []).map(card => card.name + (card.isReversed ? ' ↻' : '')).join(', ');
                const tags = (entry.tags || []).filter(Boolean).join(', ');
                return `
                    <div class="history-card">
                        <div class="history-card-head">
                            <div>
                                <div class="history-title">${entry.favorite ? '★ ' : ''}${this.escapeHTML(entry.spreadType || t.result_modal_title)}</div>
                                <div class="history-meta">${this.escapeHTML(date)} · ${this.escapeHTML(entry.theme || '')}${entry.client?.name ? ` · ${this.escapeHTML(entry.client.name)}` : ''}</div>
                            </div>
                        </div>
                        <div class="history-meta">${this.escapeHTML(entry.question || t.reading_no_question)}</div>
                        <div class="history-meta">${this.escapeHTML(cards)}</div>
                        ${entry.note ? `<div class="history-note">${this.escapeHTML(entry.note)}</div>` : ''}
                        ${tags ? `<div class="history-tags"># ${this.escapeHTML(tags).replace(/, /g, ' #')}</div>` : ''}
                        <div class="history-actions">
                            <button class="history-action" data-history-action="open" data-history-id="${entry.id}">${this.escapeHTML(t.history_open)}</button>
                            <button class="history-action" data-history-action="favorite" data-history-id="${entry.id}">${this.escapeHTML(entry.favorite ? t.history_unfavorite : t.history_favorite)}</button>
                            <button class="history-action" data-history-action="note" data-history-id="${entry.id}">${this.escapeHTML(t.history_note_btn)}</button>
                            <button class="history-action" data-history-action="tags" data-history-id="${entry.id}">${this.escapeHTML(t.history_tags_btn)}</button>
                        </div>
                    </div>
                `;
            }).join('');
            this.renderHistoryStats();
        },

        handleHistoryAction(action, id) {
            const entry = this.state.readings.find(item => item.id === id);
            if (!entry) return;
            if (action === 'open') {
                this._lastReadingSnapshot = entry;
                this.openResultModal();
            } else if (action === 'favorite') {
                entry.favorite = !entry.favorite;
            } else if (action === 'note') {
                entry.note = prompt(this.translations[this.state.lang].history_note_prompt, entry.note || '') || '';
            } else if (action === 'tags') {
                const value = prompt(this.translations[this.state.lang].history_tags_prompt, (entry.tags || []).join(', '));
                if (value !== null) entry.tags = value.split(',').map(tag => tag.trim()).filter(Boolean);
            }
            this.saveReadings();
            this.renderHistory();
        },

        exportHistory() {
            const data = JSON.stringify(this.state.readings, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'tarot-history.json';
            link.click();
            URL.revokeObjectURL(url);
        },

        toggleHistoryStats() {
            const stats = document.getElementById('history-stats');
            if (!stats) return;
            stats.style.display = stats.style.display === 'none' ? 'block' : 'none';
            this.renderHistoryStats();
        },

        renderHistoryStats() {
            const stats = document.getElementById('history-stats');
            if (!stats || stats.style.display === 'none') return;
            const allCards = this.state.readings.flatMap(entry => entry.cards || []);
            const reversed = allCards.filter(card => card.isReversed).length;
            const counts = allCards.reduce((acc, card) => {
                acc[card.name] = (acc[card.name] || 0) + 1;
                return acc;
            }, {});
            const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => `${name}: ${count}`).join(' · ');
            const percent = allCards.length ? Math.round((reversed / allCards.length) * 100) : 0;
            stats.textContent = `${allCards.length} cards · ${percent}% reversed${top ? ' · ' + top : ''}`;
        },

        addClient() {

            const contactInput = document.getElementById('client-contact-input');
            const notesInput = document.getElementById('client-notes-input');
            const name = nameInput.value.trim();

                if (!response.ok) {
                    const errorText = data?.error || (this.state.lang === 'ua' ? 'Невідома помилка' : 'Неизвестная ошибка');
                    responseBox.innerHTML = `<span id="ai-placeholder" class="text-red-400">${this.escapeHTML(errorText)}</span>`;
                    return;
                }

                const text = data?.text || '';
                this._lastInterpretation = text;
                this._lastReadingSnapshot = this.buildReadingSnapshot(requestData, text);
                this.renderReadingPreview(this._lastReadingSnapshot);
                if (this.state.account) this.saveCurrentReading(this._lastReadingSnapshot);
                document.getElementById('ai-response-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) {

            } finally {
                document.getElementById('loading-overlay').classList.remove('active');
            }
        },


        escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[ch]));
        },

        escapeAttr(value) {
            return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
        },

        formatAIText(text) {
            const escaped = this.escapeHTML(text || '').trim();
            if (!escaped) return '';

            const formatInline = value => value
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');

            const formatParagraph = value => {
                const line = formatInline(value.trim());
                const emphasizedLabelMatch = line.match(/^<em>([^:<]{2,42}:)<\/em>\s*(.+)$/);
                if (emphasizedLabelMatch) {
                    return `<p class="interpretation-paragraph"><span class="interpretation-label">${emphasizedLabelMatch[1]}</span> ${emphasizedLabelMatch[2]}</p>`;
                }
                const labelMatch = line.match(/^([^:<]{2,42}):\s*(.+)$/);
                if (labelMatch) {
                    return `<p class="interpretation-paragraph"><span class="interpretation-label">${labelMatch[1]}:</span> ${labelMatch[2]}</p>`;
                }
                return `<p class="interpretation-paragraph">${line}</p>`;
            };

            return escaped
                .split(/\n\s*\n+/)
                .map(block => {
                    const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
                    if (!lines.length) return '';

                    const titleMatch = lines[0].match(/^\d+\.\s*(?:<strong>)?(.+?)(?:<\/strong>)?\s*$/);
                    if (titleMatch) {
                        const title = formatInline(titleMatch[1].replace(/\*\*/g, ''));
                        const body = lines.slice(1).map(formatParagraph).join('');
                        return `
                            <section class="interpretation-section">
                                <div class="interpretation-section-title">${title}</div>
                                <div class="interpretation-section-body">${body}</div>
                            </section>
                        `;
                    }

                    return `
                        <section class="interpretation-section">
                            <div class="interpretation-section-body">${lines.map(formatParagraph).join('')}</div>
                        </section>
                    `;
                })
                .join('');
        },

        getOrientationLabel(isReversed) {
            return isReversed ? this.translations[this.state.lang].orientation_reversed : this.translations[this.state.lang].orientation_upright;
        },

        buildReadingSnapshot(requestData, interpretation) {
            const schema = this.data.spreads[this.state.spreadKey];
            const positions = schema.positions[this.state.lang];
            const cards = positions
                .map(position => {
                    const card = requestData.cards[position] || this.state.selectedCards[position];
                    if (!card) return null;
                    return {
                        position,
                        id: card.id,
                        name: this.translateCardName(card.id),
                        isReversed: Boolean(card.isReversed),
                        imagePath: this.getCardImagePath(card.id)
                    };
                })
                .filter(Boolean);

            return {
                lang: this.state.lang,
                question: requestData.question || '',
                spreadType: requestData.spreadType,
                theme: requestData.theme,
                client: requestData.client || null,
                tone: requestData.tone,
                answerLength: requestData.answerLength,
                focus: requestData.focus,
                moodBefore: requestData.moodBefore,
                cards,
                interpretation
            };
        },

        renderReadingPreview(snapshot) {
            const responseBox = document.getElementById('ai-response-box');
            if (!responseBox || !snapshot) return;
            const t = this.translations[this.state.lang];
            const question = snapshot.question ? this.escapeHTML(snapshot.question) : this.escapeHTML(t.reading_no_question);

                        <div class="reading-card-orientation">${this.escapeHTML(this.getOrientationLabel(card.isReversed))}</div>
                    </div>
                </div>
            `).join('');

            responseBox.innerHTML = `
                <div class="reading-preview">
                    <div class="reading-preview-header">
                        <div class="reading-preview-title">${this.escapeHTML(t.reading_cards_title)}</div>
                        <div class="reading-preview-subtitle">${this.escapeHTML(t.reading_cards_subtitle)}</div>
                    </div>

                        <button type="button" class="reading-action-secondary" onclick="App.resetSpread()">${this.escapeHTML(t.btn_new_reading)}</button>
                    </div>

        },

        renderResultModal(snapshot) {
            if (!snapshot) return;
            const t = this.translations[this.state.lang];
            const titleEl = document.getElementById('result-modal-title');
            const bodyEl = document.getElementById('result-modal-body');

            titleEl.textContent = t.result_modal_title;
            const question = snapshot.question ? this.escapeHTML(snapshot.question) : this.escapeHTML(t.reading_no_question);
            const clientLine = snapshot.client?.name ? `

                    <div class="reading-question-text">${this.escapeHTML(snapshot.client.name)}${snapshot.client.contact ? ` · ${this.escapeHTML(snapshot.client.contact)}` : ''}</div>
                </div>
            ` : '';
            const chips = snapshot.cards.map((card, index) => `
                <div class="result-modal-card-chip" title="${this.escapeHTML(card.position)} - ${this.escapeHTML(card.name)}">

                </div>
            `).join('');

            bodyEl.innerHTML = `
                <div class="result-summary">
                    <div class="result-summary-top">
                        <div>
                            <div class="result-summary-kicker">${this.escapeHTML(snapshot.theme || snapshot.spreadType || '')}</div>
                            <div class="result-summary-title">${this.escapeHTML(snapshot.spreadType || t.result_modal_title)}</div>
                        </div>
                        <div class="result-summary-count">${snapshot.cards.length}</div>
                    </div>
                    <div class="reading-question-box">
                        <div class="reading-question-label">${this.escapeHTML(t.reading_question_label)}</div>
                        <div class="reading-question-text">${question}</div>
                    </div>
                    ${clientLine}
                </div>
                <div class="result-modal-cards">${chips}</div>
                <div class="result-modal-text">${this.formatAIText(snapshot.interpretation)}</div>
            `;
        },

        openResultModal() {
            if (!this._lastReadingSnapshot) return;
            this.renderResultModal(this._lastReadingSnapshot);
            document.getElementById('result-modal')?.classList.add('active');
            document.body.classList.add('body-modal-open');
        },

        closeResultModal() {
            document.getElementById('result-modal')?.classList.remove('active');
            document.body.classList.remove('body-modal-open');
        },

        getResultPlainText() {
            const snapshot = this._lastReadingSnapshot;
            if (!snapshot) return '';
            const t = this.translations[this.state.lang];
            const cardLines = snapshot.cards.map(card => `- ${card.position}: ${card.name}${card.isReversed ? ' ↻' : ''} (${this.getOrientationLabel(card.isReversed)})`);
            return [
                `${t.reading_cards_title}`,
                `${t.reading_question_label}: ${snapshot.question || t.reading_no_question}`,
                cardLines.join('\n'),
                snapshot.interpretation
            ].filter(Boolean).join('\n\n');
        },

        exportCurrentResult() {
            if (!this._lastReadingSnapshot) return;
            window.print();
        },

        async copyResultToClipboard() {
            const text = this.getResultPlainText();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
            }
            alert(this.translations[this.state.lang].result_copied);
        },

        playSound(soundId) {
            if (!this.state.soundEnabled) return;
            const sound = document.getElementById(soundId);
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.4;
                sound.play().catch(e => console.error("Sound play failed:", e));
            }
        },

        playFlipSound() {
            if (!this.state.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                oscillator.type = 'sine';
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                console.error("Web Audio API failed:", e);
            }
        },

        toggleMusic() {
            this.setSoundEnabled(!this.state.soundEnabled);
        },

        setSoundEnabled(enabled) {
            this.state.soundEnabled = enabled;
            localStorage.setItem('tarot_sound_enabled', String(enabled));
            this.syncSoundState();
        },

        syncSoundState() {
            const music = document.getElementById('ambient-music');
            const select = document.getElementById('sound-mode-select');
            if (select) select.value = this.state.soundEnabled ? 'on' : 'off';
            if (!music) return;
            if (this.state.soundEnabled) {
                music.volume = 0.2;
                music.play().catch(e => console.error("Audio play failed:", e));
            } else {
                music.pause();
            }
        },

        displayMoonPhase() {
            const icons = ['🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗', '🌘'];
            const day = new Date().getDate();
            const index = Math.floor((day % 30) / 3.75);
            document.getElementById('moon-widget').innerHTML = `<div class="text-2xl">${icons[index]}</div><div>${this.translations[this.state.lang].moon_phases[index]}</div>`;
        }
    };
    document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
