<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-key="page_title">Таро AI Компаньйон v9.0 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #06020c; --bg-surface: #100a1f; --border-color: #342956;
            --primary-glow-color: rgba(157, 78, 223, 0.5); --secondary-glow-color: rgba(157, 78, 223, 0.3);
            --text-gold: #f3c66f; --text-purple: #9d4edf;
        }
        body.theme-psychologist {
            --primary-glow-color: rgba(20, 184, 166, 0.5); --secondary-glow-color: rgba(20, 184, 166, 0.2);
            --text-gold: #6ee7b7; --text-purple: #2dd4bf;
        }
        body.theme-witchy {
            --bg-main: #0f0a1a; --bg-surface: #1a1329; --border-color: #3d2f5c;
            --primary-glow-color: rgba(168, 85, 247, 0.5); --secondary-glow-color: rgba(217, 70, 239, 0.3);
            --text-gold: #e9d5ff; --text-purple: #c084fc;
        }
        html, body { height: 100%; }
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(ellipse at top, var(--bg-surface), var(--bg-main) 70%);
            color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif;
            transition: all 0.5s ease;
        }

        .neon-glow { box-shadow: 0 0 8px var(--primary-glow-color), 0 0 20px var(--secondary-glow-color); transition: box-shadow 0.5s; }
        .text-gold { color: var(--text-gold); transition: color 0.5s; }
        .text-purple { color: var(--text-purple); transition: color 0.5s; }
        .border-color { border-color: var(--border-color); transition: border-color 0.5s; }
        .bg-surface { background-color: var(--bg-surface); transition: background-color 0.5s; }
        .bg-mystic-900 { background-color: rgba(16, 10, 31, 0.8); }

        .control-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 60px; }
        .control-card span { font-size: 0.8rem; line-height: 1.2; }
        .control-card:hover { border-color: var(--text-purple); }
        .control-card.active { border-color: var(--text-gold); background-color: rgba(243, 198, 111, 0.1); box-shadow: 0 0 10px var(--primary-glow-color); }

        .card-flip-container { perspective: 1000px; cursor: pointer; position: relative; aspect-ratio: 2/3; min-height: 240px; }
        .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-flip-container.flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0.75rem; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1rem; text-align: center; overflow: hidden; }
        .card-front { background: radial-gradient(circle, #1a0b2e 0%, #16213e 50%, #0f3460 100%); border: 2px solid var(--border-color); }
        .card-back { background: linear-gradient(135deg, var(--bg-surface), rgba(157, 78, 223, 0.2)); border: 3px solid var(--text-purple); transform: rotateY(180deg); box-shadow: 0 0 20px var(--primary-glow-color), inset 0 0 20px rgba(157, 78, 223, 0.1); }
        .tarot-card-img { width: 100%; height: 100%; background-size: cover; border-radius: 0.75rem; display: block; }

        .reverse-btn { background: rgba(157, 78, 223, 0.3); border: 1px solid var(--text-purple); color: var(--text-gold); padding: 0.2rem 0.5rem; border-radius: 0.5rem; font-size: 0.68rem; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .reverse-btn:hover { background: rgba(157, 78, 223, 0.5); transform: scale(1.05); }

        .accordion-wrapper { display: none; margin-top: 0.75rem; }
        .accordion-wrapper.active { display: block; }

        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow-color); transform: scale(1.03); } 50% { box-shadow: 0 0 25px var(--primary-glow-color), 0 0 35px var(--secondary-glow-color); transform: scale(1.05); } }
        .schema-position-active { animation: pulse-glow 1.5s infinite; border-color: var(--text-gold) !important; }

        .schema-container { display: grid; gap: 1.5rem; padding: 2rem; border-radius: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); min-height: 700px; }
        .schema-container.spread-cross { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1.5rem; }
        .cross-pos-1 { grid-row: 2; grid-column: 2; } .cross-pos-2 { grid-row: 1; grid-column: 2; } .cross-pos-3 { grid-row: 2; grid-column: 1; } .cross-pos-4 { grid-row: 2; grid-column: 3; }

        @keyframes card-flight { from { opacity: 0; transform: translateY(-80px) scale(0.5) rotateY(180deg); } to { opacity: 1; transform: translateY(0) scale(1) rotateY(0deg); } }
        .card-flight-animation { animation: card-flight 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        .slot-number { font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.15); }
        .slot-position-name { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-purple); background: rgba(0, 0, 0, 0.6); padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
        .slot-card-name { font-size: 0.9rem; font-weight: 600; margin-top: 0.5rem; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 2, 12, 0.95); backdrop-filter: blur(15px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #loading-overlay.active { opacity: 1; pointer-events: auto; }

        @keyframes crystal-pulse { 0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 30px var(--primary-glow-color)); } 50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 50px var(--primary-glow-color)) drop-shadow(0 0 80px var(--secondary-glow-color)); } }
        @keyframes moon-orbit { from { transform: rotate(0deg) translateX(70px) rotate(0deg); } to { transform: rotate(360deg) translateX(70px) rotate(-360deg); } }
        .crystal-ball { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), var(--text-purple) 60%, #1a0b2e 100%); animation: crystal-pulse 2.5s ease-in-out infinite; position: relative; box-shadow: inset 0 0 50px rgba(255,255,255,0.2), 0 0 80px var(--primary-glow-color); }
        .moon-phase { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, var(--text-gold), rgba(243, 198, 111, 0.3)); animation: moon-orbit 4s linear infinite; box-shadow: 0 0 20px var(--text-gold); }

        .spread-category { margin-bottom: 1.5rem; }
        .spread-category-title { font-size: 0.85rem; font-weight: 700; color: var(--text-gold); margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.5rem; }
        .spread-hint { font-size: 0.65rem; color: rgba(255, 255, 255, 0.5); margin-top: 0.25rem; font-style: italic; }
        .control-card.spread-card { min-height: 80px; }

        .suit-selector-card { background: var(--bg-surface); border: 2px solid var(--border-color); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
        .suit-selector-card:hover { border-color: var(--text-purple); transform: translateY(-5px); box-shadow: 0 10px 30px var(--primary-glow-color); }
        .suit-selector-card.active { border-color: var(--text-gold); background: rgba(243, 198, 111, 0.1); box-shadow: 0 0 20px var(--primary-glow-color); }
        .suit-icon { font-size: 2.5rem; }
        .suit-name { font-size: 1rem; font-weight: 600; color: var(--text-gold); }

        .card-select-wrapper { margin-top: 1rem; padding: 1rem; background: rgba(0, 0, 0, 0.3); border-radius: 0.75rem; border: 1px solid var(--border-color); }
        .card-carousel { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 0.75rem; padding: 1rem 0.5rem; margin-top: 1rem; }
        .card-carousel::-webkit-scrollbar { height: 8px; }
        .card-carousel::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 10px; }
        .card-carousel::-webkit-scrollbar-thumb { background: var(--text-purple); border-radius: 10px; box-shadow: 0 0 10px var(--primary-glow-color); }
        .card-carousel::-webkit-scrollbar-thumb:hover { background: var(--text-gold); }

        .card-item { min-width: 100px; max-width: 100px; background: var(--bg-surface); border: 2px solid var(--border-color); border-radius: 0.75rem; padding: 0.75rem 0.5rem; text-align: center; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
        .card-item:hover { border-color: var(--text-purple); transform: translateY(-5px); box-shadow: 0 5px 15px var(--primary-glow-color); }
        .card-item.disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }
        .card-item-name { font-size: 0.75rem; font-weight: 600; color: white; line-height: 1.2; }

        .reversed-toggle, .context-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.75rem; background: rgba(157, 78, 223, 0.1); border-radius: 0.5rem; cursor: pointer; transition: all 0.3s; }
        .reversed-toggle:hover, .context-toggle:hover { background: rgba(157, 78, 223, 0.2); }
        .styled-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--text-purple); }
        .context-input { background: #06020c; border: 1px solid var(--border-color); border-radius: 0.25rem; padding: 0.25rem 0.5rem; font-size: 0.9rem; color: white; margin-left: 0.5rem; }
    </style>
</head>

                alert_card_already_in: (card) => `Карта "${card}" уже есть в раскладе.`,
                suit_major: "✨ Старшие Арканы", suit_wands: "🔥 Жезлы", suit_cups: "💧 Кубки", suit_swords: "🌪 Мечи", suit_pentacles: "⛰ Пентакли",
                moon_phases: ['Новолуние', 'Молодая луна', 'Первая четверть', 'Прибывающая луна', 'Полнолуние', 'Убывающая луна', 'Последняя четверть', 'Старая луна'],
                loading_text: "Считываем информацию из пространства...",
                btn_reverse: "⤾ Перевернуть",
            }
        },
        data: {
            spheres: [ { key: 'love', icon: '❤️', ua: 'Кохання', ru: 'Любовь' }, { key: 'career', icon: '💼', ua: 'Кар\'єра', ru: 'Карьера' }, { key: 'finance', icon: '💰', ua: 'Фінанси', ru: 'Финансы' }, { key: 'health', icon: '🌿', ua: 'Здоров\'я', ru: 'Здоровье' }, { key: 'destiny', icon: '🌌', ua: 'Призначення', ru: 'Предназначение' }, { key: 'general', icon: '🪐', ua: 'Загальний аналіз', ru: 'Общий анализ' } ],
            targets: [ { key: 'self', ua: 'На себе', ru: 'На себя' }, { key: 'partner', ua: 'На партнера', ru: 'На партнера' }, { key: 'friend', ua: 'На друга', ru: 'На друга' }, { key: 'rival', ua: 'На ворога', ru: 'На врага' } ],
            spreads: { "card-of-day": { cards: 1, ua: "Карта дня", ru: "Карта дня", positions: { ua: ["Енергія дня"], ru: ["Энергия дня"] } }, "cross": { cards: 4, ua: "Хрест", ru: "Крест", positions: { ua: ["Суть", "Перешкода", "Порада", "Результат"], ru: ["Суть", "Препятствие", "Совет", "Результат"] }, gridClass: 'spread-cross' } },
            cards: {
                major: { ua: ["Дурень", "Маг", "Жриця", "Імператриця", "Імператор", "Ієрофант", "Закохані", "Колісниця", "Сила", "Відлюдник", "Фортуна", "Справедливість", "Повішений", "Смерть", "Помірність", "Диявол", "Вежа", "Зірка", "Місяць", "Сонце", "Суд", "Світ"], ru: ["Шут", "Маг", "Жрица", "Императрица", "Император", "Иерофант", "Влюбленные", "Колесница", "Сила", "Отшельник", "Фортуна", "Справедливость", "Повешенный", "Смерть", "Умеренность", "Дьявол", "Башня", "Звезда", "Луна", "Солнце", "Суд", "Мир"] },
                minor: { ua: ["Туз", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Паж", "Лицар", "Королева", "Король"], ru: ["Туз", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Паж", "Рыцарь", "Королева", "Король"] },
                suits: { ua: { wands: "Жезлів", cups: "Кубків", swords: "Мечів", pentacles: "Пентаклів" }, ru: { wands: "Жезлов", cups: "Кубков", swords: "Мечей", pentacles: "Пентаклей" } }
            }
        },

        getCardImageStyleById(cardId) {
            const cardWidth = 240, cardHeight = 420, cardsPerRow = 11;
            const [suit, rankIndexStr] = cardId.split('_');
            const rankIndex = parseInt(rankIndexStr, 10);
            let cardIndex = (suit === 'major') ? rankIndex : ({ 'wands': 22, 'cups': 36, 'swords': 50, 'pentacles': 64 }[suit] + rankIndex);
            const row = Math.floor(cardIndex / cardsPerRow), col = cardIndex % cardsPerRow;
            return `background-image: url('image_70e0be.jpg'); background-position: -${col * cardWidth}px -${row * cardHeight}px; background-size: 2640px 2940px;`;
        },

        translateCardName(cardId) {
            const [suit, rankIndex] = cardId.split('_');
            if (suit === 'major') return this.data.cards.major[this.state.lang][rankIndex];
            const rank = this.data.cards.minor[this.state.lang][rankIndex];
            const suitName = this.data.cards.suits[this.state.lang][suit];
            return `${rank} ${suitName}`;
        },

        init() {
            this.loadFromLocalStorage();
            this.addEventListeners();
            this.renderAllDynamicContent();
            this.restoreActiveStates();
            this.applyTheme(this.state.theme);
        },

        loadFromLocalStorage() {
            const savedState = JSON.parse(localStorage.getItem('tarotAppState'));
            if (savedState) {
                this.state = { ...this.state, ...savedState };
            }
        },

        saveToLocalStorage() {
            localStorage.setItem('tarotAppState', JSON.stringify(this.state));
        },

        restoreActiveStates() {
            this.handleSelection('mode', this.state.aiMode, false);
            this.handleSelection('target', this.state.target, false);
            this.handleSelection('sphere', this.state.sphere, false);
            this.handleSelection('spread', this.state.spreadKey, false);
            this.updateUI();
        },

        renderAllDynamicContent() {
            this.applyLanguage();
            this.renderAllSelectors();
            this.renderDynamicContext();
            this.updateUI();
            this.displayMoonPhase();
        },

        renderAllSelectors() {
            const createButtons = (containerId, data, group) => {
                const container = document.getElementById(containerId);
                container.innerHTML = data.map(item => `<button class="control-card" data-group="${group}" data-key="${item.key}">${item.icon || ''} <span>${item[this.state.lang]}</span></button>`).join('');
            };
            createButtons('mode-selector', [{key: 'mystical', icon: '🔮', ua: 'Містичний', ru: 'Мистический'}, {key: 'psychologist', icon: '🧠', ua: 'Психологічний', ru: 'Психологический'}], 'mode');
            createButtons('sphere-selector', this.data.spheres, 'sphere');
            createButtons('target-selector', this.data.targets, 'target');
            this.renderSpreadSelector();
            this.renderSuitSelector();
        },

        renderSpreadSelector() {
            const container = document.getElementById('spread-selector');
            container.innerHTML = Object.keys(this.data.spreads).map(key => `<button class="control-card spread-card" data-group="spread" data-key="${key}"><span>${this.data.spreads[key][this.state.lang]}</span></button>`).join('');
        },

        renderSuitSelector() {
            const suits = [ { key: 'major', icon: '✨', name: this.translations[this.state.lang].suit_major }, { key: 'wands', icon: '🔥', name: this.translations[this.state.lang].suit_wands }, { key: 'cups', icon: '💧', name: this.translations[this.state.lang].suit_cups }, { key: 'swords', icon: '🌪', name: this.translations[this.state.lang].suit_swords }, { key: 'pentacles', icon: '⛰', name: this.translations[this.state.lang].suit_pentacles } ];
            document.getElementById('suit-grid').innerHTML = suits.map(suit => `<div class="suit-selector-card ${this.state.activeSuit === suit.key ? 'active' : ''}" onclick="App.selectSuit('${suit.key}')"><div class="suit-icon">${suit.icon}</div><div class="suit-name">${suit.name}</div></div>`).join('');
        },

        renderDynamicContext() {
            const container = document.getElementById('dynamic-context-container');
            const t = this.translations[this.state.lang];
            container.innerHTML = `
                <div class="context-toggle"><input type="checkbox" id="morning-flow-checkbox" class="styled-checkbox" onchange="App.updateContext('morningFlow', this.checked)" ${this.state.context.morningFlow ? 'checked' : ''}><label for="morning-flow-checkbox">${t.context_morning_flow}</label></div>
                <div class="context-toggle"><input type="checkbox" id="relationship-checkbox" class="styled-checkbox" onchange="App.updateContext('relationshipDynamic', this.checked)" ${this.state.context.relationshipDynamic ? 'checked' : ''}><label for="relationship-checkbox">${t.context_relationship_dynamic}</label><input type="text" id="partner-name-input" class="context-input" oninput="App.updateContext('partnerName', this.value)" value="${this.state.context.partnerName}"></div>
                <div class="context-toggle"><input type="checkbox" id="geo-energy-checkbox" class="styled-checkbox" onchange="App.updateContext('geoEnergy', this.checked)" ${this.state.context.geoEnergy ? 'checked' : ''}><label for="geo-energy-checkbox">${t.context_geo_energy}</label><input type="text" id="location-input" class="context-input" oninput="App.updateContext('location', this.value)" value="${this.state.context.location}"></div>
            `;
        },

        updateContext(key, value) {
            this.state.context[key] = value;
            this.saveToLocalStorage();
        },

        selectSuit(suitKey) {
            this.state.activeSuit = suitKey;
            this.renderSuitSelector();
            this.renderCardCarousel();
            document.getElementById('card-selection-step').style.display = 'block';
        },

        renderCardCarousel() {
            const isMajor = this.state.activeSuit === 'major';
            const ranks = isMajor ? this.data.cards.major[this.state.lang] : this.data.cards.minor[this.state.lang];
            document.getElementById('card-carousel').innerHTML = ranks.map((rank, index) => {
                const cardId = isMajor ? `major_${index}` : `${this.state.activeSuit}_${index}`;
                const isUsed = Object.values(this.state.selectedCards).some(c => c.id === cardId);
                return `<div class="card-item ${isUsed ? 'disabled' : ''}" onclick="App.selectCardFromCarousel('${cardId}', ${isUsed})"><div class="card-item-name">${rank}</div></div>`;
            }).join('');
        },

        selectCardFromCarousel(cardId, isUsed) {
            if (isUsed) return;
            const schema = this.data.spreads[this.state.spreadKey];
            if (this.state.activePositionIndex >= schema.cards) return;
            const posName = schema.positions[this.state.lang][this.state.activePositionIndex];
            this.state.selectedCards[posName] = { id: cardId, isReversed: this.state.previewReversed, imageStyle: this.getCardImageStyleById(cardId) };
            this.playSound('card-select-sound');
            this.state.previewReversed = false;
            document.getElementById('reversed-checkbox').checked = false;
            const nextIndex = schema.positions[this.state.lang].findIndex((_, i) => !this.state.selectedCards[schema.positions[this.state.lang][i]]);
            this.state.activePositionIndex = (nextIndex === -1) ? schema.cards : nextIndex;
            this.updateUI();
        },

        toggleReversedPreview() {
            this.state.previewReversed = !this.state.previewReversed;
            document.getElementById('reversed-checkbox').checked = this.state.previewReversed;
        },

        toggleCardReversed(posName) {
            if (this.state.selectedCards[posName]) {
                this.state.selectedCards[posName].isReversed = !this.state.selectedCards[posName].isReversed;
                this.updateUI();
            }
        },

        addEventListeners() {
            document.getElementById('lang-toggle').addEventListener('click', () => this.toggleLanguage());
            document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
            document.getElementById('reset-btn').addEventListener('click', () => this.resetSpread());
            document.getElementById('ai-btn').addEventListener('click', () => this.getSpreadInterpretation());
            document.getElementById('music-toggle').addEventListener('click', () => this.toggleMusic());
            document.getElementById('rules-toggle').addEventListener('click', () => this.toggleRules());
            document.getElementById('refine-question-btn').addEventListener('click', () => this.refineQuestion());
            ['mode-selector', 'sphere-selector', 'target-selector', 'spread-selector'].forEach(id => {
                document.getElementById(id).addEventListener('click', e => {
                    const button = e.target.closest('button');
                    if (button && button.dataset.group) this.handleSelection(button.dataset.group, button.dataset.key);
                });
            });
        },

        handleSelection(group, key, doUpdate = true) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-group="${group}"][data-key="${key}"]`)?.classList.add('active');
            this.state[group === 'spread' ? 'spreadKey' : group] = key;
            if (group === 'mode') this.applyTheme(this.state.theme);
            if (doUpdate) {
                if (group === 'spread' || group === 'target') this.resetSpread();
                this.updateUI();
            }
            this.saveToLocalStorage();
        },

        resetSpread() {
            this.state.selectedCards = {};
            this.state.activePositionIndex = 0;
            this.state.activeSuit = null;
            this.state.previewReversed = false;
            document.getElementById('question').value = '';
            document.getElementById('card-selection-step').style.display = 'none';
            this.updateUI();
        },

        updateUI() {
            this.renderSchema();
            this.updateHint();
            if (this.state.activeSuit) this.renderCardCarousel();
        },

        renderSchema() {
            const schema = this.data.spreads[this.state.spreadKey];
            const container = document.getElementById('spread-schema-container');
            container.innerHTML = '';
            container.className = `schema-container ${schema.gridClass || ''}`;
            if (!schema.gridClass) container.style.gridTemplateAreas = schema.grid;

            schema.positions[this.state.lang].forEach((posName, index) => {
                const cardData = this.state.selectedCards[posName];
                const wrapper = document.createElement('div');
                wrapper.style.cssText = 'display:flex; flex-direction:column; gap:0.4rem; align-items:stretch;';
                if (this.state.spreadKey === 'cross') wrapper.classList.add(`cross-pos-${index + 1}`);
                else wrapper.style.gridArea = `pos${index + 1}`;

                const flipContainer = document.createElement('div');
                flipContainer.className = `card-flip-container ${cardData ? 'flipped card-flight-animation' : ''}`;
                if (index === this.state.activePositionIndex && !cardData) flipContainer.classList.add('schema-position-active');
                flipContainer.onclick = () => {
                    if (cardData) { this.playFlipSound(); flipContainer.classList.toggle('flipped'); }
                    else { this.state.activePositionIndex = index; this.updateUI(); }
                };

                const inner = document.createElement('div');
                inner.className = 'card-flip-inner';
                const front = document.createElement('div');
                front.className = 'card-front';
                front.innerHTML = `<div style="font-size:2.5rem;opacity:0.5;">🔮</div><div class="slot-number" style="font-size:1.4rem;opacity:0.3;">${index + 1}</div><div class="slot-position-name" style="margin-top:0.25rem;">${posName}</div>`;
                const back = document.createElement('div');
                back.className = 'card-back';
                back.style.cssText = 'padding:0;overflow:hidden;border-radius:0.75rem;';
                if (cardData) {
                    const reversedStyle = cardData.isReversed ? 'transform:rotate(180deg);' : '';
                    back.innerHTML = `<div class="tarot-card-img" style="${cardData.imageStyle} ${reversedStyle}"></div>`;
                } else {
                    back.innerHTML = `<div class="slot-position-name">${posName}</div>`;
                }
                inner.append(front, back);
                flipContainer.appendChild(inner);
                wrapper.appendChild(flipContainer);

                if (cardData) {
                    const footer = document.createElement('div');
                    footer.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0.2rem;';
                    const nameEl = document.createElement('div');
                    nameEl.className = 'slot-card-name text-gold';
                    nameEl.style.cssText = 'font-size:0.75rem;text-align:center;line-height:1.2;';
                    nameEl.textContent = `${this.translateCardName(cardData.id)}${cardData.isReversed ? ' ↻' : ''}`;
                    const revBtn = document.createElement('button');
                    revBtn.className = 'reverse-btn';
                    revBtn.textContent = this.translations[this.state.lang].btn_reverse;
                    revBtn.onclick = (e) => { e.stopPropagation(); this.toggleCardReversed(posName); };
                    footer.append(nameEl, revBtn);
                    wrapper.appendChild(footer);
                }
                container.appendChild(wrapper);
            });
        },

        updateHint() {
            const schema = this.data.spreads[this.state.spreadKey];
            const hint = document.getElementById('current-position-hint');
            hint.innerHTML = this.state.activePositionIndex < schema.cards
                ? `${this.translations[this.state.lang].hint_select_card_for} <strong class="text-gold">"${schema.positions[this.state.lang][this.state.activePositionIndex]}"</strong>`
                : this.translations[this.state.lang].hint_spread_filled;
        },

        toggleLanguage() {
            const prevLang = this.state.lang;
            this.state.lang = this.state.lang === 'ua' ? 'ru' : 'ua';
            localStorage.setItem('tarot_lang', this.state.lang);
            document.documentElement.lang = this.state.lang;
            document.getElementById('lang-pill').style.transform = this.state.lang === 'ua' ? 'translateX(0px)' : 'translateX(20px)';
            const schema = this.data.spreads[this.state.spreadKey];
            const oldPositions = schema.positions[prevLang];
            const newPositions = schema.positions[this.state.lang];
            const newSelectedCards = {};
            oldPositions.forEach((oldPos, i) => { if (this.state.selectedCards[oldPos]) newSelectedCards[newPositions[i]] = this.state.selectedCards[oldPos]; });
            this.state.selectedCards = newSelectedCards;
            this.renderAllDynamicContent();
            this.restoreActiveStates();
        },

        toggleTheme() {
            this.state.theme = this.state.theme === 'neon' ? 'witchy' : 'neon';
            this.applyTheme(this.state.theme);
            document.getElementById('theme-pill').style.transform = this.state.theme === 'neon' ? 'translateX(0px)' : 'translateX(26px)';
            this.saveToLocalStorage();
        },

        applyTheme(theme) {
            document.body.classList.remove('theme-witchy', 'theme-psychologist');
            if (theme === 'witchy') document.body.classList.add('theme-witchy');
            else if (this.state.aiMode === 'psychologist') document.body.classList.add('theme-psychologist');
        },

        applyLanguage() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.dataset.translateKey;
                const translation = this.translations[this.state.lang][key];
                if (translation) el.textContent = translation;
            });
            document.getElementById('rules-list').innerHTML = this.translations[this.state.lang].rules_list.map(rule => `<li>${rule}</li>`).join('');
            document.getElementById('question').placeholder = this.translations[this.state.lang].label_question;
        },

        toggleRules() {
            document.getElementById('rules-wrapper').classList.toggle('active');
        },

        async getSpreadInterpretation() {
            const schema = this.data.spreads[this.state.spreadKey];
            if (Object.keys(this.state.selectedCards).length < schema.cards) {
                alert(this.translations[this.state.lang].alert_spread_not_filled);
                return;
            }
            this.playSound('mystical-chime');
            document.getElementById('loading-overlay').classList.add('active');
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lang: this.state.lang, type: 'spread', mode: this.state.aiMode,
                        theme: this.data.spheres.find(s => s.key === this.state.sphere)[this.state.lang],
                        spreadType: this.data.spreads[this.state.spreadKey][this.state.lang],
                        question: document.getElementById('question').value.trim(),
                        cards: this.state.selectedCards,
                        positions: schema.positions[this.state.lang],
                        context: this.state.context
                    })
                });
                const data = await response.json();
                document.getElementById('ai-response-box').innerHTML = response.ok ? data.interpretation.replace(/\n/g, '<br>') : `Помилка: ${data.error}`;
                if (data.generatedArtUrl) {
                    document.getElementById('art-container').classList.remove('hidden');
                    document.getElementById('generated-art').src = data.generatedArtUrl;
                }
            } catch (error) {
                document.getElementById('ai-response-box').innerHTML = `<span class="text-red-400">Критична помилка: ${error.message}</span>`;
            } finally {
                document.getElementById('loading-overlay').classList.remove('active');
            }
        },

        playSound(soundId) {
            const sound = document.getElementById(soundId);
            if (sound) { sound.currentTime = 0; sound.volume = 0.4; sound.play().catch(e => {}); }
        },

        playFlipSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.type = 'sine';
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {}
        },

        toggleMusic() {
            const music = document.getElementById('ambient-music');
            const button = document.getElementById('music-toggle');
            if (music.paused) { music.volume = 0.2; music.play(); button.textContent = '🔊'; }
            else { music.pause(); button.textContent = '🔇'; }
        },

        displayMoonPhase() {
            const icons = ['🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗', '🌘'];
            const day = new Date().getDate();
            const index = Math.floor((day % 30) / 3.75);
            document.getElementById('moon-widget').innerHTML = `<div class="text-2xl">${icons[index]}</div><div>${this.translations[this.state.lang].moon_phases[index]}</div>`;
        }
    };
    document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
